<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIVILITAS — The Human Atlas</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── DARK THEME (default) ── */
:root{
  --bg:#02040a;
  --panel:#070b12;
  --panel2:#0c1018;
  --ocean-start:#0a1628;--ocean-end:#061020;
  --land:#2a4a18;--land-s:#3a6020;
  --amber:#e89820;--amber-b:#f0b040;--amber-d:#3a2204;
  --amber-x:rgba(232,152,32,0.14);--amber-xx:rgba(232,152,32,0.08);
  --txt:#f2e8d5;--txt2:#c4aa80;--txt3:#8a7254;
  --bdr:rgba(232,152,32,0.22);--bdr2:rgba(232,152,32,0.10);
  --hint:rgba(196,170,128,0.45);
  --tl-bg:rgba(2,4,10,0.99);
  --hdr-bg:rgba(2,4,10,0.97);
  --conn-bdr:rgba(232,152,32,0.10);
  --shadow:rgba(0,0,0,0.6);
}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f0ebe0;
  --panel:#e8e0d0;
  --panel2:#ddd4c0;
  --ocean-start:#b8cce0;--ocean-end:#a8bcd4;
  --land:#8ca860;--land-s:#7a9850;
  --amber:#7a4e00;--amber-b:#8a5800;--amber-d:#f0d8a0;
  --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
  --txt:#1a1206;--txt2:#3a2a10;--txt3:#6a5030;
  --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
  --hint:rgba(58,42,16,0.45);
  --tl-bg:rgba(236,228,214,0.99);
  --hdr-bg:rgba(236,228,214,0.97);
  --conn-bdr:rgba(122,78,0,0.12);
  --shadow:rgba(0,0,0,0.18);
}

@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]){
    --bg:#f0ebe0;--panel:#e8e0d0;--panel2:#ddd4c0;
    --ocean-start:#b8cce0;--ocean-end:#a8bcd4;
    --land:#8ca860;--land-s:#7a9850;
    --amber:#7a4e00;--amber-b:#8a5800;--amber-d:#f0d8a0;
    --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
    --txt:#1a1206;--txt2:#3a2a10;--txt3:#6a5030;
    --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
    --hint:rgba(58,42,16,0.45);
    --tl-bg:rgba(236,228,214,0.99);
    --hdr-bg:rgba(236,228,214,0.97);
    --conn-bdr:rgba(122,78,0,0.12);
    --shadow:rgba(0,0,0,0.18);
  }
}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Crimson Pro',serif}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--hdr-bg);gap:12px}
.hdr-left{display:flex;align-items:baseline;gap:0;min-width:0}
.logo-t{font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;color:var(--amber-b);letter-spacing:3px;white-space:nowrap}
.logo-s{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-left:10px;white-space:nowrap}
.era-disp{text-align:center;font-family:'Cinzel',serif;flex-shrink:0}
.era-y{font-size:20px;font-weight:600;color:var(--amber-b);letter-spacing:1px}
.era-n{font-size:10px;letter-spacing:2px;color:var(--txt2);margin-top:1px;text-transform:uppercase}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.cnt-disp{text-align:right;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;color:var(--txt3)}
.cnt-n{font-size:22px;font-weight:600;color:var(--amber);display:block;line-height:1}
.theme-btn{background:none;border:1px solid var(--bdr);padding:4px 8px;cursor:pointer;font-size:13px;color:var(--txt2);border-radius:3px;transition:all .15s;flex-shrink:0}
.theme-btn:hover{background:var(--amber-x);color:var(--amber-b)}

/* ── MAIN LAYOUT ── */
.main{position:fixed;top:88px;left:0;right:0;bottom:88px;display:flex}
.map-c{flex:1;position:relative;overflow:hidden;min-width:0}
#wsvg{width:100%;height:100%}

/* ── DESKTOP PANEL ── */
.info-panel{width:320px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--bdr);overflow-y:auto;padding:18px 18px 28px;position:relative}
.info-close{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:16px;line-height:1;padding:4px;float:right;margin:-2px -2px 0 0}
.info-close:hover{color:var(--amber-b)}
.info-nm{font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:700;color:var(--amber-b);margin-bottom:3px;clear:both}
.info-sb{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--txt2);text-transform:uppercase;margin-bottom:10px}
.info-dates{display:flex;gap:6px;margin-bottom:14px;align-items:center}
.info-dt{padding:4px 10px;border:1px solid var(--bdr);font-family:'Cinzel',serif;font-size:11.5px;color:var(--amber-b)}
.info-arr{color:var(--txt2);font-size:12px}

/* ── LENS DROPDOWN ── */
.lens-dd-wrap{border:1px solid var(--bdr);margin-bottom:14px}
.lens-dd-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;cursor:pointer;user-select:none;background:var(--amber-xx);border-bottom:1px solid transparent;transition:background .15s}
.lens-dd-hdr:hover{background:var(--amber-x)}
.lens-dd-hdr.open{border-bottom-color:var(--bdr)}
.lens-dd-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2.5px;color:var(--txt2);text-transform:uppercase;flex-shrink:0}
.lens-dd-summary{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.5px;color:var(--amber-b);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;padding:0 6px}
.lens-dd-arrow{color:var(--txt2);font-size:10px;transition:transform .18s;flex-shrink:0}
.lens-dd-arrow.open{transform:rotate(180deg)}
.lens-dd-list{display:none;max-height:260px;overflow-y:auto}
.lens-dd-list.open{display:block}
.lens-row{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--bdr2);transition:background .15s}
.lens-row:last-child{border-bottom:none}
.lens-row:hover{background:var(--amber-x)}
.lens-row-chk{width:13px;height:13px;border:1px solid var(--bdr);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--amber-b);line-height:1}
.lens-row-chk.on{background:var(--amber-x);border-color:var(--amber-b)}
.lens-row-ico{font-size:12px;width:16px;text-align:center;flex-shrink:0;color:var(--txt2)}
.lens-row-lbl{font-family:'Cinzel',serif;font-size:11.5px;letter-spacing:.5px;color:var(--txt2)}
.lens-row.on .lens-row-lbl{color:var(--amber-b);font-weight:600}
.lens-row-sep{border-bottom:1px solid var(--bdr);margin-bottom:2px}
.lens-dd-close-btn{text-align:center;padding:8px 10px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:var(--amber-b);border-top:1px solid var(--bdr);cursor:pointer;text-transform:uppercase;transition:background .15s}
.lens-dd-close-btn:hover{background:var(--amber-x)}

/* ── DRAWER CONTENT ── */
.lens-section{margin-bottom:18px}
.lens-section-hdr{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.lens-section-ico{font-size:12px;color:var(--txt2)}
.lens-section-lbl{font-family:'Cinzel',serif;font-size:11px;letter-spacing:1.5px;color:var(--amber-b);text-transform:uppercase}
.info-div{border:none;border-top:1px solid var(--bdr);margin:12px 0}
.info-txt{font-size:15.5px;line-height:1.82;color:var(--txt);font-style:italic}
.overview-arc{font-size:15.5px;line-height:1.82;color:var(--txt)}
.overview-arc p{margin-bottom:10px}
.civ-span-bar{height:3px;background:var(--bdr2);position:relative;margin:14px 0 6px;border-radius:2px}
.civ-span-fill{position:absolute;top:0;height:100%;background:var(--amber-b);border-radius:2px;opacity:.8}
.civ-span-lbls{display:flex;justify-content:space-between;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--txt3)}
.conn-hdr{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;margin:18px 0 8px}
.conn-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--conn-bdr);font-size:14.5px;color:var(--txt2);cursor:pointer;transition:color .15s}
.conn-item:hover{color:var(--amber-b)}
.conn-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── TIMELINE ── */
.tl-wrap{position:fixed;bottom:0;left:0;right:0;height:88px;background:var(--tl-bg);border-top:1px solid var(--bdr);padding:8px 20px 14px}
.era-bands{display:flex;height:16px;margin-bottom:4px;border-bottom:1px solid var(--bdr2)}
.era-b{display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.7px;color:var(--txt3);border-left:1px solid var(--bdr2);overflow:hidden;opacity:.7}
.tl-lbls{display:flex;justify-content:space-between;margin-bottom:5px}
.tl-lbl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--txt3);text-transform:uppercase}
.tl-trk{position:relative;height:2px;background:var(--bdr);border-radius:1px}
.tl-fill{position:absolute;top:0;left:0;height:100%;background:var(--amber-b);border-radius:1px;pointer-events:none;opacity:.7}
.tl-thumb{position:absolute;top:50%;width:12px;height:12px;background:var(--amber-b);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--amber),0 0 20px rgba(232,152,32,.3);pointer-events:none;transition:left .04s linear}
input.tl-range{position:absolute;top:50%;left:0;width:100%;height:24px;opacity:0;cursor:pointer;transform:translateY(-50%);margin:0;z-index:2}
.hint{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--hint);pointer-events:none;white-space:nowrap}

/* ── SHEET HANDLE ── */
.sheet-handle{display:none;width:44px;height:5px;background:var(--bdr);border-radius:3px;margin:10px auto 12px;cursor:pointer;flex-shrink:0}

/* ── MOB MAP BUTTON ── */
.mob-map-btn{display:none}

/* ── PORTRAIT MOBILE (≤768px, portrait orientation) ── */
@media(max-width:768px) and (orientation:portrait){
  .logo-s{display:none}
  .cnt-disp{display:none}
  .hdr{padding:8px 12px}
  .logo-t{font-size:16px;letter-spacing:2px}
  .era-y{font-size:18px}
  .era-n{font-size:10px;letter-spacing:1.5px}
  .mode-bar{height:32px;top:48px}
  .main{top:80px!important}
  .mode-btn{font-size:7px;letter-spacing:.5px;gap:2px}

  /* Map takes top ~42%, drawer fixed below it, timeline at bottom */
  .main{
    bottom:80px;
    flex-direction:column;
  }
  .map-c{
    flex:0 0 42vh;
    width:100%;
  }
  .info-panel{
    flex:1;
    width:100%;
    border-left:none;
    border-top:1px solid var(--bdr);
    overflow-y:auto;
    padding:0 16px 16px;
    border-radius:0;
  }
  .sheet-handle{display:block}

  .tl-wrap{height:80px;padding:6px 14px 12px}
  .era-bands{height:14px;margin-bottom:3px}
  .era-b{font-size:7px}
  .tl-lbl{font-size:9px;letter-spacing:.8px}
  .hint{display:none}
  .lens-dd-list{max-height:180px}
  .info-txt,.overview-arc{font-size:15px;line-height:1.78}
  .lens-row-lbl{font-size:12px}
}

/* ── LANDSCAPE MOBILE (≤768px, landscape) — desktop layout ── */
@media(max-width:900px) and (orientation:landscape){
  .logo-s{display:none}
  .hdr{padding:6px 14px}
  .logo-t{font-size:15px;letter-spacing:2px}
  .era-y{font-size:15px}
  .hint{display:none}
  .tl-wrap{height:72px;padding:5px 14px 10px}
  .era-bands{height:12px}
  .era-b{font-size:6px}
  .tl-lbl{font-size:8px}
  /* Keep side-by-side layout (same as desktop) */
  .info-panel{width:280px}
}



@keyframes ring-pulse{0%{r:5;opacity:.7}100%{r:26;opacity:0}}

/* Touch devices: pointer cursor on markers */
@media(pointer:coarse){
  #mark-layer g[role="button"]{cursor:pointer}
}

/* ── ACCESSIBILITY ── */
:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px;border-radius:2px}
.conn-item:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px}
.lens-row:focus-visible{outline:2px solid var(--amber-b);outline-offset:-2px}
button:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px}
/* Skip to content */
.skip-link{position:absolute;top:-40px;left:0;background:var(--amber-b);color:var(--bg);padding:8px 16px;z-index:9999;font-family:'Cinzel',serif;font-size:11px;text-decoration:none}
.skip-link:focus{top:0}

/* ── MODE BAR ── */
.mode-bar{position:fixed;top:52px;left:0;right:0;z-index:190;display:flex;align-items:stretch;height:36px;background:var(--hdr-bg)}
.mode-btn{flex:1;background:none;border:none;border-right:1px solid var(--bdr2);padding:0 4px;font-family:'Cinzel',serif;font-size:8px;letter-spacing:1px;color:var(--txt3);cursor:pointer;text-transform:uppercase;transition:all .15s;white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:4px}
.mode-btn:last-child{border-right:none}
.mode-btn:hover{background:var(--amber-x);color:var(--amber-b)}
.mode-btn.active{background:var(--amber-x);color:var(--amber-b)}
.mode-divider{width:1px;background:var(--bdr);flex-shrink:0}

/* ── THREAD PANEL ── */
/* ── THREAD OVERLAY — full-width drop from top ── */
.thread-panel{
  position:fixed;top:88px;left:0;right:0;z-index:400;
  background:var(--panel);
  max-height:0;overflow:hidden;
  transition:max-height .32s cubic-bezier(.4,0,.2,1);
}
.thread-panel.open{border-bottom:1px solid var(--bdr);box-shadow:0 6px 24px var(--shadow)}
.thread-panel.open{max-height:70vh}
.thread-panel-inner{
  padding:16px 20px 20px;
  overflow-y:auto;
  max-height:calc(70vh - 1px);
}
.thread-panel-bar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bdr);
}
.thread-panel-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase}
.thread-close-btn{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:18px;line-height:1;padding:4px;transition:color .15s}
.thread-close-btn:hover{color:var(--amber-b)}
/* Concept grid — 2 cols on desktop, 1 on mobile */
.thread-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.thread-concept-btn{width:100%;background:none;border:1px solid var(--bdr2);padding:9px 12px;text-align:left;cursor:pointer;border-radius:3px;transition:all .15s}
.thread-concept-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.thread-concept-name{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.8px;color:var(--txt2);display:block;margin-bottom:4px}
.thread-concept-chain{font-size:11px;color:var(--txt3);line-height:1.5}
/* Active thread view */
.thread-back-btn{background:none;border:none;padding:0;cursor:pointer;font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--amber-b);text-transform:uppercase;transition:opacity .15s}
.thread-back-btn:hover{opacity:.7}
.thread-active-title{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--amber-b);margin:10px 0 14px}
.thread-steps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.thread-step{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--bdr2);border-radius:3px;font-size:12.5px;color:var(--txt2)}
.thread-step-yr{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);white-space:nowrap;margin-top:2px;flex-shrink:0;min-width:56px}
.thread-step-txt{line-height:1.6;color:var(--txt2)}
.thread-step-civ{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);margin-bottom:3px}

/* ── COMPARE MODE ── */
.compare-wrap{display:flex;gap:0;height:100%;width:100%}
.compare-col{flex:1;min-width:0;overflow-y:auto;padding:16px;border-right:1px solid var(--bdr)}
.compare-col:last-child{border-right:none}
.compare-col-hdr{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--amber-b);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.compare-remove{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:14px;padding:2px}
.compare-remove:hover{color:var(--amber-b)}
.compare-prompt{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--txt3);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:20px;opacity:.6}
.compare-diff{background:var(--amber-xx);border-left:2px solid var(--amber-b);padding:6px 8px;margin-bottom:2px}


/* ── SHARE TOAST ── */
.share-toast{position:fixed;bottom:108px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel);border:1px solid var(--bdr);padding:8px 18px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1.5px;color:var(--amber-b);text-transform:uppercase;border-radius:20px;opacity:0;transition:all .3s;pointer-events:none;z-index:500;white-space:nowrap}
.share-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── RESPONSIVE MODE BAR ── */
@media(max-width:768px) and (orientation:portrait){
  .mode-bar{height:34px;padding:0 10px;top:48px}
  .mode-btn{font-size:8.5px;padding:3px 9px}
  .main{top:82px!important}
}
@media(max-width:900px) and (orientation:landscape){
  .mode-bar{height:32px}
  .main{top:84px!important}
}

/* ── SOUND ── */
.sound-btn{background:none;border:1px solid var(--bdr);padding:3px 8px;cursor:pointer;font-size:13px;border-radius:3px;color:var(--txt3);transition:all .15s;flex-shrink:0}
.sound-btn:hover,.sound-btn.playing{background:var(--amber-x);border-color:var(--amber-b);color:var(--amber-b)}
.sound-artifact{font-size:11px;line-height:1.55;color:var(--txt3);font-style:italic;padding:8px 10px;border-left:2px solid var(--bdr);margin:10px 0 14px;background:var(--amber-xx)}

/* ── FINGERPRINT CHART ── */
.fp-wrap{margin:14px 0 6px}
.fp-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;margin-bottom:8px}
.fp-svg{display:block;margin:0 auto}
.fp-label{font-family:'Cinzel',serif;font-size:8px;fill:var(--txt3)}
.fp-poly{fill:rgba(232,152,32,.18);stroke:#e89820;stroke-width:1.2}
.fp-grid{fill:none;stroke:var(--bdr);stroke-width:.5}

/* ── CONTEMPORARY BAR ── */
.contemp-wrap{margin:12px 0 4px}
.contemp-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;cursor:pointer;transition:opacity .15s}
.contemp-bar-row:hover{opacity:.75}
.contemp-bar-nm{font-family:'Cinzel',serif;font-size:8.5px;color:var(--txt3);width:80px;flex-shrink:0;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.contemp-bar-track{flex:1;height:5px;background:var(--bdr2);border-radius:2px;position:relative}
.contemp-bar-fill{position:absolute;top:0;height:100%;border-radius:2px;opacity:.7}
.contemp-bar-yr{font-family:'Cinzel',serif;font-size:7.5px;color:var(--txt3);white-space:nowrap;width:60px;text-align:right;flex-shrink:0}

/* ── DENSITY SPARKLINE ── */
#density-bar{height:18px;width:100%;display:block;margin-bottom:1px}

/* ── WHAT-IF MODE ── */
.whatif-civ-btn{width:100%;background:none;border:1px solid var(--bdr2);padding:7px 10px;text-align:left;cursor:pointer;font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.5px;color:var(--txt2);margin-bottom:3px;border-radius:2px;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.whatif-civ-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.whatif-civ-btn.selected{background:rgba(232,37,26,.12);border-color:#e8251a;color:#e8251a}
.whatif-result{margin-top:12px;padding:12px;border:1px solid var(--bdr);border-radius:3px;background:var(--panel2)}
.whatif-chain{padding:6px 0;border-bottom:1px solid var(--bdr2);font-size:12px;color:var(--txt2)}
.whatif-chain:last-child{border-bottom:none}
.whatif-chain.lost{color:#e8251a;text-decoration:line-through;opacity:.6}
.whatif-intro{font-size:13px;line-height:1.7;color:var(--txt2);font-style:italic;margin-bottom:12px}

/* ── HERITAGE MODE ── */
.heritage-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.heritage-btn{background:none;border:1px solid var(--bdr2);padding:8px 6px;cursor:pointer;font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.5px;color:var(--txt2);border-radius:2px;transition:all .15s;text-align:center}
.heritage-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.heritage-btn.active{background:var(--amber-x);border-color:var(--amber-b);color:var(--amber-b)}
.heritage-civ{padding:5px 0;border-bottom:1px solid var(--bdr2);font-size:12.5px;cursor:pointer;transition:color .15s}
.heritage-civ:hover{color:var(--amber-b)}
.heritage-civ-nm{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);display:block;margin-bottom:2px}
.heritage-civ-why{font-size:11px;color:var(--txt3)}

/* ── DIPLOMATIC CONNECTIONS ── */

const CIVS=[
  {id:'mesopotamia',fp:{mil:8,com:9,art:7,sci:9,reach:6,lon:10},music:{scale:'lydian',root:58,tempo:60,timbre:'pluck',rhythm:[1,0,0,1,0,0,1,0],reverb:.4,artifact:'Bull-headed lyre, Royal Cemetery of Ur (c.2500 BCE); Hurrian Hymn No.6 (c.1400 BCE) — oldest notated melody on record'},lon:44,lat:33,nm:'Mesopotamia',sb:'Tigris-Euphrates Civilizations',x:585,y:192,s:-4000,e:500,
   conns:['egypt','persia','india'],
   overview:'The world\'s first cities rose in the alluvial plains between the Tigris and Euphrates around 4000 BCE — not from genius alone, but from the ecological pressure of irrigating dry land at scale, which demanded record-keeping, law, and bureaucracy. Sumer, Akkad, Babylon, and Assyria succeeded one another as dominant powers over three millennia, each collapse absorbed by the next dynasty\'s rise. This civilisation gave humanity writing, the wheel, the 60-minute hour, the first law code, and the oldest story ever told — Gilgamesh confronting death and finding no answer but the fact of friendship. Its rivers are polluted and its ruins half-buried in sand, but the institutional DNA of every government on Earth descends from the clay tablets of its scribes.',
   d:{
    economy:'Invented the world\'s first market economies — standardized weights, clay-tablet credit records, interest-bearing loans, and price-fixing under royal decree. The Code of Hammurabi regulated commercial law in 1754 BCE.',
    political:'The first city-states evolving into empires: Sumer, Akkad, Babylon, Assyria. The Code of Hammurabi\'s 282 laws governing property, commerce, and justice represent the earliest attempt at codified governance.',
    art:'Ziggurat temple towers rising from the flood plains; cylinder seals of extraordinary intricacy; lamassu guardian figures of winged bulls. The first identifiable school of urban aesthetic design in history.',
    literature:'The Epic of Gilgamesh (c. 2100 BCE) — humanity\'s oldest written narrative — grapples with friendship, hubris, the terror of mortality, and a great flood that predates Noah by a millennium.',
    military:'Professional standing armies, siege machinery, the war chariot, and composite bows. The Assyrian war machine industrialised violence and pioneered psychological warfare through systematic population transfer.',
    science:'The wheel, the 60-minute hour, the 360-degree circle, the base-60 number system, and systematic astronomical record-keeping accurate enough to predict eclipses centuries in advance.',
    medicine:'Medical diagnostic texts from 2000 BCE document rational assessment of symptoms, differentiated from magical treatment. The first recorded surgical procedures appear in Assyrian texts.',
    religion:'Polytheistic pantheons tightly bound to natural forces — Enlil (wind), Ea (water), Inanna (love and war). Temple complexes functioned simultaneously as granaries, banks, courts, and houses of god.',
    legacy:'Writing, legal codes, the 60-based time system we still use, urban planning, mathematics, and the very concept of organised civic governance. Nearly every institutional foundation traces to this river valley.',
    gender:'Hammurabi\'s Code reveals a deeply patriarchal society where women could own property and conduct business but were legally subordinate to fathers and husbands; the naditu priestesses of Nippur represent a remarkable exception — celibate women managing substantial temple estates with legal autonomy.',
    slavery:'Debt slavery as the primary form — free citizens falling into bondage through default, with legal mechanisms for redemption; chattel slavery from warfare; the temple estates of Sumer employing thousands of dependent workers in conditions ranging from supervised labour to full chattel ownership.',
    collapse:'The successive collapse of Akkad (2154 BCE, possibly from volcanic winter), Old Babylon (1595 BCE, Hittite sack), and ultimately the Assyrian Empire (612 BCE, Babylonian-Median coalition) — each collapse followed by cultural continuity under new political masters.',
    trade:'The world\'s first documented long-distance trade network — lapis lazuli from Afghanistan, cedar from Lebanon, copper from Oman — all passing through Mesopotamian trading houses documented on clay tablets; the merchant (tamkārum) as a legally protected professional class.',
    language:'Cuneiform — the world\'s first writing system (c. 3400 BCE), invented for accounting and evolving into literature, law, and astronomy; Sumerian giving way to Akkadian as the lingua franca of the ancient Near East, used in diplomacy from Egypt to Anatolia.',
    technology:'The wheel (c. 3500 BCE), the plough, bronze casting, the sailboat, the arch, irrigation canal engineering, and kiln-fired brick — a cluster of foundational technologies invented or refined in Mesopotamia that defined the material basis of all subsequent civilisation.',
    ecology:'The Fertile Crescent\'s gift of wild wheat, barley, and domesticable animals enabled the agricultural revolution; but intensive irrigation progressively salinised the soil — the slow ecological collapse of Mesopotamian agriculture across 2,000 years is one of history\'s first documented cases of civilisation-scale environmental degradation.',
    food:'Wheat and barley as the dual foundation; beer (brewed from barley) as a safer and more caloric drink than water, ration-distributed to workers by the state; the world\'s oldest recipe (a beer-bread recipe on a Sumerian tablet c. 1800 BCE); sheep, goats, fish, and dates completing the diet.',
    philosophy:'The Epic of Gilgamesh poses the first recorded philosophical questions: what is the meaning of friendship? Can mortality be escaped? Is a life of pleasure sufficient? — anticipating Greek philosophy by 1,500 years; Mesopotamian wisdom literature (the Dialogue of Pessimism) exploring moral nihilism with startling sophistication.',
    inequality:'A three-tier society of free citizens, dependent workers (muškenum), and slaves, with legal penalties explicitly scaled to social status — the same assault costing a free man ten shekels, a muškenum three, and a slave merely replacing the property value; inequality encoded directly into law.',
    diffusion:'The cuneiform writing system adopted by Akkadian, Elamite, Hittite, and Ugaritic languages; the flood myth transmitted into Hebrew scripture; the 60-base number system diffusing into every astronomical tradition; Mesopotamian legal concepts seeding both Hebrew law and Greek civic organisation.',
    migration:'Mesopotamia was shaped by migration from its first breath — Sumerian-speaking people arriving in the alluvial plains around 4000 BCE, possibly from the northeast, displacing or absorbing earlier Ubaid populations. The Akkadian migration from the Syrian desert (c. 2350 BCE) produced the world\'s first empire under Sargon. Later, waves of Amorites, Kassites, Aramaeans, and Chaldaeans each migrated into the river valleys, adopted Mesopotamian urban culture, and became the next ruling dynasty. The Assyrian practice of mass population transfer — deporting conquered peoples to other parts of the empire and replacing them with transplanted communities — was the ancient world\'s most deliberate use of forced migration as a political tool, relocating hundreds of thousands including the Israelites of the Northern Kingdom in 722 BCE.',
   }},
  {id:'egypt',fp:{mil:7,com:7,art:10,sci:8,reach:5,lon:10},music:{scale:'pentatonic',root:55,tempo:66,timbre:'flute',rhythm:[1,0,1,0,0,1,0,0],reverb:.35,artifact:'Arched harp depicted in tomb of Nebamun (c.1350 BCE); bone flutes and clay clappers from Predynastic period'},lon:31,lat:27,nm:'Ancient Egypt',sb:'Nile Valley · 3100 BCE – 640 CE',x:516,y:228,s:-3100,e:640,
   conns:['mesopotamia','greece','rome'],
   overview:'For three thousand continuous years — longer than the distance from Rome\'s fall to today — ancient Egypt maintained a single recognisable civilisation along the Nile\'s narrow ribbon of fertility. The pharaoh as living god anchored a redistributive economy of extraordinary stability, funding pyramids, temples, and one of the ancient world\'s richest artistic traditions. Egypt survived conquest by Assyrians, Persians, and Macedonians by absorbing its conquerors into its own identity, until Rome finally extinguished the pharaonic tradition in the 1st century BCE. Its real legacy is theological: the Aten hymn\'s monotheism, the afterlife judgement\'s moral accounting, and the dying-and-rising god all flowed forward into Judaism, Christianity, and Islam.',
   d:{
    economy:'Nile flood-driven agricultural surplus funded a state-redistributive economy of remarkable stability, sustaining monumental construction projects continuously for 30 dynasties across 3,000 years.',
    political:'The divine pharaoh as god-king — the longest-running centralised monarchic tradition in history, fusing religious authority with absolute administrative control of the Nile\'s resources.',
    art:'A unified aesthetic canon maintained across 3,000 years with extraordinary consistency: hieroglyphic script, monumental temple sculpture in strict frontal pose, and painted tomb narratives of breathtaking colour.',
    literature:'The Book of the Dead, Wisdom texts (The Maxims of Ptahhotep), Hymns to Aten, and lyrical love poetry — a tradition revealing sophisticated theological and emotional inner lives over 30 dynasties.',
    military:'Professional bronze and iron armies, war chariots, a river-navigating navy, and the world\'s first recorded peace treaty — the Treaty of Kadesh with the Hittites (1259 BCE).',
    science:'Advanced mathematics enabling pyramid construction with near-perfect alignment to cardinal points; a 365-day solar calendar; surgical and anatomical knowledge documented in the Edwin Smith Papyrus.',
    medicine:'The Edwin Smith Papyrus (c. 1600 BCE) is the world\'s oldest known surgical text — describing 48 clinical cases with rational diagnosis, prognosis, and physical treatment devoid of magic.',
    religion:'An elaborate afterlife theology, 2,000 named deities, and the practice of mummification designed to preserve the body for eternity. Akhenaten\'s short-lived monotheism (1353–1336 BCE) foreshadowed all Abrahamic religion.',
    legacy:'The pyramids as enduring civilizational symbols; proto-monotheism seeding Abrahamic religion; architectural principles embedded in every subsequent Western civic building from the Capitol to the British Museum.',
    gender:'Egyptian women enjoyed more legal rights than almost any other ancient society — owning property, initiating divorce, conducting business, and testifying in court; female pharaohs (Hatshepsut, Nefertiti, Cleopatra) represent genuine political power; yet the domestic ideal of wife and mother remained the normative expectation.',
    slavery:'Egyptian slavery was more varied than Roman chattel slavery — prisoners of war, debt bondage, and hereditary servitude coexisting; the pyramid builders were NOT slaves but state-employed workers paid in beer, bread, and medical care, as confirmed by administrative papyri and skeletal evidence.',
    collapse:'Three Intermediate Periods of fragmentation; the Bronze Age Collapse (1200 BCE) nearly ending the New Kingdom; the Persian conquest (525 BCE); the Macedonian conquest (332 BCE) — yet Egyptian cultural identity persisted through all of them, the longest civilisational continuity in history.',
    trade:'Punt expeditions for incense, ebony, and gold; Byblos for cedar; Nubia for ivory and slaves; the Nile as Egypt\'s internal highway; New Kingdom trade networks extending to Mesopotamia, Crete, and the Aegean — Egyptian faience beads found as far as Britain.',
    language:'Hieroglyphic script (c. 3200 BCE) — monumental and sacred; hieratic (cursive) for administrative documents; demotic for everyday use; the Rosetta Stone\'s trilingual inscription (196 BCE) enabling Champollion\'s 1822 decipherment, unlocking 3,000 years of silenced history.',
    technology:'Pyramid construction achieving near-perfect cardinal alignment and levelling across 230 metres using only copper tools, wooden sledges, and human labour; papyrus as the world\'s first practical writing medium; the shaduf irrigation device; faience glass production.',
    ecology:'The Nile inundation as Egypt\'s entire ecological foundation — depositing fresh silt annually, requiring no fertiliser; Egyptian civilisation was the Nile\'s gift, its boundaries defined precisely by the flood\'s reach; drought years threatening the agricultural surplus that sustained the entire state structure.',
    food:'Bread (over 40 varieties documented) and beer as the dietary foundation; the Nile\'s fish; onions, leeks, garlic, and legumes; beef for the elite; the worker\'s ration of bread, beer, and onions documented in pyramid construction records — one of history\'s first documented labour nutrition systems.',
    philosophy:'Ma\'at — the concept of cosmic order, truth, and justice as the foundation of existence — is one of the oldest ethical frameworks in history; the Negative Confessions of the Book of the Dead (forty-two moral prohibitions) represent the earliest documented moral code predating the Ten Commandments by centuries.',
    inequality:'A sharply stratified society with the pharaoh at apex, followed by nobles, priests, scribes, artisans, farmers, and slaves; yet the state\'s redistributive granary system provided a basic safety net, and social mobility through the scribal profession was genuinely possible.',
    diffusion:'Egyptian religious concepts (the dying and resurrecting god, the afterlife judgement, monotheistic impulses in Atenism) feeding directly into Judaism, Christianity, and Gnosticism; Egyptian architectural forms adopted by Greece and Rome; the calendar diffusing through Hellenistic astronomy into the Julian and Gregorian systems.',
    migration:'Egypt\'s Nile corridor acted as both magnet and filter for migration — the delta\'s fertility drawing settlers while the surrounding desert prevented casual entry. The Hyksos migration (c. 1650 BCE) brought Levantine people with horse-drawn chariots into the delta, ruling as the 15th Dynasty for a century before Egyptian expulsion — a trauma so profound it shaped Egyptian xenophobia for a millennium. Nubian populations moved north into Egypt during periods of Kushite political expansion, including the 25th Dynasty\'s full conquest. Greek settlers colonised the delta from the 7th century BCE, founding Naucratis; Alexander\'s founding of Alexandria (331 BCE) initiated a permanent Greek and later Jewish demographic layer in Egypt that persisted for centuries.',
   }},
  {id:'greece',fp:{mil:7,com:7,art:10,sci:10,reach:7,lon:4},music:{scale:'dorian',root:62,tempo:76,timbre:'flute',rhythm:[1,0,1,1,0,1,0,0],reverb:.25,artifact:'Seikilos Epitaph (1st century CE) — oldest surviving complete song; aulos depicted on thousands of Attic vases'},lon:22,lat:38,nm:'Classical Greece',sb:'Aegean World · 800–146 BCE',x:490,y:155,s:-800,e:146,
   conns:['egypt','persia','rome','islamicworld'],
   overview:'In the three centuries between roughly 500 and 200 BCE, a constellation of small city-states on the Aegean periphery produced philosophy, democracy, theatre, geometry, and systematic science — the entire intellectual framework that Western civilisation still inhabits. Athens was simultaneously the world\'s most radical democracy and a slave economy whose female population were legal non-persons; Sparta produced the West\'s first professional army and a constitution Plato admired. After Alexander\'s conquests spread Greek culture from Egypt to Central Asia, the political polis era ended, but Hellenism became the medium through which all subsequent Mediterranean thought was conducted. The Greek question — what is the good life, what is the just city — has never been answered, only elaborated.',
   d:{
    economy:'The Mediterranean\'s first coined-money economies; merchant banking and maritime trade networks stretching from the Black Sea to Iberia; the first theorisation of economic life by Aristotle.',
    political:'Athenian democracy, Spartan oligarchy, Macedonian monarchy — a laboratory of governance whose debates on justice, tyranny, and the ideal constitution constitute the foundation of all Western political philosophy.',
    art:'The Classical ideal: the Parthenon\'s mathematical perfection, Phidias\' chryselephantine Zeus, Praxiteles\' Aphrodite — a Western aesthetic canon whose reverberations are still felt 2,500 years later.',
    literature:'Homer, Sophocles, Euripides, Aristophanes, Plato, Aristotle — the origination of epic poetry, tragedy, comedy, philosophical dialogue, and rhetorical prose that every subsequent Western tradition inherits.',
    military:'The hoplite phalanx; the naval victory at Salamis; Alexander\'s oblique cavalry charge at Gaugamela — tactical innovations studied at West Point and Sandhurst to this day.',
    science:'Pythagoras, Euclid, Archimedes, Hipparchus — the invention of systematic geometry, physics, and observational astronomy as formal disciplines, separating natural inquiry from mythology.',
    medicine:'Hippocrates (460–370 BCE) separated medicine from religion, established clinical observation as method, created the first medical ethics (\'first, do no harm\'), and built rational diagnostic practice.',
    religion:'The Olympian pantheon, the Eleusinian Mysteries, and the Pre-Socratic philosophical turn from mythos to logos — bridging animistic polytheism and the monotheistic traditions that would follow.',
    legacy:'Democracy, the scientific method, philosophy, mathematics, drama, the Olympic games, and Western aesthetics. Perhaps the single most densely impactful civilization in all of human history.',
    gender:'Athenian women were legally non-persons — confined to the domestic sphere, excluded from political life, unable to own property or appear in court; yet Spartan women owned land, exercised publicly, and wielded real social power; the gap between Athenian philosophical ideals of reason and women\'s actual exclusion from them is democracy\'s founding contradiction.',
    slavery:'The Athenian democracy was built on a slave economy — estimates suggest 30–40% of the population were enslaved; the silver mines at Laurion where 30,000 slaves worked in lethal conditions funded the fleet that defeated Persia; Greek philosophical rationalisation of natural slavery (Aristotle) shaped Western thought on the subject for 2,000 years.',
    collapse:'The Peloponnesian War (431–404 BCE) exhausting Athens and Sparta simultaneously; Philip II\'s Macedonian conquest (338 BCE) ending the polis era; yet Greek culture experienced its greatest expansion AFTER political collapse, through Alexander\'s conquests spreading Hellenism across three continents.',
    trade:'The Mediterranean as a Greek lake — colonies from Spain to the Black Sea functioning as a commercial network; the emporion (trading post) as a legal institution; grain from the Black Sea feeding Athens; silver from Laurion financing imports; the first private maritime insurance contracts.',
    language:'The Greek alphabet (adapted from Phoenician c. 800 BCE, adding vowels) as the ancestor of Latin, Cyrillic, and Coptic scripts — and through Latin of all Western European writing; Koine Greek as the Mediterranean\'s first truly international language, used by Paul to write the New Testament.',
    technology:'The Antikythera mechanism (c. 100 BCE) — an analogue astronomical computer of extraordinary complexity, representing a level of mechanical sophistication not seen again until the 14th century; the Archimedes screw, the catapult, the trireme warship, and systematic urban planning on the Hippodamian grid.',
    ecology:'Deforestation of the Greek hillsides for shipbuilding and agriculture — Plato explicitly describing the Attic landscape as a skeleton stripped of its soil — represents one of the ancient world\'s most documented cases of ecological degradation; the thin soils driving Greek maritime colonisation as an ecological adaptation.',
    food:'The Mediterranean triad — wheat, olive oil, wine — as both diet and cultural identity; the symposium (wine-drinking party) as the primary institution of male intellectual and social life; Archestratus\' Hedypatheia (c. 350 BCE) as the ancient world\'s first food writing, a gastronomic tour of the Mediterranean.',
    philosophy:'The invention of philosophy itself — the systematic use of reason to examine existence, ethics, politics, and knowledge without reference to divine authority; Socrates, Plato, Aristotle, the Stoics, the Epicureans — a 300-year flowering of rational inquiry that defined the intellectual framework of Western civilisation.',
    inequality:'Citizenship as the sharpest social divide — excluding women, slaves, and metics (resident foreigners) from political participation; Athenian democracy was radical equality among a minority; the philosophical defence of natural hierarchy (Plato\'s Republic, Aristotle\'s Politics) as the ideological foundation of all subsequent aristocratic thought.',
    diffusion:'The most intellectually productive diffusion event in history — Alexander\'s conquests spreading Greek language, philosophy, science, and art from Egypt to India, producing Hellenistic fusion cultures that transmitted Greek thought to Rome, the Islamic world, and ultimately modern Europe.',
    migration:'Greek civilisation was built on migration in both directions. The Dorian migrations (c. 1100 BCE) following the Bronze Age Collapse displaced earlier Mycenaean populations, producing the Greek Dark Ages and the demographic reshuffling that created the classical city-states. Greek colonisation (750–500 BCE) then projected migrants outward across the Mediterranean — founding Massalia (Marseille), Neapolis (Naples), Syracuse, and 150 other colonies from the Black Sea to Spain, each a deliberate demographic export of surplus population. Alexander\'s campaigns (334–323 BCE) were the greatest Greek migration event — 40,000 soldiers who never returned, settling in new cities from Egypt to Afghanistan, and the beginning of the Hellenistic demographic layer across the eastern Mediterranean.',
   }},
  {id:'rome',fp:{mil:10,com:9,art:8,sci:7,reach:10,lon:9},music:{scale:'mixolydian',root:60,tempo:88,timbre:'brass',rhythm:[1,1,0,1,0,1,1,0],reverb:.3,artifact:'Hydraulis (water organ) invented by Ctesibius of Alexandria; cornu and lituus military brass instruments documented'},lon:12,lat:42,nm:'Roman Empire',sb:'Mediterranean World · 500 BCE – 476 CE',x:462,y:148,s:-500,e:476,
   conns:['greece','egypt','persia','byzantine'],
   overview:'Rome grew from a Latin hill town to the master of a 70-million-person empire spanning three continents, sustained by the most sophisticated administrative, legal, and military system the ancient world produced. The Republic\'s constitutional innovations — separation of powers, popular assemblies, rule of law — gave way to the Empire\'s principate, which maintained stability for 200 years before fiscal exhaustion, pandemic, and overextension began the long unravelling. The Western Empire fell in 476 CE, but Rome never really ended: its language became six modern tongues, its law the foundation of every European legal system, its Church the most powerful institution in the medieval world. When you obey a contract, drive on a straight road, or invoke civic rights before the law, you are living inside Rome\'s afterlife.',
   d:{
    economy:'A 70-million-person free trade zone unified by 80,000km of paved roads, standardised coinage (the denarius), sophisticated contract law, and commercial banking at a scale not seen again until early modern Europe.',
    political:'The Republic\'s senate, tribunes, and consular system; the Empire\'s principate — the institutional blueprints for modern republican governance, separation of powers, and constitutional law.',
    art:'Concrete enabling the arch, vault, and dome; portrait sculpture of psychological intensity; Trajan\'s Column\'s 2,500 narrative figures — engineering elevated to monumental artistic and propagandistic form.',
    literature:'Virgil\'s Aeneid, Cicero\'s rhetoric, Tacitus\' histories, Ovid\'s Metamorphoses — Latin literature that formed the structural vocabulary of every subsequent European language and literary tradition.',
    military:'The legion system — professional, literate, engineering-capable soldiers who built roads and forts as readily as they fought. The first industrial-scale military, operating across three continents simultaneously.',
    science:'Applied engineering of unmatched scale: 80,000km of roads, 900km of aqueducts supplying Rome alone, underfloor hypocaust heating, concrete harbour construction, and sewage systems still partially in use.',
    medicine:'Military field medicine; public health infrastructure of aqueducts and the Cloaca Maxima sewers; Galen\'s anatomical theories, extracted from gladiatorial wounds, dominating European medicine for 1,400 years.',
    religion:'Roman polytheism transitioning to Christianity as the official state religion under Constantine — the most consequential religious-political transformation in Western history, reshaping every century that followed.',
    legacy:'Roman law as the basis of every European legal system; Latin as the ancestor of six modern languages; Christianity\'s global institutionalisation; the very word \'civilisation\' deriving from the Roman \'civitas\'.',
    gender:'Roman women of the imperial period had more practical freedom than their Greek predecessors — managing estates, conducting business, and wielding political influence through male relatives; the materfamilias commanded genuine household authority; yet legal patria potestas gave fathers power of life and death over wives and children.',
    slavery:'The most industrialised slave economy in antiquity — 2–3 million enslaved people in Italy alone at the height of the Republic (perhaps 35% of the population); the slave revolt of Spartacus (73–71 BCE) with 120,000 followers; the gladiatorial industry as public spectacle of slave violence; slavery as the economic engine of the entire system.',
    collapse:'The Western Empire\'s fall (476 CE) as a 200-year process of fiscal exhaustion, military overextension, pandemic (Antonine Plague, Plague of Cyprian), and political fragmentation — not a sudden barbarian conquest but a slow systemic failure; the Eastern Empire surviving as Byzantium for another 1,000 years.',
    trade:'A 70-million-person free trade zone — the largest in history until the modern era — connected by 80,000km of paved roads; Roman merchant ships reaching India and possibly China; the Roman trade deficit with the East (paid in gold) contributing to monetary debasement and eventual fiscal collapse.',
    language:'Latin as the ancestor of French, Spanish, Portuguese, Italian, Romanian, and Catalan (900 million native speakers today); Latin persisting as the language of European science, law, and religion for 1,400 years after Rome\'s fall; the Latin alphabet used by 70% of the world\'s writing systems.',
    technology:'Concrete (opus caementicium) enabling the Pantheon\'s 43-metre dome — unsurpassed until 1436; 900km of aqueducts; hypocaust underfloor heating; standardised brick production; the road system enabling military and commercial speed unprecedented before the railway age.',
    ecology:'Roman agriculture exhausting the soils of North Africa — once the breadbasket of the Mediterranean, now largely desert; lead pipes and lead-lined wine vessels causing chronic poisoning among the elite; the Roman Empire\'s ecological footprint visible in Greenland ice cores showing atmospheric lead pollution.',
    food:'Garum (fermented fish sauce) as Rome\'s universal condiment — the umami of the ancient world, traded in amphorae across the entire empire; the Roman grain dole (annona) feeding 200,000 Romans for free as political tool; Apicius\' cookbook (c. 4th century CE) as the ancient world\'s most complete culinary record.',
    philosophy:'Stoicism as Rome\'s defining philosophical contribution — Marcus Aurelius\' Meditations, Seneca\'s Letters, Epictetus\' Discourses — a practical ethics of rational acceptance and civic duty that remains one of the most widely read philosophical traditions in the contemporary world.',
    inequality:'The Gracchi brothers\' land reform attempts (133–121 BCE) revealing extreme wealth concentration — a handful of senatorial families controlling most of Italy\'s agricultural land while dispossessed citizens flooded Rome; the social war and then Caesar\'s populism as political consequences of structural inequality.',
    diffusion:'Roman law as the basis of every European legal system; Latin vocabulary embedded in all European languages; Christian institutional organisation modelled on Roman provincial administration; the Roman road network defining European settlement patterns still visible in modern maps.',
    migration:'Rome\'s entire history is a migration story. The city itself was legendarily founded by refugees (Aeneas from Troy, Romulus\'s asylum-seekers). Roman expansion absorbed migrants — Latin, Etruscan, Oscan, Greek — into a citizenship that was itself a migration from ethnic to civic identity. The Empire\'s frontier armies were populated by Germans, Syrians, North Africans, and Britons serving far from home. The 3rd–5th century \'barbarian migrations\' (Völkerwanderung) — Visigoths, Vandals, Huns, Ostrogoths — were the largest sustained population movement in European history to that point, fundamentally reshaping the demographic map of the Western Empire and producing the ethnic foundations of medieval Europe.',
   }},
  {id:'persia',fp:{mil:9,com:8,art:7,sci:6,reach:9,lon:8},music:{scale:'arabic',root:62,tempo:72,timbre:'oud',rhythm:[1,0,1,0,1,1,0,1],reverb:.4,artifact:'Barbat (long-necked lute, ancestor of oud) depicted in Sassanid silver reliefs (c.500 CE); Persian dastgah modal system documented from medieval sources'},lon:53,lat:32,nm:'Persian Empire',sb:'Achaemenid & Sassanid · 550 BCE – 651 CE',x:612,y:182,s:-550,e:651,
   conns:['mesopotamia','greece','india','islamicworld'],
   overview:'The Achaemenid Empire founded by Cyrus the Great in 550 BCE was the ancient world\'s first deliberate attempt at multi-ethnic, multi-religious governance at continental scale — twenty satrapies, fifty peoples, one administrative system, with local languages, laws, and customs preserved rather than suppressed. At its height it held half the world\'s population. Successive waves of conquest — Macedonian, Parthian, Sassanid, Arab — brought political rupture, but Persian cultural identity proved indestructible: it absorbed the Arab conquest so thoroughly that the Islamic Golden Age wrote its poetry in Persian and staffed its bureaucracies with Persian administrators. Today, Iran is one of the ancient world\'s few living civilisational successors, its language a direct descendant of Old Persian.',
   d:{
    economy:'Darius I\'s Royal Road (2,700km) enabled commerce across 20 satrapies. Standardised Daric gold coinage, an imperial postal system, and regulated weights and measures created the first imperial monetary system.',
    political:'The satrapy model — governing 50 million people across 20 distinct ethnic groups through regional governors who maintained local customs, laws, and religions while paying tribute. The template for all subsequent empire.',
    art:'Persepolis — a ceremonial capital synthesising Babylonian column capitals, Egyptian winged sun disks, Greek Ionic details, and Persian glazed brick — the first deliberately cosmopolitan imperial aesthetic.',
    literature:'The Zoroastrian Avesta; Achaemenid royal inscriptions at Behistun (in Elamite, Babylonian, and Old Persian); court chronicles defining imperial self-presentation across three languages simultaneously.',
    military:'The Immortals — a 10,000-strong elite force maintained precisely at full strength, replacing casualties instantly; combined arms cavalry, war elephants, and siege engineering that threatened to conquer Greece.',
    science:'Astronomical observation inherited from Babylon; qanat underground water channels enabling agriculture in arid regions that still function today; a cartographic tradition covering three continents.',
    medicine:'Persian court physicians were among the most sought-after in the ancient world; early systematic pharmacology; the first recorded use of inoculation-adjacent practices against certain diseases.',
    religion:'Zoroastrianism — the first great dualistic monotheism (Ahura Mazda / Ahriman, light / dark, good / evil) — directly shaping the theology of Judaism during the Babylonian Captivity, and through it Christianity and Islam.',
    legacy:'Zoroastrian concepts of cosmic moral duality embedded in all Abrahamic religion; satrap administrative governance as the prototype for provincial empire; and Persian culture surviving as one of the world\'s most continuous civilizations.',
    gender:'Achaemenid women of the royal household wielded significant economic power — the Persepolis Fortification Tablets document women administrators (aršabara) managing large workforces and receiving equal rations to men for equal work; the harem was an administrative institution as much as a domestic one.',
    slavery:'The Persepolis tablets reveal that the pyramid builders and palace workers of the Achaemenid empire were paid WAGE WORKERS, not slaves — rations, silver payments, and maternity allowances documented for female workers — a labour system markedly more humane than contemporary Egypt or Greece.',
    collapse:'Alexander\'s conquest (334–330 BCE) destroying the Achaemenid state in four years; the Sassanid revival (224 CE) recreating a Persian empire lasting 400 years; the Arab-Islamic conquest (637–651 CE) ending Sassanid rule — yet Persian language and culture survived and ultimately transformed its conquerors.',
    trade:'The Royal Road (2,700km, Susa to Sardis) with waystations every 25km enabling 7-day courier travel across what took 90 days on foot; the first imperial postal system (chapar); Achaemenid trade networks connecting India, Central Asia, Egypt, and Greece in a single administrative zone.',
    language:'Old Persian cuneiform on royal inscriptions; Aramaic as the imperial administrative lingua franca across 20 peoples; the Behistun inscription in three scripts as the Rosetta Stone of cuneiform; modern Persian (Farsi) as a direct descendant with one of the world\'s richest literary traditions.',
    technology:'The qanat — underground irrigation channels tapping mountain aquifers and carrying water tens of kilometres to desert settlements — an engineering system still supplying water to millions in Iran, Afghanistan, and North Africa 2,500 years after invention.',
    ecology:'The qanat system transforming arid landscapes into productive agricultural zones; the Persian paradaeza (paradise garden) as a cultivated ecological ideal — walled gardens of fruit trees, water features, and shade — that gave the English word "paradise" and defined the Islamic garden tradition.',
    food:'The Persian imperial kitchen feeding 15,000 people daily at Persepolis, documented in remarkable administrative detail; rice cultivation introduced to the Near East from India through Persian intermediary; the layered rice dish (polo) as the origin of the pilaf tradition spanning from Spain to India.',
    philosophy:'Zoroastrian ethics as the first systematic moral philosophy of cosmic scale — Ahura Mazda versus Ahriman as the embodiment of good versus evil, truth versus lie; the concept of individual moral choice determining cosmic outcome; free will as a theological and philosophical necessity.',
    inequality:'The satrapy system producing extreme wealth concentration at the court while maintaining formal legal equality among free subjects; the Persepolis tablets\' wage records suggesting more economic equity in practice than contemporary Mediterranean slave economies.',
    diffusion:'Zoroastrian dualism seeding the moral architecture of all Abrahamic religion; the administrative satrapy model adopted by Alexander, the Seleucids, and ultimately the Romans; the Persian garden tradition spreading through Islamic culture from Spain to India; polo, chess, and backgammon as Persian cultural exports.',
    migration:'The Achaemenid Persians were themselves migrants — Iranian-speaking nomads who moved south from the Central Asian steppe onto the Iranian plateau around 1000 BCE, displacing and absorbing Elamite populations. The empire they built was a managed migration system: the Royal Road enabled administrative movement; the satrap system moved Persian administrators into every province; and the Persepolis Fortification Tablets document workers from India, Egypt, and Central Asia all present simultaneously at the imperial capital. After Alexander\'s conquest, Greek settlers flooded into Persian territories, creating the Hellenistic demographic layer; after the Arab conquest, Persian administrators and scholars migrated into the Islamic world\'s new capital cities, carrying Persian culture into the heart of the caliphate.',
   }},
  {id:'india',fp:{mil:6,com:9,art:9,sci:10,reach:7,lon:10},music:{scale:'phrygian',root:60,tempo:68,timbre:'sitar',rhythm:[1,0,0,1,0,1,0,0],reverb:.5,artifact:'Veena codified in Natya Shastra (c.200 BCE); Gupta-era bronze bells; Bihar terracotta musicians c.500 BCE; 22-shruti tonal system documented'},lon:78,lat:22,nm:'Indian Subcontinent',sb:'Indus Valley to Mughal · 2600 BCE – 1857 CE',x:668,y:255,s:-2600,e:1857,
   conns:['persia','china','islamicworld','mesopotamia'],
   overview:'Indian civilisation\'s most remarkable feature is its sheer continuity — from the Indus Valley\'s planned cities of 2600 BCE through the Vedic period, the Mauryan and Gupta empires, the Mughal synthesis, and into the present, a thread of philosophical, religious, and aesthetic tradition connects 4,600 years of unbroken habitation. It was the world\'s largest economy for most of recorded history, the birthplace of four world religions, and the source of the mathematical inventions (zero, decimal numerals) that make all modern computation possible. The jati system simultaneously provided social stability and encoded deep structural inequality. Contemporary India is the world\'s most populous democracy and one of its fastest-growing economies — a civilisation that was never fully colonised in spirit, whatever Britain achieved politically.',
   d:{
    economy:'The world\'s largest economy for most of recorded history, generating an estimated 25–33% of global GDP as late as 1700. Maritime spice trade networks connecting Rome to China; the first international trade documentation.',
    political:'The Mauryan empire\'s rational statecraft (Kautilya\'s Arthashastra, the world\'s first treatise on statecraft); Ashoka\'s Buddhist welfare state; Mughal Ain-i-Akbari tax administration — 4,000 years of diverse governance models.',
    art:'Temple architecture from Ellora to Khajuraho; Mughal miniature painting of jewel-like detail; Bharatanatyam codified in the Natya Shastra; Chola bronze sculpture — one of the world\'s most continuous aesthetic traditions.',
    literature:'The Mahabharata and Ramayana (the world\'s longest epics at 1.8 million and 480,000 words); the Upanishads; Kalidasa\'s Shakuntala; the Panchatantra — foundational texts spanning religion, philosophy, and narrative craft.',
    military:'The war elephant corps (adopted by every civilisation that encountered it — Carthage, Persia, the Seleucids); Chandragupta\'s 600,000-strong professional army; Maratha guerrilla tactics; Mughal artillery warfare.',
    science:'Zero and the decimal positional number system (the most consequential mathematical invention in history); Aryabhata\'s heliocentric model (499 CE, predating Copernicus by 1,000 years); accurate calculation of pi to 3.1416.',
    medicine:'Sushruta Samhita (c. 600 BCE): the world\'s first systematic surgical text, describing rhinoplasty, cataract surgery, limb reattachment, and 120 surgical instruments. Ayurveda as a comprehensive holistic system still practised by 800 million.',
    religion:'The birthplace of Hinduism, Buddhism, Jainism, and Sikhism — four distinct world religions followed by over 2 billion people, with profound civilizational influence from Japan to Bali, from Afghanistan to Cambodia.',
    legacy:'The number system the entire world uses; Buddhist philosophy reshaping East and Southeast Asian civilizations; zero enabling all digital computing; yoga as a global practice; Sanskrit as the root of the Indo-European language family.',
    gender:'Ancient India shows extraordinary range — from the Rig Veda\'s female philosophers (Gargi, Maitreyi) debating cosmology with male sages, to the Manu Smriti\'s severe patriarchal restrictions; the devadasi temple dancer tradition offering women religious authority outside marriage; medieval bhakti saints like Mirabai defying caste and gender norms through religious devotion.',
    slavery:'Kautilya\'s Arthashastra (4th century BCE) codified slavery but with significant protections — slaves could own property, earn freedom, and had legal recourse against abuse; the varna/jati (caste) system as a form of hereditary occupational restriction functionally resembling unfree labour for millions at the bottom.',
    collapse:'The Harappan collapse (1900 BCE, possibly from drought and monsoon shift); the Mauryan collapse (185 BCE); repeated invasion cycles from the northwest; yet Indian civilisation demonstrated remarkable cultural continuity through political fragmentation — religion, philosophy, and Sanskrit as the connective tissue across 4,000 years.',
    trade:'The Indian Ocean trade network as the world\'s busiest commercial system for most of recorded history — Gujarati merchants in East Africa and Southeast Asia; the spice trade driving European exploration; Indian cotton textiles dominating the global market until British industrial disruption.',
    language:'Sanskrit as the liturgical and philosophical language of Hinduism, Buddhism, and Jainism across South and Southeast Asia; the Brahmi script ancestor of virtually all South and Southeast Asian scripts; zero and the decimal system as the greatest linguistic-mathematical gift to world civilisation.',
    technology:'Wootz steel (Damascus steel\'s ancestor) — a carbon-steel alloy of extraordinary hardness and flexibility produced in India from c. 300 BCE; the spinning wheel (charkha); sophisticated textile dyeing with permanent colours; iron pillar of Delhi (c. 400 CE) still rust-free after 1,600 years — an unmatched metallurgical achievement.',
    ecology:'The Arthashastra\'s forest protection laws (4th century BCE) among the world\'s earliest conservation legislation; the sacred grove (dev van) tradition protecting biodiversity; the Chipko tree-hugging movement (1973) echoing 300-year-old Bishnoi traditions of tree protection as religious duty.',
    food:'The invention of sugar refining; spice cultivation (black pepper, cardamom, turmeric, ginger) driving global trade; vegetarianism as a philosophical and religious practice affecting 400 million people today; chai, biryani, and dal as culinary traditions followed by a quarter of humanity.',
    philosophy:'The Axial Age produced Buddha, Mahavira, and the Upanishadic philosophers simultaneously (c. 500 BCE) — three distinct philosophical traditions questioning brahmanical authority through reason, ethics, and inner experience; the Nyaya school\'s systematic logic; the Yoga Sutras as a psychological science of consciousness.',
    inequality:'The jati (caste) system as one of history\'s most elaborate and durable systems of hereditary social stratification — linking ritual purity, occupational restriction, endogamy, and legal status in a single structure; Dalit (untouchable) exclusion from wells, temples, and civic life as structural violence encoded in religion.',
    diffusion:'Buddhism transforming the civilisational character of China, Japan, Korea, Tibet, and Southeast Asia; zero and decimal numerals enabling all modern mathematics and computing; yoga now practised by 300 million people globally; Sanskrit vocabulary embedded in every language from English to Indonesian.',
    migration:'The Indian subcontinent\'s demographic history is structured by two great migration debates still contested today. The Indo-Aryan migration (c. 1500–1000 BCE) — whether a large-scale population movement from the Central Asian steppe or an internal development — brought Sanskrit, the Vedic religion, and the proto-caste system into the subcontinent, transforming it irreversibly. The later spread of Buddhism triggered Indian cultural migration outward: monks, merchants, and scholars carried Indian civilisation to Southeast Asia, Central Asia, and China in what historians call \'Indianisation\' — perhaps the most peaceful civilisational expansion in history. The Mughal invasion (1526) added a Central Asian Timurid demographic layer to the Sultanate\'s Turkic and Afghan populations already overlying indigenous culture.',
   }},
  {id:'china',fp:{mil:8,com:9,art:9,sci:10,reach:7,lon:10},music:{scale:'pentatonic',root:65,tempo:70,timbre:'bell',rhythm:[1,0,1,0,1,0,1,0],reverb:.45,artifact:'Bianzhong bronze bell chimes, Tomb of Marquis Yi of Zeng (433 BCE) — 65 bells spanning 5 octaves, each with two tones'},lon:112,lat:34,nm:'Chinese Civilization',sb:'Yellow River to Qing · 2000 BCE – 1912 CE',x:768,y:168,s:-2000,e:1912,
   conns:['india','mongol','islamicworld'],
   overview:'For four thousand years the Yellow and Yangtze River valleys sustained the world\'s most consistently populated and productive civilisation, cycling through seventeen dynasties without losing the thread of a single continuous cultural identity. The Confucian examination system, paper money, printing, gunpowder, and the compass were not isolated inventions but the products of a state that invested in institutional continuity as a civilisational value. Each dynastic collapse was followed by reunification — a resilience no other civilisation in this dataset matches. The 20th century\'s communist revolution was in many ways the latest dynastic transition: a new mandate of heaven claimed after the Qing\'s exhaustion. China today is simultaneously the world\'s oldest continuous civilisation and its most ambitious emerging power.',
   d:{
    economy:'Paper money invented under the Tang Dynasty (618 CE); the Silk Road originating from Han China; the world\'s largest economy for 18 of the past 20 centuries; the Grand Canal as the world\'s longest artificial waterway.',
    political:'The imperial system\'s Mandate of Heaven legitimating dynastic succession; the Confucian meritocratic civil service examination system (605 CE) — providing governance continuity and social mobility across 1,300 years.',
    art:'Calligraphy elevated to the highest art form; Song dynasty landscape ink painting as philosophical practice; Ming blue-and-white porcelain exported globally; Shang dynasty bronze ritual vessels of astonishing technical mastery.',
    literature:'Confucius\' Analects; Laozi\'s Tao Te Ching; Tang dynasty poetry of Du Fu and Li Bai; the 2,500-page Dream of the Red Chamber — a continuous literary tradition of extraordinary psychological and philosophical depth.',
    military:'Sun Tzu\'s Art of War (still studied in business schools globally); the Great Wall of China; gunpowder weaponry first deployed militarily in the 10th century; iron-plated warships; crossbow technology superior to anything in the West.',
    science:'The Four Great Inventions — gunpowder, printing, paper, and the magnetic compass — each foundational to the emergence of the modern world. Plus cast iron smelting, silk production, porcelain, and the world\'s first seismograph.',
    medicine:'Systematic acupuncture codified in the Huangdi Neijing (c. 200 BCE); the world\'s largest herbal pharmacopoeia; Li Shizhen\'s Compendium of Materia Medica (1596) documenting 1,892 substances with dosage protocols.',
    religion:'Confucianism (social ethics and governance), Taoism (natural harmony and mysticism), and Indian Buddhism in syncretic coexistence — shaping the values, architecture, art, and social organisation of all East Asia.',
    legacy:'Paper, printing, gunpowder, and the compass directly enabled the European Renaissance, Protestant Reformation, Age of Exploration, and modern warfare — a civilizational export of unmatched material consequence.',
    gender:'Confucian ideology confining women to the "inner quarters" and the three obediences (to father, husband, son); yet Tang dynasty women rode horses, played polo, and held official positions; the Empress Wu Zetian (690–705 CE) ruling in her own name; Song dynasty foot-binding as a new form of patriarchal bodily control spreading across all classes.',
    slavery:'Chinese slavery was comparatively limited — debt bondage, judicial enslavement, and kidnapping rather than industrial chattel slavery; the scholar-official class produced by the examination system creating a meritocratic elite that partially offset hereditary privilege; yet corvée (compulsory state labour) extracting enormous work from the peasantry.',
    collapse:'The dynastic cycle — growth, overextension, corruption, peasant rebellion, collapse, reunification — repeated seventeen times across 4,000 years; the collapse of the Han (220 CE), Tang (907 CE), and Ming (1644 CE) each catastrophic in scale yet followed by cultural continuity and eventual reunification.',
    trade:'The Silk Road originating from Han China (130 BCE); the Grand Canal connecting north and south China as the world\'s longest internal trade artery; Song dynasty maritime trade reaching East Africa; paper money (Tang dynasty) enabling commercial transactions at scales impossible with metal coinage.',
    language:'Classical Chinese as East Asia\'s Latin — the written language of administration, philosophy, and literature shared by China, Japan, Korea, and Vietnam despite mutually unintelligible spoken languages; 50,000+ characters in the complete lexicon encoding 4,000 years of semantic evolution.',
    technology:'The Four Great Inventions (paper, printing, gunpowder, compass) plus cast iron (produced in China 1,500 years before Europe), the mechanical clock, the seismograph, porcelain, silk production, and the stern-mounted rudder — the greatest technology export in pre-modern history.',
    ecology:'The Yellow River\'s catastrophic floods (changing course 26 times in recorded history, causing millions of deaths) as China\'s recurring ecological challenge; deforestation of the Loess Plateau causing millennia of soil erosion; the Grand Canal\'s hydrological management as civilisation-scale water engineering.',
    food:'Rice as the civilisational foundation of southern China; wheat noodles in the north; tea (domesticated in Yunnan c. 3000 BCE) as the world\'s most consumed beverage; tofu, soy sauce, and the wok as culinary innovations shaping global cuisine; Chinese agriculture feeding the world\'s largest population continuously for 4,000 years.',
    philosophy:'The Axial Age\'s most productive philosophical moment — Confucius, Laozi, Mozi, Zhuangzi, and the Legalists all active within two centuries; the Hundred Schools of Thought (c. 500–221 BCE) as East Asia\'s equivalent of the Greek philosophical explosion, producing frameworks of governance, ethics, and cosmology still shaping 1.5 billion lives.',
    inequality:'The examination system creating theoretical meritocracy but practical oligarchy — only those wealthy enough to afford years of study could compete; the gentry class as a hereditary intellectual elite; the Taiping Rebellion (1850–1864), history\'s deadliest civil war (20–30 million dead), driven by agrarian inequality and debt bondage.',
    diffusion:'Buddhism entering from India and being transformed into Chan/Zen, Pure Land, and uniquely Chinese forms; the transmission of Chinese technology westward through the Mongol Pax; Chinese administrative and literary models defining the civilisational character of Japan, Korea, and Vietnam for millennia.',
    migration:'China\'s demographic history is structured by the tension between the settled agricultural Han heartland and the perpetual pressure of nomadic migration from the northern steppe. The Great Wall was not primarily military but demographic — an attempt to define and enforce a boundary between pastoral and agricultural worlds. Internal Chinese migration was also vast: the repeated southward movement of northern populations fleeing dynastic collapse and nomadic invasion progressively colonised and Sinicised the Yangtze Delta, Fujian, Guangdong, and ultimately Vietnam. The Tang dynasty\'s cosmopolitan capital Chang\'an housed Sogdians, Arabs, Persians, Koreans, Japanese, and Tibetans simultaneously. The great 19th–20th century Chinese diaspora (nanyang, \'the southern seas\') created Chinese communities across Southeast Asia, North America, and the Caribbean.',
   }},
  {id:'islamicworld',fp:{mil:9,com:9,art:8,sci:10,reach:9,lon:5},music:{scale:'arabic',root:62,tempo:80,timbre:'oud',rhythm:[1,0,1,1,0,0,1,0],reverb:.4,artifact:'Al-Farabi\'s Kitab al-Musiqa al-Kabir (c.900 CE); oud depicted in Abbasid Maqamat manuscripts; maqam system codifying 24 tonal modes'},lon:44,lat:24,nm:'Islamic Civilization',sb:'Golden Age · 622 – 1258 CE',x:572,y:218,s:622,e:1500,
   conns:['persia','india','greece','china','westafrica','byzantine'],
   overview:'In the century after Muhammad\'s death in 632 CE, Arab armies carried Islam from the Iberian Peninsula to Central Asia — the fastest territorial expansion in recorded history. But the Islamic civilisation that followed was far more than military conquest: the Abbasid Golden Age in Baghdad (750–1258 CE) produced the algebra, optics, medicine, and philosophy that made the European Renaissance possible. The civilisation was built on a paradox — a universalist religion that valued learning above almost all else, governing the world\'s most ethnically diverse empire through a legal framework applicable to all. The Mongol destruction of Baghdad in 1258 was a civilisational trauma, but Islamic culture reconstituted itself within a generation through the Mamluks, Ottomans, and Safavids. Today, 1.9 billion Muslims represent the continuation of this tradition.',
   d:{
    economy:'The sakk (the ancestor of the modern cheque), qirad trade partnership contracts, and a unified market from Spain to Indonesia — the first transcontinental free-trade network, predating the WTO by 1,200 years.',
    political:'The caliphate as a new political institution combining religious authority and administrative governance across the most ethnically diverse empire in world history up to that point.',
    art:'Geometric ornamentation solving the theological prohibition on figurative art through pure mathematical beauty; the arabesque; illuminated Quran manuscripts; the Alhambra in Granada — a unique aesthetic tradition of extraordinary refinement.',
    literature:'One Thousand and One Nights; Al-Mutanabbi\'s Arabic poetry; Ibn Khaldun\'s Muqaddimah (1377) — the world\'s first work of social science, anticipating Hegel, Marx, and Toynbee by centuries.',
    military:'Combined cavalry and infantry; naval supremacy in the Mediterranean and Indian Ocean; sophisticated siege engineering; the rapid conquest of the Sassanid Persian and Byzantine Egyptian empires within a decade.',
    science:'Algebra (Al-Khwarizmi, 820 CE — the word itself is Arabic); optics and the scientific method (Ibn al-Haytham\'s Book of Optics, 1011 CE); Al-Biruni\'s accurate measurement of the Earth\'s circumference; trigonometry formalised.',
    medicine:'Ibn Sina\'s Canon of Medicine (1025 CE) — the most comprehensive medical encyclopaedia ever written, used as the primary medical textbook in European universities until the 17th century.',
    religion:'Islam\'s expansion from a small Arabian city to a civilization spanning Iberia, West Africa, and Central Asia in under 100 years — the fastest cultural diffusion in recorded history, creating a new civilizational world.',
    legacy:'Algebra, algorithms, optics, trigonometry, and the preservation and translation of Greek texts directly enabling the European Renaissance. The word \'algorithm\' derives from Al-Khwarizmi\'s own name.',
    gender:'The Quran granted women inheritance rights, property ownership, and the right to divorce — radical improvements on 7th-century Arabian practice; yet male guardianship (mahram) and spatial segregation (purdah) developed in the Abbasid period under Persian and Byzantine cultural influence; the tension between Quranic egalitarianism and patriarchal practice defines Islamic gender history.',
    slavery:'Islamic law regulated rather than abolished slavery — enslaved people had legal rights, could earn freedom, and could not be enslaved if already Muslim; yet the Islamic world was a major slave-trading system, with the trans-Saharan and Indian Ocean trades moving millions of Africans over 1,300 years.',
    collapse:'The Mongol destruction of Baghdad (1258 CE) — burning the House of Wisdom, reportedly turning the Tigris black with ink — as the defining catastrophic rupture; yet Islamic civilisation reconstituted itself within a generation under the Mamluks, Ottomans, and Safavids, demonstrating extraordinary institutional resilience.',
    trade:'The sakk (cheque), the qirad (partnership), and hawala (trust-based money transfer) as financial innovations enabling commercial networks from Spain to Indonesia; the hajj as an annual gathering simultaneously religious and commercial; Arab and Persian merchants establishing communities in China, India, and East Africa centuries before European exploration.',
    language:'Arabic as the Quran\'s sacred language, simultaneously the lingua franca of science, philosophy, and commerce from Spain to Central Asia; the Arabic script adapted for Persian, Ottoman Turkish, Urdu, Malay, and Swahili; Arabic vocabulary constituting 60% of Spanish, 40% of Persian, and significant percentages of every language in the Islamic world.',
    technology:'The windmill (invented in Persia, 9th century); distillation apparatus enabling both perfume and eventually alcohol production (the word "alcohol" is Arabic); the astrolabe refined for precise astronomical measurement; paper mills spreading from China via the Islamic world to Europe; the hospital as an institution.',
    ecology:'The Islamic world\'s expansion into arid environments drove sophisticated water management — the Persian qanat system spread across North Africa and Spain; the Alhambra\'s hydraulic gardens as ecological art; Islamic agricultural manuals (10th–12th century) describing sustainable farming across diverse climates.',
