let year=-3500,lenses=new Set(),sel=null,sel2=null,lensDD=false,mode="explore",activeThread=null;

const OVERVIEW_COL='#c8881c';

function fmt(y){return y<0?`${Math.abs(y)} BCE`:y===0?'1 CE':`${y} CE`}
function eraName(y){let n=ERAS[0].n;for(const e of ERAS){if(y>=e.y)n=e.n;}return n;}
function active(c){return year>=c.s&&year<=c.e}
function getLensCol(){
  if(!lenses.size)return OVERVIEW_COL;
  const L=LENSES.find(l=>l.id===[...lenses][0]);
  return L?L.col:OVERVIEW_COL;
}

function toggleLensDD(){
  lensDD=!lensDD;
  document.getElementById('lens-dd-list').classList.toggle('open',lensDD);
  document.getElementById('lens-dd-hdr').classList.toggle('open',lensDD);
  document.getElementById('lens-dd-arrow').classList.toggle('open',lensDD);
}

function lensLabel(){
  if(!lenses.size)return'Civilization Arc';
  const names=[...lenses].map(id=>{const L=LENSES.find(l=>l.id===id);return L?L.lbl:'';});
  if(names.length===1)return names[0];
  if(names.length<=3)return names.join(' · ');
  return names.slice(0,2).join(' · ')+` +${names.length-2}`;
}

function renderLensDD(){
  const dt=document.getElementById('drawer-top');
  if(!dt)return;
  const arcOn=!lenses.size;
  const rows=LENSES.map(l=>{
    const on=lenses.has(l.id);
    return`<div class="lens-row${on?' on':''}" onclick="toggleLens('${l.id}')">
      <div class="lens-row-chk${on?' on':''}">${on?'✓':''}</div>
      <span class="lens-row-ico">${l.ico}</span>
      <span class="lens-row-lbl">${l.lbl}</span>
    </div>`;
  }).join('');
  dt.innerHTML=`<div class="lens-dd-wrap">
    <div class="lens-dd-hdr${lensDD?' open':''}" id="lens-dd-hdr" onclick="toggleLensDD()">
      <span class="lens-dd-title">Lens</span>
      <span class="lens-dd-summary">${lensLabel()}</span>
      <span class="lens-dd-arrow${lensDD?' open':''}" id="lens-dd-arrow">▾</span>
    </div>
    <div class="lens-dd-list${lensDD?' open':''}" id="lens-dd-list">
      <div class="lens-row${arcOn?' on':''}" onclick="toggleLens('__arc__')">
        <div class="lens-row-chk${arcOn?' on':''}">${arcOn?'✓':''}</div>
        <span class="lens-row-ico">◎</span>
        <span class="lens-row-lbl">Civilization Arc</span>
      </div>
      <div class="lens-row-sep"></div>
      ${rows}
      <div class="lens-dd-close-btn" onclick="toggleLensDD()">Done ▴</div>
    </div>
  </div>`;
}

function toggleLens(id){
  if(id==='__arc__'){lenses.clear();}
  else{
    if(lenses.has(id))lenses.delete(id);
    else lenses.add(id);
  }
  // partial update: re-render dropdown in-place, update content below civ header
  renderLensDD();
  if(sel){
    const c=sel;
    let body='';
    if(!lenses.size){
      body=`<div class="overview-arc"><p>${c.overview||c.d.legacy}</p></div>${renderEnhancedSpanBar(c)}`;
    } else {
      body=[...lenses].map(lid=>{
        const L=LENSES.find(l=>l.id===lid);
        if(!L)return'';
        return`<div class="lens-section">
          <div class="lens-section-hdr">
            <span class="lens-section-ico">${L.ico}</span>
            <span class="lens-section-lbl">${L.lbl}</span>
          </div>
          <div class="info-txt">${c.d[lid]||'No data for this lens.'}</div>
        </div>`;
      }).join('');
    }
    const col=lenses.size?getLensCol():OVERVIEW_COL;
    const actIds=new Set(CIVS.filter(x=>active(x)).map(x=>x.id));
    const connHTML=c.conns.length?`<div class="conn-hdr" id="conn-hdr">Historical connections</div>`+c.conns.map(cid=>{
      const o=CIVS.find(x=>x.id===cid);if(!o)return'';
      const isA=actIds.has(cid);
      const badge=isA?'ACTIVE':'→ JUMP';
      const tip=isA?`View ${o.nm} (active in this era)`:`Jump to ${o.nm} (${fmt(o.s)} – ${fmt(o.e)})`;
      return`<button class="conn-item" tabindex="0"
          aria-label="${tip}"
          onclick="navigateToCiv('${cid}')"
          style="width:100%;background:none;border:none;border-bottom:1px solid var(--conn-bdr);text-align:left;cursor:pointer;opacity:${isA?1:.7}">
        <div class="conn-dot" style="background:${isA?col:'var(--txt3)'}"></div>
        <span style="flex:1;color:var(--txt${isA?'':'3'})">${o.nm}</span>
        <span style="font-size:9px;font-family:'Cinzel',serif;letter-spacing:1px;color:${isA?'var(--amber-b)':'var(--amber)'};white-space:nowrap">${badge}</span>
      </button>`;
    }).join(''):'';
    // replace only content below the lens dd (keep civ header intact)
    const lensDiv=document.getElementById('drawer-lens-body');
    if(lensDiv) lensDiv.innerHTML=body+connHTML;
  }
  renderMap();
}

function civPt(c){
  if(!window._proj)return[c.x||500,c.y||260];
  const pt=window._proj([c.lon,c.lat]);
  return pt||[c.x||500,c.y||260];
}

function renderMap(){
  const ids=new Set(CIVS.filter(c=>active(c)).map(c=>c.id));
  const col=lenses.size?getLensCol():OVERVIEW_COL;

  const drawn=new Set();
  let cl='';
  CIVS.forEach(c=>{
    if(!ids.has(c.id))return;
    c.conns.forEach(id=>{
      const k=[c.id,id].sort().join('-');
      if(drawn.has(k)||!ids.has(id))return;
      drawn.add(k);
      const o=CIVS.find(x=>x.id===id);
      if(!o)return;
      const [cx,cy]=civPt(c),[ox,oy]=civPt(o);
      const mx=(cx+ox)/2,my=Math.min(cy,oy)-28;
      cl+=`<path d="M${cx},${cy} Q${mx},${my} ${ox},${oy}" stroke="#e8251a" stroke-width=".8" fill="none" stroke-dasharray="3,5" opacity="${sel?0.1:0.25}"/>`;
    });
  });
  document.getElementById('conn-layer').innerHTML=cl;

  let ml='',ll='';
  CIVS.forEach(c=>{
    const on=ids.has(c.id);
    const isSel=sel&&sel.id===c.id;
    // Heritage highlighting
    const heritageIds=mode==='heritage'&&heritageRegion?new Set(HERITAGE_REGIONS[heritageRegion]||[]):null;
    const isHeritage=heritageIds&&heritageIds.has(c.id);
    // In heritage mode, also show non-active heritage civs at low opacity
    const heritageInactive=isHeritage&&!on;
    // What-if dimming: dim civs that lose transmissions
    const isWhatifLost=whatifCiv&&whatifCiv!==c.id&&
      TRANSMISSIONS.some(t=>t.to===c.id&&t.from===whatifCiv);
    const mcol=isSel?'#f0d060':isHeritage?'#4a9fc0':'#e8251a';
    const op=on?(isWhatifLost?.2:1):(heritageInactive?.35:0.06);
    const tabIdx=on?'0':'-1';
    const [cx,cy]=civPt(c);
    // Decorative rings + pulse — pointer-events:none so they never intercept taps
    ml+=`<g opacity="${op}" pointer-events="none">
      <circle cx="${cx}" cy="${cy}" r="28" fill="none" stroke="${mcol}" stroke-width=".5" opacity=".12"/>
      <circle cx="${cx}" cy="${cy}" r="18" fill="none" stroke="${mcol}" stroke-width=".5" opacity=".22"/>
      <circle cx="${cx}" cy="${cy}" r="16" fill="${mcol}" fill-opacity=".07"/>
      ${on?`<circle cx="${cx}" cy="${cy}" r="8" fill="${mcol}" opacity=".55">
        <animate attributeName="r" values="8;30;8" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".55;0;.55" dur="2.8s" repeatCount="indefinite"/>
      </circle>`:''}
    </g>
    ${on
      ?`<circle cx="${cx}" cy="${cy}" r="${isSel?11:8}"
          fill="${mcol}" filter="url(#glow${isSel?'2':''})"
          style="cursor:pointer"
          role="button" tabindex="0"
          aria-label="${c.nm} — click to explore"
          onclick="civClick('${c.id}')"
          onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();civClick('${c.id}')}"
        />`
      :`<circle cx="${cx}" cy="${cy}" r="5" fill="${mcol}" opacity=".15" pointer-events="none"/>`
    }`;
    // Labels go into separate non-interactive layer above everything
    if(on) ll+=`<text x="${cx}" y="${cy+26}" font-family="Cinzel,serif" font-size="11"
      letter-spacing="1" fill="${isSel?'#f0d060':'#e8251a'}"
      text-anchor="middle" pointer-events="none">${c.nm}</text>`;
  });
  document.getElementById('mark-layer').innerHTML=ml;
  document.getElementById('label-layer').innerHTML=ll;
}

function navigateToCiv(id){
  const c=CIVS.find(x=>x.id===id);
  if(!c)return;
  if(mode==='whatif'){
    setWhatIf(id);
    return;
  }
  if(mode==='compare'){
    if(!sel){sel=c;}
    else if(!sel2&&sel.id!==c.id){sel2=c;}
    else{sel=c;sel2=null;}
    renderDrawer();renderMap();updateURL();
    openMobileSheet();
    return;
  }
  if(!active(c)){
    const targetYear=c.s;
    document.getElementById('tl').value=targetYear;
    setYear(targetYear);
  }
  sel=c;lensDD=false;
  renderDrawer();renderMap();updateURL();
  openMobileSheet();
  document.getElementById('info-panel').scrollTo({top:0,behavior:'smooth'});
}

function civClick(id){
  navigateToCiv(id);
}

function renderEnhancedSpanBar(c){
  const MIN=-65000,MAX=2024,total=MAX-MIN;
  const left=Math.max(0,(c.s-MIN)/total*100);
  const width=Math.min(100-left,(c.e-c.s)/total*100);
  return `<div class="civ-span-bar"><div class="civ-span-fill" style="left:${left.toFixed(1)}%;width:${width.toFixed(1)}%"></div></div>
  <div class="civ-span-lbls"><span>${fmt(c.s)}</span><span>${fmt(c.e)}</span></div>`;
}

function renderDrawerContent(){
  const c=sel;
  const dc=document.getElementById('drawer-content');
  if(!dc)return;
  if(!c){
    // app overview — don't re-render if already showing (no civ selected)
    return;

function closeInfo(){stopTheme();sel=null;lenses.clear();lensDD=false;renderDrawer();renderMap();closeMobileSheet();}

function setYear(y){
  year=parseInt(y);
  const sl=document.getElementById('tl');
  const pct=(year-parseInt(sl.min))/(parseInt(sl.max)-parseInt(sl.min))*100;
  document.getElementById('tl-thumb').style.left=pct+'%';
  updateTlFill(pct);
  const tlEl=document.getElementById('tl');
  tlEl.setAttribute('aria-valuenow',year);
  tlEl.setAttribute('aria-valuetext',fmt(year));
  document.getElementById('era-y').textContent=fmt(year);
  document.getElementById('era-n').textContent=eraName(year);
  document.getElementById('cnt-n').textContent=CIVS.filter(c=>active(c)).length;
  renderMap();
  if(sel&&!active(sel))closeInfo();
  else renderDrawer();
  updateURL();
  if(mode==='whatif'&&whatifCiv)renderWhatIfPaths();
}

function renderWorldMap(world){
  const svg=document.getElementById('wsvg');
  const W=1000,H=520;
  const proj=d3.geoMercator().scale(158).translate([W/2,H/2+40]);
  window._proj=proj;
  const pathGen=d3.geoPath().projection(proj);
  const land=topojson.feature(world,world.objects.land);
  const countries=topojson.feature(world,world.objects.countries);
  // Build SVG path strings
  const isDark=()=>document.documentElement.dataset.theme!=='light';
  let g=document.getElementById('map-layer');
  // Graticule
  const graticule=d3.geoGraticule()();
  const gratPath=pathGen(graticule)||'';
  // Land path
  const landPath=pathGen(land)||'';
  // Country borders
  const borders=topojson.mesh(world,world.objects.countries,(a,b)=>a!==b);
  const borderPath=pathGen(borders)||'';
  g.innerHTML=
    `<path d="${gratPath}" fill="none" stroke="var(--bdr2)" stroke-width=".3"/>` +
    `<path id="land-path" d="${landPath}" fill="var(--land)" stroke="var(--land-s)" stroke-width=".4"/>` +
    `<path d="${borderPath}" fill="none" stroke="var(--land-s)" stroke-width=".3" opacity=".6"/>`;
}


function init(){
  const eraDefs=[
    {l:'Chalcolithic',s:-4000,e:-3000},
    {l:'Bronze Age',s:-3000,e:-1200},
    {l:'Iron Age',s:-1200,e:-500},
    {l:'Classical',s:-500,e:500},
    {l:'Medieval',s:500,e:1500},
    {l:'Modern',s:1500,e:2024},
  ];
  const total=2024-(-4000);
  document.getElementById('era-bands').innerHTML=eraDefs.map(e=>`<div class="era-b" style="width:${(e.e-e.s)/total*100}%">${e.l}</div>`).join('');
  renderDensityBar();
  document.getElementById('tl').addEventListener('input',e=>setYear(e.target.value));
  decodeState();
  renderDrawer();
  setYear(year);
  if(activeThread&&mode==='threads'){
    setTimeout(()=>{
      setMode('threads');
      activateThread(activeThread);
    },1000);
  }


  // Load world topojson
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
    .then(r=>r.json())
    .then(world=>{
      renderWorldMap(world);
      renderMap(); // re-render markers with correct projection
    })
    .catch(()=>console.warn('World map data unavailable — using fallback'));
}


// ── MODE MANAGEMENT ──
function setMode(m){
  // Clear mode-specific state when leaving
  if(m!=='whatif')whatifCiv=null;
  if(m!=='heritage')heritageRegion=null;
  mode=m;
  ['explore','threads','compare','whatif','heritage'].forEach(id=>{
    const b=document.getElementById('btn-'+id);
    if(b){b.classList.toggle('active',id===m);b.setAttribute('aria-pressed',id===m);}
  });
  const tp=document.getElementById('thread-panel');
  if(tp)tp.classList.toggle('open',m==='threads');
  if(m==='threads'){
    renderThreadConceptList();
  }
  if(m!=='threads'){
    activeThread=null;
    document.getElementById('thread-layer').innerHTML='';
  }
  if(m==='compare'&&!sel2){
    // show compare prompt
    renderDrawer();
  }
  if(m==='explore'&&sel2){sel2=null;}
  renderMap();
  renderDrawer();
  updateURL();
}

// ── THREAD VIEW ──
function getUniqueConcepts(){
  const seen=new Set();
  return TRANSMISSIONS.filter(t=>{if(seen.has(t.concept))return false;seen.add(t.concept);return true;})
    .map(t=>t.concept);
}

function getChain(concept){
  return TRANSMISSIONS.filter(t=>t.concept===concept).sort((a,b)=>a.year-b.year);
}

function renderThreadConceptList(){
  const list=document.getElementById('thread-concept-list');
  const steps=document.getElementById('thread-active-steps');
  const title=document.getElementById('thread-panel-title');
  const backBtn=document.getElementById('thread-back-btn');
  if(!list)return;

  if(activeThread){
    // Concept list hidden, steps visible
    list.style.display='none';
    if(steps)steps.style.display='block';
    if(backBtn)backBtn.style.display='inline-block';
    if(title)title.textContent=activeThread;
  } else {
    // Show concept grid, hide steps
    list.style.display='block';
    if(steps){steps.style.display='none';steps.innerHTML='';}
    if(backBtn)backBtn.style.display='none';
    if(title)title.textContent='Concept Threads';
    const concepts=getUniqueConcepts();
    list.innerHTML='<div class="thread-grid">'+concepts.map(c=>{
      const chain=getChain(c);
      return`<button class="thread-concept-btn" onclick="activateThread('${c.replace(/'/g,"\\'")}')" >
        <span class="thread-concept-name">${c}</span>
        <span class="thread-concept-chain">${chain.map(t=>{
          const fc=CIVS.find(x=>x.id===t.from),tc=CIVS.find(x=>x.id===t.to);
          return(fc?fc.nm:'?')+' → '+(tc?tc.nm:'?');
        }).join('<br>')}</span>
      </button>`;
    }).join('')+'</div>';
  }
}

function activateThread(concept){
  activeThread=concept;
  renderThreadConceptList();
  renderThreadSteps(concept);
  renderThreadPaths(concept);
  // Scroll the inner wrapper back to top
  const inner=document.querySelector('.thread-panel-inner');
  if(inner)setTimeout(()=>inner.scrollTop=0,0);
}

function closeThread(){
  activeThread=null;
  renderThreadConceptList();
  document.getElementById('thread-layer').innerHTML='';
}

function renderThreadSteps(concept){
  const steps=document.getElementById('thread-active-steps');
  if(!steps)return;
  const chain=getChain(concept);
  if(!chain.length){steps.innerHTML='';return;}
  steps.innerHTML=
    '<div class="thread-steps-grid">'+
    chain.map(t=>{
      const fc=CIVS.find(x=>x.id===t.from),tc=CIVS.find(x=>x.id===t.to);
      return`<div class="thread-step">
        <span class="thread-step-yr">${fmt(t.year)}</span>
        <div>
          <div class="thread-step-civ">${fc?fc.nm:'?'} → ${tc?tc.nm:'?'}</div>
          <div class="thread-step-txt">${t.desc}</div>
        </div>
      </div>`;
    }).join('')+
    '</div>';
}

let _threadAnim=null;
function renderThreadPaths(concept){
  const layer=document.getElementById('thread-layer');
  if(!layer)return;
  const chain=getChain(concept);
  if(!chain.length){layer.innerHTML='';return;}
  if(_threadAnim){clearTimeout(_threadAnim);_threadAnim=null;}

  // Build SVG: arrowhead marker + paths + dots + labels
  let out='<defs><marker id="tarrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f0d060" opacity=".9"/></marker></defs>';
  const drawn=[];
  chain.forEach(t=>{
    const fc=CIVS.find(x=>x.id===t.from),tc=CIVS.find(x=>x.id===t.to);
    if(!fc||!tc)return;
    const [fx,fy]=civPt(fc),[tx,ty]=civPt(tc);
    const mx=(fx+tx)/2,my=Math.min(fy,ty)-44;
    // Path with arrowhead
    out+=`<path id="tp-${t.id}" d="M${fx},${fy} Q${mx},${my} ${tx},${ty}"
      stroke="#f0d060" stroke-width="1.8" fill="none" stroke-dasharray="6,4"
      marker-end="url(#tarrow)" opacity="0" style="transition:opacity .4s"/>`;
    // Glow dot at destination
    out+=`<circle id="tc-${t.id}" cx="${tx}" cy="${ty}" r="7" fill="#f0d060" opacity="0" style="transition:opacity .4s"/>`;
    // Year + civ name label mid-path
    const lx=(fx+tx)/2+(my<Math.min(fy,ty)?0:0),ly=my-10;
    out+=`<text id="tl-${t.id}" x="${lx}" y="${ly}"
      font-family="Cinzel,serif" font-size="10" fill="#f0d060"
      text-anchor="middle" opacity="0" style="transition:opacity .4s">${fmt(t.year)}</text>`;
    const nm=tc?tc.nm:'';
    out+=`<text id="tn-${t.id}" x="${tx}" y="${ty+22}"
      font-family="Cinzel,serif" font-size="9.5" fill="#f0d060"
      text-anchor="middle" opacity="0" style="transition:opacity .4s">${nm}</text>`;
    drawn.push(t.id);
  });
  layer.innerHTML=out;

  // Animate each step sequentially
  drawn.forEach((id,i)=>{
    setTimeout(()=>{
      ['tp','tc','tl','tn'].forEach(prefix=>{
        const el=document.getElementById(prefix+'-'+id);
        if(el)el.style.opacity=prefix==='tc'?'0.9':'0.85';
      });
    },i*700);
  });
}

function addToCompare(id){
  const c=CIVS.find(x=>x.id===id);
  if(!c)return;
  if(!sel){sel=c;mode='compare';}
  else{sel2=c;mode='compare';}

function renderCompareDrawer(){
  const dc=document.getElementById('drawer-content');
  const dt=document.getElementById('drawer-top');
  if(dt)dt.innerHTML='';
  if(!sel&&!sel2){
    dc.innerHTML=`<div class="compare-prompt">
      <div>⊞</div>
      <div>Select two civilizations on the map to compare them side by side</div>
    </div>`;
    return;
  }
  const renderCol=(c,slot)=>{
    if(!c)return`<div class="compare-col">
      <div class="compare-prompt" style="height:200px"><div>Click a civilization on the map to add it here</div></div>
    </div>`;
    const body=lenses.size?[...lenses].map(lid=>{
      const L=LENSES.find(l=>l.id===lid);
      if(!L)return'';
      return`<div class="lens-section">
        <div class="lens-section-hdr">
          <span class="lens-section-ico">${L.ico}</span>
          <span class="lens-section-lbl">${L.lbl}</span>

        <div class="info-txt">${c.d[lid]||'No data.'}</div>
      </div>`;
    }).join(''):

    return`<div class="compare-col">
      <div class="compare-col-hdr">
        <span>${c.nm}</span>
        <button class="compare-remove" onclick="${slot===1?'sel=null':'sel2=null'};renderCompareDrawer();renderMap()" aria-label="Remove">✕</button>

      <div style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;color:var(--txt3);margin-bottom:10px;text-transform:uppercase">${c.sb}</div>
      <div class="info-dates" style="margin-bottom:14px">
        <div class="info-dt">${fmt(c.s)}</div>
        <span class="info-arr">→</span>
        <div class="info-dt">${fmt(c.e)}</div>
      </div>
      ${body}
    </div>`;
  };
  // Lens selector at top spanning both cols
  const lensBar=`<div style="padding:12px 0 10px;border-bottom:1px solid var(--bdr);margin-bottom:12px">${renderLensDDInline()}</div>`;
  dc.innerHTML=`<div>${lensBar}<div class="compare-wrap">${renderCol(sel,1)}${renderCol(sel2,2)}</div></div>`;
}

}

// ── URL STATE ──
function encodeState(){
  const params=new URLSearchParams();
  params.set('y',year);
  if(sel)params.set('c',sel.id);
  if(sel2)params.set('c2',sel2.id);
  if(lenses.size)params.set('l',[...lenses].join(','));
  if(mode!=='explore')params.set('m',mode);
  if(activeThread)params.set('t',activeThread);
  return params.toString();
}

function decodeState(){
  let hash='';
  try{hash=window.location.hash.replace('#','');}catch(e){return;}
  if(!hash)return;
  try{
    const params=new URLSearchParams(hash);
    if(params.get('y')){
      const y=parseInt(params.get('y'));
      year=y;
      document.getElementById('tl').value=y;
    }
    if(params.get('c')){sel=CIVS.find(x=>x.id===params.get('c'))||null;}
    if(params.get('c2')){sel2=CIVS.find(x=>x.id===params.get('c2'))||null;}
    if(params.get('l')){params.get('l').split(',').forEach(id=>lenses.add(id));}
    if(params.get('m'))mode=params.get('m');
    if(params.get('t'))activeThread=params.get('t');
  }catch(e){console.warn('Failed to decode state',e);}
}

function updateURL(){
  try{
    const state=encodeState();
    if(history.replaceState&&window.location.href!=='about:srcdoc'){
      history.replaceState(null,'',state?'#'+state:'#');
    }
  }catch(e){/* sandboxed iframe — URL state unavailable */}
}

function shareState(){
  let url='';
  try{url=window.location.href.split('#')[0]+'#'+encodeState();}
  catch(e){url='#'+encodeState();}
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>showToast());
  } else {
    // fallback
    const ta=document.createElement('textarea');
    ta.value=url;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    showToast();
  }
}

function showToast(){
  const t=document.getElementById('share-toast');
  if(!t)return;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// WEB AUDIO ENGINE
// ══════════════════════════════════════════
let _actx=null,_soundNodes=[],_soundPlaying=false,_soundMuted=false;

const SCALES={
  pentatonic:[0,2,4,7,9],
  pentatonic_minor:[0,3,5,7,10],
  dorian:[0,2,3,5,7,9,10],
  phrygian:[0,1,3,5,7,8,10],
  lydian:[0,2,4,6,7,9,11],
  mixolydian:[0,2,4,5,7,9,10],
  aeolian:[0,2,3,5,7,8,10],
  byzantine:[0,1,4,5,7,8,11],
  arabic:[0,2,3,6,7,8,11],
  turkish:[0,1,4,5,7,8,10],
  japanese:[0,1,5,7,8],
  slendro:[0,2,5,7,10],
  pelog:[0,1,3,7,8],
  andean:[0,2,4,7,9],
  ethiopian:[0,2,3,5,7,9,11],
  celtic:[0,2,3,5,7,9,10],
  blues:[0,3,5,6,7,10],
};

function getActx(){
  if(!_actx){_actx=new(window.AudioContext||window.webkitAudioContext)();}
  if(_actx.state==='suspended')_actx.resume();
  return _actx;
}

function makeReverb(ctx,dur=1.8,decay=2.5){
  const len=ctx.sampleRate*dur;
  const buf=ctx.createBuffer(2,len,ctx.sampleRate);
  for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
  const v=ctx.createConvolver();v.buffer=buf;return v;
}

function midiToHz(m){return 440*Math.pow(2,(m-69)/12);}

function scheduleNote(ctx,master,timbre,freq,when,dur,vol){
  switch(timbre){
    case 'pluck':{
      const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain();
      o.type='sawtooth';o.frequency.value=freq;
      f.type='lowpass';f.frequency.setValueAtTime(freq*5,when);f.frequency.exponentialRampToValueAtTime(freq*1.5,when+dur*0.5);
      e.gain.setValueAtTime(vol,when);e.gain.exponentialRampToValueAtTime(0.001,when+dur);
      o.connect(f);f.connect(e);e.connect(master);
      o.start(when);o.stop(when+dur);
      break;}
    case 'flute':{
      const o=ctx.createOscillator(),vib=ctx.createOscillator(),vg=ctx.createGain(),e=ctx.createGain();
      o.type='sine';o.frequency.value=freq;
      vib.frequency.value=5.5;vg.gain.value=freq*0.018;
      vib.connect(vg);vg.connect(o.frequency);
      e.gain.setValueAtTime(0,when);e.gain.linearRampToValueAtTime(vol,when+0.04);e.gain.setValueAtTime(vol,when+dur-0.08);e.gain.linearRampToValueAtTime(0,when+dur);
      o.connect(e);e.connect(master);
      o.start(when);o.stop(when+dur);vib.start(when);vib.stop(when+dur);
      break;}
    case 'drone':{
      [0,7,12].forEach((int,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type=i===0?'sawtooth':'sine';
        o.frequency.value=freq*Math.pow(2,int/12);
        g.gain.setValueAtTime(0,when);g.gain.linearRampToValueAtTime(vol*(i===0?.4:.12),when+0.2);
        g.gain.setValueAtTime(vol*(i===0?.4:.12),when+dur-0.2);g.gain.linearRampToValueAtTime(0,when+dur);
        o.connect(g);g.connect(master);o.start(when);o.stop(when+dur);
      });
      break;}
    case 'drum':{
      const nb=ctx.createBuffer(1,Math.floor(ctx.sampleRate*.35),ctx.sampleRate);
      const nd=nb.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=(Math.random()*2-1)*Math.pow(1-i/nd.length,5);
      const ns=ctx.createBufferSource(),nf=ctx.createBiquadFilter(),ne=ctx.createGain();
      ns.buffer=nb;nf.type='lowpass';nf.frequency.value=120+freq*.3;
      ne.gain.setValueAtTime(vol*1.4,when);ne.gain.exponentialRampToValueAtTime(0.001,when+.35);
      ns.connect(nf);nf.connect(ne);ne.connect(master);ns.start(when);
      break;}
    case 'bell':{
      [1,2.756,5.404].forEach((r,i)=>{
        const o=ctx.createOscillator(),e=ctx.createGain();
        o.type='sine';o.frequency.value=freq*r;
        e.gain.setValueAtTime(vol/(r*1.2),when);e.gain.exponentialRampToValueAtTime(0.001,when+dur*(1.2/(r+.5)));
        o.connect(e);e.connect(master);o.start(when);o.stop(when+dur);
      });
      break;}
    case 'mbira':{
      const o=ctx.createOscillator(),o2=ctx.createOscillator(),e=ctx.createGain(),g2=ctx.createGain();
      o.type='triangle';o2.type='sine';o.frequency.value=freq;o2.frequency.value=freq*3.1;
      e.gain.setValueAtTime(vol,when);e.gain.exponentialRampToValueAtTime(0.001,when+dur*.9);
      g2.gain.value=vol*.25;
      o.connect(e);e.connect(master);o2.connect(g2);g2.connect(master);
      o.start(when);o.stop(when+dur);o2.start(when);o2.stop(when+dur);
      break;}
    case 'brass':{
      const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain();
      o.type='sawtooth';o.frequency.value=freq;
      f.type='bandpass';f.frequency.value=freq*1.8;f.Q.value=0.8;
      e.gain.setValueAtTime(0,when);e.gain.linearRampToValueAtTime(vol,when+.06);e.gain.setValueAtTime(vol*.7,when+.1);e.gain.linearRampToValueAtTime(0,when+dur);
      o.connect(f);f.connect(e);e.connect(master);o.start(when);o.stop(when+dur);
      break;}
    case 'sitar':{
      const o=ctx.createOscillator(),o2=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain(),g2=ctx.createGain();
      o.type='sawtooth';o2.type='sawtooth';o.frequency.value=freq;o2.frequency.value=freq*1.003;
      f.type='bandpass';f.frequency.value=freq*3;f.Q.value=1.2;
      e.gain.setValueAtTime(vol,when);e.gain.exponentialRampToValueAtTime(0.12,when+dur*.55);e.gain.linearRampToValueAtTime(0,when+dur);
      g2.gain.value=vol*.35;
      o.connect(f);f.connect(e);e.connect(master);o2.connect(g2);g2.connect(master);
      o.start(when);o.stop(when+dur);o2.start(when);o2.stop(when+dur);
      // Drone fifth
      const dr=ctx.createOscillator(),dg=ctx.createGain();
      dr.type='sawtooth';dr.frequency.value=freq*.5;
      dg.gain.setValueAtTime(vol*.15,when);dg.gain.linearRampToValueAtTime(0,when+dur);
      dr.connect(dg);dg.connect(master);dr.start(when);dr.stop(when+dur);
      break;}
    case 'oud':{
      const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain(),h=ctx.createOscillator(),hg=ctx.createGain();
      o.type='triangle';o.frequency.value=freq;h.type='sawtooth';h.frequency.value=freq*2;
      f.type='lowpass';f.frequency.value=freq*7;
      e.gain.setValueAtTime(vol,when);e.gain.exponentialRampToValueAtTime(0.001,when+dur*.65);
      hg.gain.value=vol*.18;
      o.connect(f);f.connect(e);e.connect(master);h.connect(hg);hg.connect(master);
      o.start(when);o.stop(when+dur);h.start(when);h.stop(when+dur);
      break;}
    case 'panpipe':{
      const o=ctx.createOscillator(),nb=ctx.createBuffer(1,Math.floor(ctx.sampleRate*dur),ctx.sampleRate);
      o.type='sine';o.frequency.value=freq;
      const nd=nb.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=(Math.random()*2-1)*.04;
      const ns=ctx.createBufferSource(),nf=ctx.createBiquadFilter(),e=ctx.createGain();
      ns.buffer=nb;nf.type='bandpass';nf.frequency.value=freq;nf.Q.value=12;
      e.gain.setValueAtTime(0,when);e.gain.linearRampToValueAtTime(vol,when+.04);e.gain.setValueAtTime(vol*.8,when+dur-.08);e.gain.linearRampToValueAtTime(0,when+dur);
      o.connect(e);ns.connect(nf);nf.connect(master);e.connect(master);
      o.start(when);o.stop(when+dur);ns.start(when);ns.stop(when+dur);
      break;}
    case 'didgeridoo':{
      const o=ctx.createOscillator(),f=ctx.createBiquadFilter(),e=ctx.createGain();
      o.type='sawtooth';o.frequency.value=freq*.25;
      f.type='bandpass';f.Q.value=2.5;
      f.frequency.setValueAtTime(180,when);f.frequency.linearRampToValueAtTime(480,when+1.5);f.frequency.linearRampToValueAtTime(180,when+3);f.frequency.linearRampToValueAtTime(350,when+dur);
      e.gain.setValueAtTime(vol,when);e.gain.setValueAtTime(vol,when+dur-.15);e.gain.linearRampToValueAtTime(0,when+dur);
      o.connect(f);f.connect(e);e.connect(master);o.start(when);o.stop(when+dur);
      break;}
  }
}

function playTheme(c){
  if(_soundMuted||!c.music)return;
  stopTheme();
  try{
    const ctx=getActx();
    const m=c.music;
    const scale=SCALES[m.scale]||SCALES.pentatonic;
    const beatDur=60/m.tempo;
    const noteDur=beatDur*.88;
    const totalBeats=m.rhythm.length*4; // 4 loops
    const totalDur=totalBeats*beatDur+1.5;

    // Master gain
    const master=ctx.createGain();
    master.gain.setValueAtTime(0,ctx.currentTime);
    master.gain.linearRampToValueAtTime(.32,ctx.currentTime+.4);
    master.gain.setValueAtTime(.32,ctx.currentTime+totalDur-1.2);
    master.gain.linearRampToValueAtTime(0,ctx.currentTime+totalDur);

    // Optional reverb
    let output=master;
    if(m.reverb>0.05){
      const rev=makeReverb(ctx);
      const dryG=ctx.createGain(),wetG=ctx.createGain();
      dryG.gain.value=1-m.reverb*.5;wetG.gain.value=m.reverb*.6;
      master.connect(dryG);master.connect(rev);rev.connect(wetG);
      dryG.connect(ctx.destination);wetG.connect(ctx.destination);
    } else {
      master.connect(ctx.destination);
    }

    // Walk up/down scale melodically
    let scalePos=0,direction=1;
    let beat=0;
    for(let loop=0;loop<4;loop++){
      for(let step=0;step<m.rhythm.length;step++){
        if(m.rhythm[step]){
          const semitone=scale[scalePos%scale.length];
          const octaveShift=Math.floor(scalePos/scale.length);
          const midiNote=m.root+semitone+octaveShift*12;
          const freq=midiToHz(midiNote);
          const when=ctx.currentTime+beat*beatDur;
          scheduleNote(ctx,master,m.timbre,freq,when,noteDur,.7);
          // Walk scale
          scalePos+=direction;
          if(scalePos>=scale.length*2||scalePos<0){direction*=-1;scalePos+=direction*2;}
        }
        beat++;
      }
    }

    _soundPlaying=true;
    // Auto-stop and update UI
    const stopAt=totalDur*1000;
    setTimeout(()=>{_soundPlaying=false;updateSoundBtn(false);},stopAt);
    updateSoundBtn(true);
  }catch(e){console.warn('Audio playback failed:',e);}
}

function stopTheme(){
  try{
    if(_actx){
      // Disconnect all gains by creating a short new context isn't viable;
      // instead close and recreate
      _actx.close();_actx=null;
    }
  }catch(e){}
  _soundPlaying=false;
  updateSoundBtn(false);
}

function toggleSound(c){
  if(_soundMuted){_soundMuted=false;playTheme(c);}
  else if(_soundPlaying){stopTheme();}
  else{playTheme(c);}
}

function updateSoundBtn(playing){
  const btns=document.querySelectorAll('.sound-btn');
  btns.forEach(b=>{
    b.textContent=playing?'◼ Stop':'♪ Listen';
    b.classList.toggle('playing',playing);
    b.setAttribute('aria-label',playing?'Stop music':'Play musical theme');
  });
}

// MAP ZOOM ANIMATION
// ══════════════════════════════════════════════════════
const VB_DEFAULT=[0,0,1000,520];
let _vbCurrent=[0,0,1000,520],_vbAnim=null;

function animateViewBox(target,duration=600){
  if(_vbAnim)cancelAnimationFrame(_vbAnim);
  const svg=document.getElementById('wsvg');
  if(!svg)return;
  const start=[..._vbCurrent];
  const t0=performance.now();
  function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
  function frame(now){
    const raw=Math.min(1,(now-t0)/duration);
    const p=ease(raw);
    const vb=start.map((s,i)=>s+(target[i]-s)*p);
    svg.setAttribute('viewBox',vb.join(' '));
    _vbCurrent=[...vb];
    if(raw<1)_vbAnim=requestAnimationFrame(frame);
    else{_vbCurrent=[...target];_vbAnim=null;}
  }
  _vbAnim=requestAnimationFrame(frame);
}

function zoomToCiv(c){
  if(!window._proj)return;
  const [cx,cy]=civPt(c);

  const x=Math.max(0,Math.min(1000-zw,cx-zw/2));
  const y=Math.max(0,Math.min(520-zh,cy-zh/2));
  animateViewBox([x,y,zw,zh],600);
}

function zoomOut(){
  animateViewBox(VB_DEFAULT,500);
}

// FINGERPRINT RADAR CHART
// ══════════════════════════════════════════════════════
const FP_LABELS=['Military','Commerce','Arts','Science','Reach','Longevity'];
const FP_KEYS=['mil','com','art','sci','reach','lon'];

function renderFingerprint(c){
  if(!c.fp)return'';
  // Larger canvas with generous padding so labels never clip
  const W=360,H=300,cx=W/2,cy=H/2+10,R=88;
  const n=FP_LABELS.length;
  const angles=FP_LABELS.map((_,i)=>(i*2*Math.PI/n)-Math.PI/2);

  let svg=`<svg class="fp-svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  // Grid rings
  [2,4,6,8,10].forEach(level=>{
    const r=R*(level/10);
    const pts=angles.map(a=>`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`).join(' ');
    svg+=`<polygon points="${pts}" class="fp-grid"/>`;
  });
  // Axis lines
  angles.forEach(a=>{
    svg+=`<line x1="${cx}" y1="${cy}" x2="${(cx+R*Math.cos(a)).toFixed(1)}" y2="${(cy+R*Math.sin(a)).toFixed(1)}" class="fp-grid"/>`;
  });
  // Data polygon
  const vals=FP_KEYS.map(k=>c.fp[k]||0);
  const dataPts=angles.map((a,i)=>{
    const r=R*(vals[i]/10);
    return`${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;
  }).join(' ');
  svg+=`<polygon points="${dataPts}" class="fp-poly"/>`;
  // Labels — placed outside the ring with enough clearance, wrapped in two lines where needed
  const SHORT=['Military','Commerce','Arts','Science','Reach','Longevity'];
  angles.forEach((a,i)=>{
    const lr=R+26;
    const lx=cx+lr*Math.cos(a);
    const ly=cy+lr*Math.sin(a);
    const cosA=Math.cos(a);
    const anchor=cosA>0.15?'start':cosA<-0.15?'end':'middle';
    // Vertical centering: shift up/down based on sin
    const dy=Math.sin(a)>0.15?4:Math.sin(a)<-0.15?-4:4;
    svg+=`<text x="${lx.toFixed(1)}" y="${(ly+dy).toFixed(1)}" text-anchor="${anchor}" class="fp-label">${SHORT[i]}</text>`;
  });
  svg+='</svg>';
  return`<div class="fp-wrap"><div class="fp-title">Civilizational Fingerprint</div>${svg}</div>`;
}

// ══════════════════════════════════════════════════════
// ENHANCED SPAN BAR WITH CONTEMPORARIES
// ══════════════════════════════════════════════════════
function renderEnhancedSpanBar(c){
  const MIN=-65000,MAX=2024,total=MAX-MIN;
  const left=Math.max(0,(c.s-MIN)/total*100);
  const width=Math.min(100-left,(c.e-c.s)/total*100);

  // Find up to 4 contemporaries that overlap with this civ's lifespan
  const overlap=CIVS.filter(x=>x.id!==c.id&&x.s<c.e&&x.e>c.s)
    .map(x=>{
      const overlapStart=Math.max(x.s,c.s);
      const overlapEnd=Math.min(x.e,c.e);
      return{...x,overlapYrs:overlapEnd-overlapStart};
    })
    .sort((a,b)=>b.overlapYrs-a.overlapYrs)
    .slice(0,4);

  const colors=['#e89820','#4a8870','#4a7faa','#9b6fd4'];

  let bars=overlap.map((x,i)=>{
    const xl=Math.max(0,(x.s-MIN)/total*100);
    const xw=Math.min(100-xl,(x.e-x.s)/total*100);
    // Show only the portion overlapping with c
    const ol=Math.max(xl,left);
    const or_=Math.min(xl+xw,left+width);
    const ow=Math.max(0,or_-ol);
    return`<div class="contemp-bar-row" onclick="navigateToCiv('${x.id}')" title="Navigate to ${x.nm}">
      <div class="contemp-bar-nm">${x.nm}</div>
      <div class="contemp-bar-track">
        <div class="contemp-bar-fill" style="left:${(ol-left).toFixed(1)}%;width:${ow.toFixed(1)}%;background:${colors[i]}"></div>
      </div>
      <div class="contemp-bar-yr">${fmt(x.s)}–${fmt(x.e)}</div>
    </div>`;
  }).join('');

  const mainBar=`<div class="civ-span-bar" title="${fmt(c.s)} to ${fmt(c.e)}">
    <div class="civ-span-fill" style="left:${left.toFixed(1)}%;width:${width.toFixed(1)}%"></div>
  </div>
  <div class="civ-span-lbls"><span>${fmt(c.s)}</span><span style="color:var(--txt3);font-size:8px">${c.e-c.s} years</span><span>${fmt(c.e)}</span></div>`;

  const contemp=overlap.length?`<div class="contemp-wrap">
    <div class="fp-title" style="margin-top:10px">Active at the same time</div>
    ${bars}
  </div>`:'';

  return mainBar+contemp;
}

// ══════════════════════════════════════════════════════
// TIMELINE DENSITY SPARKLINE
// ══════════════════════════════════════════════════════
function renderDensityBar(){
  const svg=document.getElementById('density-bar');
  if(!svg)return;
  const W=svg.parentElement?svg.parentElement.offsetWidth||600:600;
  svg.setAttribute('viewBox',`0 0 ${W} 18`);
  const MIN=-4000,MAX=2024,total=MAX-MIN;
  const steps=200;
  const stepYr=total/steps;
  const counts=[];
  let mx=0;
  for(let i=0;i<steps;i++){
    const yr=MIN+i*stepYr;
    const n=CIVS.filter(c=>c.s<=yr&&c.e>=yr).length;
    counts.push(n);
    if(n>mx)mx=n;
  }
  if(!mx)return;
  const pts=counts.map((n,i)=>{
    const x=(i/steps)*W;
    const y=18-(n/mx)*14-1;
    return`${x.toFixed(1)},${y.toFixed(1)}`;
  });
  // Close the polygon at the bottom
  const poly=`0,18 ${pts.join(' ')} ${W},18`;
  svg.innerHTML=`<polygon points="${poly}" fill="rgba(232,152,32,.25)" stroke="rgba(232,152,32,.5)" stroke-width=".5"/>
    <line x1="0" y1="18" x2="${W}" y2="18" stroke="var(--bdr2)" stroke-width=".5"/>`;
}

function renderDiplomaticLayer(){
  const layer=document.getElementById('conn-layer');
  if(!layer)return;
  // Add diplomatic lines on top of regular connections when in explore mode
  // and no civ selected (so they're visible on the map)
  if(sel)return; // only show when no civ selected
  const ids=new Set(CIVS.filter(c=>active(c)).map(c=>c.id));
  let dl='';
  DIPLOMATIC.forEach(d=>{
    const fc=CIVS.find(x=>x.id===d.from),tc=CIVS.find(x=>x.id===d.to);
    if(!fc||!tc||!ids.has(d.from)||!ids.has(d.to))return;
    const [fx,fy]=civPt(fc),[tx,ty]=civPt(tc);
    const mx=(fx+tx)/2,my=Math.min(fy,ty)-36;
    dl+=`<path d="M${fx},${fy} Q${mx},${my} ${tx},${ty}" 
      stroke="#f0d060" stroke-width="1" fill="none" stroke-dasharray="4,3" opacity=".4"
      title="${d.title}"/>`;
  });
  // Append to existing conn-layer content
  layer.innerHTML+=dl;
}

function renderDiplomaticSection(c){

  return`<div class="conn-hdr">Diplomatic Record</div>`+
    relevant.map(d=>{

let whatifCiv=null;

// ── WHAT-IF MAP RENDERING ──
function renderWhatIfPaths(){
  const layer=document.getElementById('thread-layer');
  if(!layer){return;}
  if(!whatifCiv){layer.innerHTML='';return;}

  const c=CIVS.find(x=>x.id===whatifCiv);
  if(!c){layer.innerHTML='';return;}

  const directOut=TRANSMISSIONS.filter(t=>t.from===c.id);
  const downstreamConcepts=new Set(directOut.map(t=>t.concept));
  const downstream=TRANSMISSIONS.filter(t=>downstreamConcepts.has(t.concept)&&t.from!==c.id);
  const [cx,cy]=civPt(c);

  let out='<defs><marker id="wi-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#e8251a" opacity=".7"/></marker></defs>';

  // Direct broken paths — animated red fading lines
  directOut.forEach((t,i)=>{
    const tc=CIVS.find(x=>x.id===t.to);
    if(!tc)return;
    const [tx,ty]=civPt(tc);
    const mx=(cx+tx)/2, my=Math.min(cy,ty)-40;
    out+=`<path d="M${cx},${cy} Q${mx},${my} ${tx},${ty}"
      stroke="#e8251a" stroke-width="1.6" fill="none" stroke-dasharray="5,4"
      marker-end="url(#wi-arrow)" opacity="0"
      id="wi-direct-${i}" style="transition:opacity .5s"/>`;
    // Label concept at midpoint
    out+=`<text x="${mx}" y="${my-8}" font-family="Cinzel,serif" font-size="9"
      fill="#e8251a" text-anchor="middle" opacity="0"
      id="wi-lbl-${i}" style="transition:opacity .5s">${t.concept}</text>`;
  });

  // Downstream broken paths — dimmer orange dashes
  downstream.forEach((t,j)=>{
    const fc=CIVS.find(x=>x.id===t.from),tc=CIVS.find(x=>x.id===t.to);
    if(!fc||!tc)return;
    const [fx,fy]=civPt(fc),[tx,ty]=civPt(tc);
    const mx=(fx+tx)/2,my=Math.min(fy,ty)-24;
    out+=`<path d="M${fx},${fy} Q${mx},${my} ${tx},${ty}"
      stroke="#c06020" stroke-width="0.8" fill="none" stroke-dasharray="3,6"
      opacity="0" id="wi-down-${j}" style="transition:opacity .5s"/>`;
  });

  layer.innerHTML=out;

  // Animate in sequentially
  directOut.forEach((_,i)=>{
    setTimeout(()=>{
      const p=document.getElementById('wi-direct-'+i);
      const l=document.getElementById('wi-lbl-'+i);
      if(p)p.style.opacity='0.85';
      if(l)l.style.opacity='0.9';
    },i*180);
  });
  setTimeout(()=>{
    downstream.forEach((_,j)=>{
      const p=document.getElementById('wi-down-'+j);
      if(p)p.style.opacity='0.45';
    });
  },directOut.length*180+200);
}

// ── THEME ──
function applyTheme(t){
  document.documentElement.dataset.theme=t;
  document.getElementById('theme-btn').textContent=t==='dark'?'◑':'◐';
  localStorage.setItem('civ-theme',t);
}
function toggleTheme(){
  const cur=document.documentElement.dataset.theme||
    (window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');
  applyTheme(cur==='dark'?'light':'dark');
}
(function(){
  const saved=localStorage.getItem('civ-theme');
  if(saved){applyTheme(saved);}
  else{
    const sys=window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';
    document.documentElement.dataset.theme=sys;
    document.getElementById('theme-btn').textContent=sys==='dark'?'◑':'◐';
  }
})();
