    diffusion:'Anime and manga as the 20th century\'s most globally influential popular art form after Hollywood; Japanese management philosophy (kaizen, kanban, just-in-time) reshaping global manufacturing; sushi now the world\'s most globally distributed cuisine; Zen Buddhism reaching the West through the Beat Generation and now mainstream mindfulness culture.',
    migration:'Japan\'s demographic history is structured by the collision of migrations. The Jōmon people — present for 15,000 years — were partially displaced by the Yayoi migration from the Korean peninsula and China (c. 300 BCE), bringing wet rice agriculture and metalworking; modern Japanese are genetically a Jōmon-Yayoi admixture in proportions varying by region. Internal migration from the Yamato heartland colonised northern Honshu and Kyushu over a millennium, displacing the Ainu (the Jōmon\'s most direct descendants) northward into Hokkaido. Japan\'s deliberate national isolation (sakoku, 1635–1853) made it the ancient world\'s most controlled migration environment — the complete suspension of emigration and immigration for 220 years as a conscious civilisational policy, producing demographic homogeneity as political choice.',
   }},
  {id:'korea',fp:{mil:5,com:6,art:8,sci:9,reach:3,lon:8},music:{scale:'pentatonic',root:52,tempo:68,timbre:'pluck',rhythm:[1,0,0,1,0,1,0,0],reverb:.4,artifact:'Gayageum (12-string zither) invented by Gaya kingdom king Gasil (6th century CE); geomungo (6-string zither) from Goguryeo kingdom; aak (court ritual music) preserved from 1116 CE'},lon:127,lat:37,nm:'Korean Civilizations',sb:'Korean Peninsula · 2333 BCE – 1897 CE',x:848,y:167,s:-2333,e:1897,
   conns:['china','japan'],
   overview:'Korea\'s civilisational achievement is inseparable from its geopolitical position — a peninsula between China and Japan, subject to pressure from both, which it navigated for 2,000 years by excelling at precisely the things that made assimilation impossible to complete. Hangul, the alphabet invented by King Sejong in 1443, is the world\'s only script designed by committee on explicit phonetic principles — so efficient that Korean literacy jumped from under 10% to near-total within a generation. Metal movable type, invented in Korea two centuries before Gutenberg, printed the world\'s oldest surviving movable-type book in 1377. The 35-year Japanese annexation (1910–1945) was followed by division, devastating war, and then one of the 20th century\'s most remarkable economic transformations. The Korean Wave — cinema, music, food, technology — is one of the 21st century\'s most surprising civilisational exports from a country of 52 million people.',
   d:{
    economy:'Sophisticated celadon porcelain exports commanding premium prices across Asia; the Goryeo and Joseon economies integrating Chinese market systems with distinctive Korean merchant guilds; rice agriculture on the peninsula feeding dense urban populations.',
    political:'The Joseon dynasty\'s (1392–1897) Confucian bureaucracy with the most rigorous civil service examination system in the world — producing a scholar-official class whose meritocratic values shaped Korean society for 500 years.',
    art:'Goryeo celadon — widely regarded as the finest ceramic art ever produced, technically superior to Chinese contemporaries; Joseon white porcelain of austere elegance; haenyeo free-diving culture; the Korean garden tradition.',
    literature:'Hangul — the phonetic alphabet invented by King Sejong in 1443 as the world\'s only script designed by committee, based on articulatory phonetics, and implemented for a specific language — one of the intellectual achievements of the millennium.',
    military:'The turtle ship (geobukseon) — the world\'s first ironclad warship, deployed against the Japanese invasion of 1592; Admiral Yi Sun-sin\'s campaigns against Hideyoshi\'s invasion representing one of history\'s most remarkable defensive military achievements.',
    science:'Movable metal type printing invented in Korea (1230s) — two centuries before Gutenberg; the Jikji (1377) the world\'s oldest surviving book printed with movable metal type; astronomical instruments including the world\'s first rain gauge (1441).',
    medicine:'Dongui Bogam (1613) — a comprehensive medical encyclopaedia synthesising Chinese and indigenous Korean medicine, still referenced by traditional practitioners; acupuncture and moxibustion traditions of great sophistication.',
    religion:'Shamanism as the indigenous Korean spiritual base; Buddhism introduced from China (4th century CE) producing uniquely Korean artistic and philosophical expressions; Neo-Confucianism as the governing ideology of the Joseon dynasty.',
    legacy:'Hangul as possibly the world\'s most rationally designed writing system; metal movable type predating Gutenberg; the K-wave (Korean pop culture, cinema, food) as the 21st century\'s most surprising civilizational export; Samsung, Hyundai, and LG as contemporary markers.',
    gender:'Joseon dynasty Neo-Confucianism imposing strict female seclusion and the samgang (three bonds: ruler/subject, parent/child, husband/wife) creating one of East Asia\'s most restrictive patriarchal systems; yet the haenyeo (female deep-sea divers of Jeju Island) maintaining a tradition of independent female economic activity; Shin Saimdang as the model of accomplished womanhood on the 50,000-won banknote.',
    slavery:'The nobi (enslaved) class comprising up to 30–40% of Joseon Korea\'s population — the highest proportion of enslaved people in any pre-modern society outside ancient Athens — yet protected by more legal rights than Roman chattel slavery; nobi could own property, conduct business, and had legal recourse against abuse.',
    collapse:'Japanese invasion (1592–1598) devastating the peninsula; Manchu invasion (1627, 1636) forcing Korea into tributary status; Japanese annexation (1910–1945) as the most traumatic modern rupture; yet the Joseon dynasty surviving 500 years (1392–1897) as one of history\'s most durable political systems — a testament to the stability of the examination-based bureaucracy.',
    trade:'Korea as the bridge between China and Japan — transmitting Chinese Buddhism, writing, and political philosophy eastward while developing distinctive Korean adaptations; the Kaesong ginseng trade as a commercial speciality; the Joseon tributary system with China as the framework of Korean international commerce.',
    language:'Hangul as possibly the world\'s most rationally designed writing system — 24 letters whose shapes represent the articulatory positions of the sounds they encode; its creation by royal decree (King Sejong, 1443) with a philosophical manifesto explaining its design; now ranked among the world\'s most scientific writing systems by linguists.',
    technology:'Metal movable type (1234) predating Gutenberg by two centuries; the geobukseon (turtle ship) as the world\'s first ironclad warship (1592); the rain gauge (1441) as the world\'s first standardised precipitation measurement instrument; Cheomseongdae observatory (c. 634 CE) as possibly the world\'s oldest surviving astronomical observatory.',
    ecology:'Korea\'s peninsular geography between continental and maritime climates creating exceptional biodiversity; the DMZ (demilitarised zone, 1953–present) as an inadvertent nature reserve recovering 70 years of ecological undisturbed succession — one of the world\'s most biodiverse temperate ecosystems.',
    food:'Kimchi — fermented cabbage with chili, garlic, and ginger — as Korea\'s supreme culinary contribution: a probiotic food technology developed before refrigeration; doenjang, gochujang, and ganjang (fermented soy paste, red chili paste, and soy sauce) as a fermentation tradition of great sophistication; the Korean communal dining tradition (banchan side dishes).',
    philosophy:'Neo-Confucianism as the Joseon state\'s official philosophy — more rigidly applied than in China itself; the Silhak (practical learning) movement of the 17th–18th century as a Korean critique of abstract Confucianism in favour of empirical investigation; the Donghak (Eastern Learning) movement as a 19th-century Korean philosophical synthesis resisting Western imperialism.',
    inequality:'The yangban (scholar-official) class as a hereditary intellectual aristocracy despite the theoretical meritocracy of the examination system; the nobi enslaved class at the bottom; the chungin (middle class of technical specialists) as a buffer layer; Joseon Korea as one of history\'s most rigidly stratified societies.',
    diffusion:'Buddhism transmitted through Korea to Japan (538 CE) — the most consequential Korean cultural export; metal movable type potentially influencing Gutenberg through the Silk Road; Hangul as a model for rational script design studied by linguists globally; K-pop, Korean cinema (Parasite, 2020 Oscar winner), and Korean cuisine as contemporary diffusion.',
    migration:'The Korean peninsula\'s demographic history reflects its position as the land bridge between the Asian continent and Japan. Multiple waves of Tungusic and Altaic peoples migrated south from Manchuria and Siberia to form the Korean population over 5,000 years. Korean migrants to Japan (the Yayoi) brought wet rice cultivation, bronze and iron working, and writing to the archipelago — making Korea the cultural transmission vector for Chinese civilisation entering Japan. Japanese colonial migration (1910–1945) brought 700,000 Japanese settlers to Korea while forcing hundreds of thousands of Koreans to migrate to Japan, Manchuria, and Sakhalin as forced labourers. Today 2.3 million ethnic Koreans live in China (Joseonjok), the legacy of migration during Japanese colonial rule.',
   }},
  {id:'khmer',fp:{mil:7,com:7,art:10,sci:7,reach:5,lon:5},music:{scale:'pentatonic',root:55,tempo:76,timbre:'bell',rhythm:[1,0,1,0,1,1,0,0],reverb:.4,artifact:'Pinpeat ensemble depicted in Angkor Wat bas-reliefs (12th century); roneat ek (bamboo xylophone) as lead melodic instrument; gong chime circle (kong thom) in court ritual'},lon:104,lat:12,nm:'Khmer Empire',sb:'Southeast Asia · 802–1431 CE',x:762,y:280,s:802,e:1431,
   conns:['india','china','srivijaya'],
   overview:'The Khmer Empire at its height (900–1200 CE) built Angkor — the world\'s largest pre-industrial city, sustained by a hydraulic system of 1,000 km² of canals, reservoirs, and moats that enabled three rice harvests per year and fed 750,000 people. Angkor Wat, the largest religious structure ever built, is a cosmological statement in sandstone: the five towers representing Mount Meru, the moat representing the cosmic ocean, the 1,200 metres of continuous bas-relief narrative encoding the entire Hindu mythological universe. The empire collapsed in the 15th century from a combination of climate shift, the hydraulic system\'s own complexity, and Thai military pressure. Angkor Wat itself was never abandoned — it converted from Hindu to Buddhist use and remains an active place of worship. Cambodia put it on its national flag, the only building so honoured.',
   d:{
    economy:'The hydraulic city of Angkor — an urban water management system of 1,000km² of canals, reservoirs, and moats enabling three rice harvests per year and sustaining a population of 750,000 (the largest pre-industrial city on Earth).',
    political:'The devaraja (god-king) concept fusing Hindu-Buddhist theology with absolute royal authority — a Southeast Asian synthesis of Indian political philosophy producing the most centralised state in the region.',
    art:'Angkor Wat — the largest religious structure ever built (400 acres, 5 million tonnes of sandstone) covered in 1,200 metres of continuous bas-relief narrative carving; a monument to Hindu cosmology rendered at civilizational scale.',
    literature:'Sanskrit inscriptions recording royal genealogy and theological doctrine; Khmer-language administrative texts; the visual narrative of Angkor Wat\'s bas-reliefs as a carved library of Hindu mythology and historical memory.',
    military:'Elephant corps of 200,000 beasts; war boats on the Tonle Sap lake; the hydraulic infrastructure of Angkor as a military resource enabling food security during siege; campaigns extending from Vietnam to Burma.',
    science:'The Angkor hydraulic system — the most sophisticated pre-modern water management infrastructure on Earth, managing monsoon flooding and dry-season irrigation across 1,000km²; astronomical orientation of all major temple complexes.',
    medicine:'Ayurvedic tradition inherited from India and adapted to Southeast Asian pharmacopoeia; temple hospital complexes (arogayasala) distributed across the empire providing free healthcare to the population.',
    religion:'Shaivite Hinduism and Theravada Buddhism in sequential and sometimes simultaneous state patronage; Angkor Wat built as a Hindu temple, later converted to Buddhist use — still an active Buddhist site today.',
    legacy:'Angkor Wat as the world\'s largest religious monument and Cambodia\'s national symbol; the hydraulic city model being studied for climate-resilient urban water management; Khmer classical dance (a UNESCO intangible heritage) maintained continuously for 1,200 years.',
    gender:'Khmer women depicted in Angkor\'s bas-reliefs as merchants, musicians, and religious practitioners with evident social agency; the devadasi (temple dancer) tradition giving women religious authority within the temple complex; yet the devaraja (god-king) ideology making the king the supreme religious focus, with women as supporting rather than leading roles.',
    slavery:'The Angkor hydraulic system dependent on organised labour — whether this was corvée (compulsory state labour), slavery, or a religious service obligation is debated; temple inscriptions documenting "slaves of the god" (dasa) as temple workers, possibly enslaved people dedicated to temple service.',
    collapse:'The fall of Angkor (1431 CE) to the Ayutthaya Thai kingdom — one of the most studied collapses in historical climatology; the hydraulic city\'s collapse linked to a 40-year drought (1340–1380 CE) overwhelming the irrigation system, combined with political instability and demographic pressure; the city of 750,000 abandoned in decades.',
    trade:'Angkor\'s hydraulic system enabling rice surpluses exported to Chinese and Indian Ocean merchants; Khmer trade networks connecting to the maritime Silk Road through Champa and Srivijaya; Chinese porcelain found throughout Angkor revealing commercial connections to Song dynasty China.',
    language:'Khmer as the oldest living language in Southeast Asia (inscriptions from 611 CE); the Khmer script ancestor of Thai, Lao, and Burmese writing systems — making Khmer the grandmother of mainland Southeast Asia\'s literary traditions; Sanskrit used for religious and royal inscriptions, Khmer for administrative and vernacular texts.',
    technology:'The Angkor hydraulic system — the most sophisticated pre-modern water management infrastructure on Earth, managing 1,000km² of canals, reservoirs, and moats for three-harvest agriculture; the corbelled arch as the Khmer\'s structural solution to spanning large interior spaces without the true arch.',
    ecology:'The Tonle Sap\'s seasonal reverse flow — filling during monsoon, draining during dry season — as the ecological miracle sustaining Angkor\'s population; the hydraulic city\'s collapse from a combination of climate shift and the system\'s own complexity creating catastrophic fragility; lidar surveys (2015) revealing the full extent of Angkor\'s hydraulic landscape.',
    food:'Rice as the civilisational foundation — the hydraulic system\'s purpose was enabling three rice harvests per year; fish from the Tonle Sap as the primary protein source; the Tonle Sap as the world\'s most productive freshwater fishery, still feeding millions today.',
    philosophy:'The devaraja (god-king) concept as a Hindu-Buddhist philosophical synthesis making the king the axis mundi — literally the centre of the cosmos — legitimating his authority through cosmic rather than military terms; the temple mountain (Angkor Wat, Angkor Thom) as a physical philosophy, materialising the Hindu cosmological universe in stone.',
    inequality:'The temple inscription\'s "slaves of the god" category suggesting extreme inequality between the divine king and temple workers; the massive organised labour required for hydraulic construction implying coercive extraction from the agricultural population; yet the hydraulic system\'s benefit (food security for 750,000 people) providing a genuine public good.',
    diffusion:'The Khmer script as the ancestor of Thai and Lao writing systems; Angkor Wat as both a living Buddhist site and Cambodia\'s national symbol on its flag — the only building on any national flag; Khmer classical dance (robam kbach boran) maintained for 1,200 years as a living UNESCO intangible heritage.',
    migration:'The Khmer people are the result of migration and absorption in the lower Mekong basin — Austroasiatic-speaking people who migrated south from southern China around 2000 BCE, mixing with earlier Austronesian populations. Indian cultural migration through Brahmin priest-scholars and merchants (the \'Indianisation\' of Southeast Asia) arrived by sea from the 1st century CE, providing the religious and political vocabulary for the state that became Angkor. The Khmer Empire\'s expansion was itself a demographic movement — Khmer administrative colonies establishing cultural presence in what is now Thailand, Laos, and Vietnam. After Angkor\'s fall, Thai migration southward progressively reduced Khmer territory to roughly its present boundaries — a 600-year demographic retreat still visible in the Khmer-Thai cultural borderlands.',
   }},
  {id:'srivijaya',fp:{mil:5,com:9,art:6,sci:5,reach:7,lon:5},music:{scale:'slendro',root:60,tempo:72,timbre:'bell',rhythm:[1,0,1,0,0,1,0,1],reverb:.45,artifact:'Gamelan bronze instruments traded across maritime Southeast Asia (9th century); Borobudur reliefs (9th century) depict complete orchestra of 12+ instruments; kendang drum as rhythmic foundation'},lon:105,lat:-2,nm:'Srivijaya Empire',sb:'Maritime Southeast Asia · 650–1275 CE',x:778,y:302,s:650,e:1275,
   conns:['india','china','khmer','islamicworld'],
   overview:'Srivijaya was the medieval world\'s great maritime empire without an army — a Malay Buddhist state based in Sumatra that controlled the Strait of Malacca from roughly 650 to 1275 CE through commercial magnetism rather than military conquest. Every ship trading between the Indian Ocean and South China Sea passed through its waters; Srivijaya taxed them, serviced them, and became fabulously wealthy. The Chinese Buddhist pilgrim Yijing described Palembang as a great centre of Buddhist learning in 671 CE; students came from across Asia to study before proceeding to India. The Chola naval raids of 1025 CE broke Srivijayan commercial dominance, and the empire fragmented. Its most enduring legacy is linguistic: the Malay trade language that served as the Indian Ocean\'s eastern lingua franca became Bahasa Indonesia and Bahasa Malaysia, now spoken by 270 million people.',
   d:{
    economy:'Control of the Strait of Malacca — the world\'s most strategically important maritime chokepoint — enabling taxation of all trade between the Indian Ocean and South China Sea; the first great maritime commercial empire of Southeast Asia.',
    political:'A mandala state — concentric rings of direct control, tributary relationship, and loose alliance — a Southeast Asian political model based on commercial magnetism rather than territorial conquest or military occupation.',
    art:'Buddhist sculpture of great refinement synthesising Indian Gupta and indigenous Malay aesthetic traditions; the Borobudur temple in Java (built under Srivijayan influence) — the world\'s largest Buddhist monument.',
    literature:'Malay as the lingua franca of the Maritime Silk Road; Sanskrit Buddhist texts from the Srivijayan monasteries studied by Chinese pilgrims including Yijing, who described Palembang as a great centre of Buddhist learning.',
    military:'Naval supremacy in the Strait of Malacca enforced through fast war-proa fleets; orang laut (sea nomad) auxiliaries patrolling maritime approaches; commercial rather than territorial expansion as the military objective.',
    science:'Advanced maritime navigation knowledge of monsoon patterns, coastal geography, and stellar navigation enabling regular voyages from Sumatra to China; sophisticated boat-building technology producing the jong (large ocean-going vessel).',
    medicine:'Hindu-Buddhist healing traditions synthesising Indian Ayurveda with indigenous Southeast Asian pharmacopoeia; the Buddhist monasteries of Palembang as centres of medical as well as religious learning.',
    religion:'Mahayana Buddhism adopted from India as the state religion and medium of royal legitimacy; Buddhist monasteries at Palembang attracting monks from China, India, and across Southeast Asia — a cosmopolitan centre of Buddhist scholarship.',
    legacy:'Malay language as the basis of Bahasa Indonesia and Bahasa Malaysia — spoken by 270 million people today; the Strait of Malacca as the world\'s busiest shipping lane still carrying 25% of global trade; Borobudur as one of humanity\'s supreme architectural achievements.',
    gender:'Limited direct evidence of Srivijayan women\'s status; Buddhist ideology theoretically providing spiritual equality; the prominent female deities (Tara, Prajnaparamita) in Srivijayan Buddhist art suggesting cultural acknowledgment of female spiritual power; the practical autonomy of trading women in the port city economy.',
    slavery:'The orang laut (sea nomads) as a semi-enslaved maritime labour force — not formally enslaved but bound by commercial dependency to Srivijayan overlords; enslaved people as a trade commodity through Srivijayan ports; piracy-derived enslaved captives as one component of the Indian Ocean slave market.',
    collapse:'The Chola naval raids (1025 CE) sacking Palembang and breaking Srivijayan commercial dominance; the subsequent fragmentation of the maritime empire into competing successor states; the rise of Majapahit (1293 CE) completing the displacement of Srivijayan dominance — yet Malay language and commercial culture surviving as the Strait of Malacca\'s enduring medium.',
    trade:'Control of the Strait of Malacca as the world\'s most strategic commercial chokepoint — all maritime trade between the Indian Ocean and South China Sea passing through Srivijayan-taxed waters; the mandala state\'s commercial magnetism attracting traders through service provision rather than coercing them through military blockade.',
    language:'Old Malay as both the administrative and commercial language of the maritime empire — the ancestor of Bahasa Indonesia and Bahasa Malaysia, now spoken by 270 million people; the Kedukan Bukit inscription (683 CE) as the oldest surviving Malay text; Sanskrit for religious and royal inscription.',
    technology:'The jong (large ocean-going vessel) as Southeast Asia\'s supreme maritime technology — three-masted, with multiple layers of hull planking lashed rather than nailed, more resilient in the Indian Ocean than Chinese or Arab contemporaries; the outrigger canoe as the foundational Pacific maritime technology.',
    ecology:'The Strait of Malacca\'s unique ecology — shallow, narrow, and lying between the Indian Ocean and Pacific monsoon systems — creating the commercial geography that made Srivijaya possible; the mangrove coastlines as both protective barrier and commercial resource (timber, fish).',
    food:'Spices from the eastern archipelago (nutmeg, cloves from the Moluccas) transiting through Srivijayan ports to the Indian Ocean trade network; rice as the dietary foundation; the extraordinary aquatic food resources of the Strait of Malacca\'s shallow waters.',
    philosophy:'Mahayana Buddhism as the state\'s philosophical foundation — the Srivijayan king as a bodhisattva (enlightenment being) serving all sentient creatures; Yijing\'s account of Srivijayan Buddhist learning as comparable to India\'s great centres; the syncretic incorporation of Hindu elements alongside Buddhist practice.',
    inequality:'The mandala state\'s concentric inequality — from the raja\'s immediate court to tributary chiefs to the orang laut at the periphery; merchant wealth as an alternative to birth-based hierarchy; the absence of monumental royal tombs suggesting a somewhat less extreme court inequality than mainland Southeast Asian contemporaries.',
    diffusion:'Malay as the basis of the world\'s fourth most-spoken language family (Indonesian/Malay, 270 million speakers); the Srivijayan Buddhist learning tradition transmitted to mainland Southeast Asia and China; the commercial Malay language serving as the Indian Ocean\'s eastern lingua franca for 1,000 years.',
    migration:'Srivijaya was built on the migration of the Austronesian peoples — the most expansive voluntary ocean migration in human history, spreading from Taiwan through the Philippines, Indonesia, and into the Pacific over 3,000 years. The Strait of Malacca\'s position at the intersection of the Southeast Asian and Indian Ocean migration corridors made Srivijaya\'s prosperity inevitable: Arab, Indian, Chinese, and Malay merchants all migrated through or settled at its ports. The orang laut (sea nomads) — stateless maritime peoples living entirely on boats — were Srivijaya\'s mobile maritime infrastructure, their perpetual movement maintaining the empire\'s commercial connectivity. After Srivijaya\'s collapse, Malay migration spread the commercial culture and language southward into Java and eastward across the archipelago, making Malay the lingua franca of 270 million people.',
   }},
  {id:'majapahit',fp:{mil:7,com:8,art:8,sci:5,reach:6,lon:3},music:{scale:'pelog',root:55,tempo:70,timbre:'bell',rhythm:[1,0,0,1,0,1,0,0],reverb:.5,artifact:'Gamelan sekaten documented from Majapahit court (14th century); saron (bronze bar metallophone) as central gamelan voice; bedug (large drum) introduced via Islamic influence'},lon:112,lat:-7,nm:'Majapahit Empire',sb:'Java & Maritime Southeast Asia · 1293–1527 CE',x:796,y:322,s:1293,e:1527,
   conns:['srivijaya','china','india'],
   overview:'Majapahit was Java\'s greatest empire — and arguably Southeast Asia\'s — reaching its peak under Gajah Mada, whose Palapa Oath (1336) swore to unify the entire Indonesian archipelago before consuming spiced food. He largely succeeded: Majapahit at its height controlled 98 tributary states from the Philippines to New Guinea, the first political concept of what would become Indonesia. The empire\'s collapse in the 15th century came not from military defeat but from the Islamic conversion of its coastal trading cities, which withdrew their commercial loyalty to the inland Hindu-Buddhist court. The court culture retreated to Bali, where it survives intact; the Majapahit political concept of archipelagic unity survived into Indonesian nationalism; and the Garuda — Majapahit\'s heraldic bird — now sits on Indonesia\'s national emblem.',
   d:{
    economy:'The most commercially integrated maritime empire in Southeast Asian history — Javanese pepper, rice, and textiles traded across a network from the Philippines to Madagascar; Majapahit harbours handling Chinese, Indian, Arab, and Malay merchants simultaneously.',
    political:'Gajah Mada\'s Palapa Oath (1336) — to unify the entire archipelago under Majapahit before eating any spiced food — one of history\'s most remarkable statements of imperial ambition, and largely fulfilled: the first political unification of what would become Indonesia.',
    art:'East Javanese temple art developing a distinctively Indonesian aesthetic departing from Indian models; the wayang shadow puppet theatre as a vehicle for Hindu-Buddhist cosmological narrative; batik textile traditions of extraordinary complexity.',
    literature:'The Nagarakretagama (1365) — an epic poem describing the Majapahit empire at its height, a remarkable primary source; the Pararaton (Book of Kings) encoding dynastic memory; kakawin poetry in Old Javanese.',
    military:'Naval power projecting across 5,000km of archipelago; the fall of Singhasari initiating the empire; campaigns against Mongol-backed forces; the Majapahit military machine maintaining control of 98 tributaries across Southeast Asia.',
    science:'Advanced agricultural systems in Java supporting population densities comparable to medieval Europe; maritime navigation techniques enabling regular voyaging across the Java Sea and beyond; bronze casting of great technical sophistication.',
    medicine:'Javanese traditional medicine (jamu) — still widely practised with 30 million users today — developing a comprehensive herbal pharmacopoeia across the extraordinary biodiversity of the Indonesian archipelago.',
    religion:'A syncretic fusion of Shaivite Hinduism, Buddhism, and indigenous Javanese spirituality (kejawen) — a religious model of deliberate pluralism that would shape Indonesian religious culture into the 21st century.',
    legacy:'The concept of a unified Indonesian archipelago as a political identity originates with Majapahit; jamu traditional medicine with 30 million contemporary users; wayang puppet theatre as a living UNESCO intangible heritage; the Garuda (Majapahit symbol) on Indonesia\'s national emblem today.',
    gender:'The Majapahit court\'s notable female religious figures — the Buddhist abbess Tribhuwana Wijayatunggadewi actually ruling as queen (1328–1351 CE) and commissioning the Nagarakretagama; women\'s prominent roles in the wayang (shadow puppet) theatrical tradition; the Dewi Sri (rice goddess) as the supreme female sacred figure in Javanese culture.',
    slavery:'Bound labour in the Majapahit agricultural and maritime system; enslaved people from raid and conquest as palace and temple workers; the babat (clearing) system requiring agricultural communities to provide labour service to the state; yet the commercial ports\' relative freedom for merchant classes.',
    collapse:'The Majapahit collapse (c. 1478–1527 CE) from the spread of Islam through coastal trading communities — the northern Javanese port cities converting and withdrawing tribute; internal dynastic conflict; the Demak Sultanate\'s military pressure; a 50-year fragmentation rather than sudden collapse, with the Hindu-Buddhist court tradition surviving in Bali.',
    trade:'Java\'s spice trade position — controlling pepper, rice, and access to the eastern spice islands (nutmeg and cloves from the Banda Islands) — making Majapahit Java the central node in the Maritime Silk Road\'s eastern section; Javanese merchants documented in ports from Madagascar to the Philippines.',
    language:'Old Javanese (Kawi) as the literary and religious language; the Nagarakretagama\'s extraordinary literary quality demonstrating a mature written tradition; Javanese as one of the world\'s most complex sociolinguistic systems, with three distinct registers (ngoko, madya, krama) encoding hierarchy in every utterance.',
    technology:'The wayang kulit (shadow puppet) as both artistic and mechanical technology — leather puppets manipulated with extraordinary dexterity to tell cosmological narratives by lamplight; bronze casting of great sophistication; the advanced Javanese shipbuilding tradition producing the jong for trans-oceanic voyaging.',
    ecology:'Java\'s volcanic soil as one of the world\'s most fertile — the volcanic islands of the Indonesian archipelago as uniquely productive agricultural environments; the sawah (wet rice terrace) system as a sophisticated hydraulic landscape creating the food surplus sustaining Majapahit\'s urban and military population.',
    food:'The Javanese culinary tradition of tempe (fermented soybean cake — a Javanese invention now global), tahu (tofu adapted from Chinese practice), and the extraordinarily diverse spice tradition; the rijsttafel (Dutch colonial elaboration of the Javanese multi-dish meal) as a bridge between Javanese and European food culture.',
    philosophy:'The Javanese-Hindu philosophical synthesis — kejawen (Javanese mysticism) blending Hindu cosmology, Buddhist meditation, and animist reverence for sacred landscapes into a unique spiritual tradition surviving the Islamic conversion of Java\'s courts; the wayang as a living philosophical theatre performing the Mahabharata and Ramayana with Javanese commentary.',
    inequality:'The four-tier Majapahit social hierarchy (brahmins, nobles, farmers, others) adapted from Indian varna into a Javanese social context; the elaborate court etiquette and linguistic register system as the primary daily enactment of social hierarchy; the commercial port cities as relative zones of equality based on merchant wealth.',
    diffusion:'The Majapahit Garuda symbol on Indonesia\'s national emblem; tempe and its fermentation technology now a global plant-protein food; the wayang tradition as a UNESCO intangible heritage; Javanese cosmological vocabulary (karma, dharma, ratu adil/just king) embedded in Indonesian political language.',
    migration:'Majapahit\'s Java was the destination of multiple migration streams: Austronesian farmers arriving 4,000 years ago, Indian cultural migrants (Brahmin priests, merchants) from the 1st millennium CE, and Chinese traders settling in north Javanese port cities from the Song dynasty onward. The Majapahit state\'s expansion was partly demographic — Javanese administrators and military families migrating to Bali, Borneo, and the Moluccas as the empire\'s governing class. The empire\'s Islamic conversion began with the migration of Muslim merchants into coastal cities, creating a new urban demographic whose commercial wealth eventually outweighed the inland Hindu-Buddhist court. Majapahit\'s Hindu-Buddhist nobility who fled to Bali after the Islamic conversion (15th century) were the most consequential cultural migration in Southeast Asian history — preserving in Bali a living Majapahit court culture that survived nowhere else.',
   }},
  {id:'teotihuacan',fp:{mil:7,com:7,art:8,sci:6,reach:5,lon:4},music:{scale:'pentatonic',root:67,tempo:88,timbre:'panpipe',rhythm:[1,1,0,1,0,1,1,0],reverb:.3,artifact:'Conch shell trumpets (tecciztli) found in Feathered Serpent Pyramid (c.200 CE); clay animal ocarinas and rasps in burial contexts; 200+ musical instruments excavated'},lon:-98,lat:19,nm:'Teotihuacan',sb:'Central Mexico · 100–550 CE',x:183,y:244,s:100,e:550,
   conns:['maya','olmec'],
   overview:'Teotihuacan was, at its peak around 450 CE, one of the world\'s five largest cities — home to 125,000–200,000 people, larger than contemporary Rome — built on the Valley of Mexico\'s obsidian trade and organised on a cosmological grid aligned to astronomical events. Unlike every other Mesoamerican civilisation, Teotihuacan left no named rulers, no dynastic inscriptions, and no portraits of individual kings: the state presented itself as an impersonal cosmic force rather than a personal monarchy. Its influence extended across Mesoamerica — Teotihuacan warriors appear on Maya monuments at Tikal, and its Feathered Serpent deity was transmitted directly to the Aztecs as Quetzalcoatl. Around 550 CE, the ceremonial core was deliberately burned — targeted destruction of elite compounds while residential areas were spared, suggesting an internal revolt against the ruling class rather than external conquest.',
   d:{
    economy:'The obsidian trade monopoly — Teotihuacan controlled the richest obsidian sources in Mesoamerica, supplying the sharpest cutting tools in the pre-metal Americas across a trade network spanning the entire region.',
    political:'A city of 125,000–200,000 people (larger than contemporary Rome at its peak) apparently governed without a dynastic monarchy — administrative compounds suggesting a collective governance model unique in Mesoamerica.',
    art:'The Avenue of the Dead; the Pyramid of the Sun (the third-largest pyramid on Earth); multi-room apartment compounds decorated with murals of great iconographic complexity — an urban aesthetic of monumental restraint.',
    literature:'Teotihuacan\'s writing system is poorly understood — a pre-figurative system of signs and symbols whose full decipherment awaits; iconographic programs on murals encoding religious and political ideology in visual rather than phonetic form.',
    military:'The destruction of competing Mesoamerican polities (Cuicuilco c. 100 BCE; the sacking of Tikal c. 378 CE) demonstrating military projection across vast distances; the Teotihuacan warrior in full military regalia depicted on Maya monuments.',
    science:'The Pyramid of the Sun aligned precisely to the setting of the Pleiades on its zenith passage; the city\'s entire layout oriented 15.5° east of north to an astronomical baseline; sophisticated engineering achieving pyramids without metal tools.',
    medicine:'Evidence of dedicated healers within the apartment compound social structure; extensive use of mica (whose function remains debated — possibly ritual, possibly practical); obsidian surgical tools of exceptional sharpness.',
    religion:'The Feathered Serpent (Quetzalcoatl) and the Storm God as supreme deities — deities transmitted to the Aztecs and Mayas, connecting Teotihuacan\'s religious tradition forward 1,000 years; mass sacrifice at the Feathered Serpent Pyramid.',
    legacy:'Quetzalcoatl as the deity concept transmitted to the Aztecs — whose expectation of his return shaped Montezuma\'s fatal hesitation before Cortés; Teotihuacan\'s urban planning model influencing every subsequent Mesoamerican city; the Pyramid of the Sun among the world\'s great monuments.',
    gender:'The absence of a named, depicted ruler in Teotihuacan\'s art — in contrast to every other Mesoamerican civilisation — possibly reflecting collective governance; the "Goddess of Teotihuacan" as the supreme religious figure, depicted spreading abundance from her hands — suggesting a female-centred religious iconography unusual in Mesoamerica.',
    slavery:'The compound apartment system at Teotihuacan possibly housing craft specialists in conditions ranging from comfortable guild membership to indentured labour; the mass sacrifice at the Feathered Serpent Pyramid (200+ individuals) including bound captives — evidence of violent coercive power alongside the apparent administrative consensus.',
    collapse:'The burning of Teotihuacan\'s central ceremonial core (c. 550 CE) — apparently a deliberate, targeted destruction of elite compounds while leaving residential areas intact, suggesting internal revolt against an exploitative ruling class rather than external conquest.',
    trade:'The obsidian monopoly from the Pachuca and Otumba mines as Teotihuacan\'s commercial foundation; trade goods (green obsidian, Thin Orange ware pottery, cacao) found across Mesoamerica; the Teotihuacan merchant barrio at Monte Albán as evidence of commercial diaspora communities.',
    language:'Teotihuacan\'s writing system — a pre-figurative combination of signs, footprints, and pictographic elements — not yet fully deciphered; the language spoken (possibly Nahuatl, Totonac, or Totonacan) unknown; the iconographic program on murals as a visual rather than phonetic communication system.',
    technology:'The talud-tablero architectural form (sloped base with vertical panel) as Teotihuacan\'s distinctive contribution to Mesoamerican architecture — adopted across the region including at Tikal; mica sheets in the Mica Temple of unknown function; the apartment compound as an urban planning innovation.',
    ecology:'Teotihuacan\'s location in a lake-valley system enabling agriculture and water management; the systematic exploitation of the Basin of Mexico\'s resources contributing to eventual environmental depletion; the city\'s orientation on astronomical axes reflecting its cosmological relationship with landscape.',
    food:'The milpa system (corn, beans, and squash cultivated together as the "Three Sisters") as Teotihuacan\'s agricultural foundation — a companion planting system of great ecological sophistication providing complete nutrition; cacao as both beverage and currency; the maguey agave as a multi-purpose food, fibre, and beverage plant.',
    philosophy:'The Feathered Serpent (Quetzalcoatl) as a philosophical concept — the unification of earth (serpent) and sky (bird feathers) as a cosmological synthesis; the Storm God as the force of agricultural abundance; the pyramid-mountain as a cosmological statement that the human built environment participates in the natural sacred order.',
    inequality:'The apartment compound system at Teotihuacan showing surprising variation in wealth between compounds — some with fine frescos and imported luxury goods, others basic; yet significantly less inequality than contemporary Maya polities; the possible internal revolt (c. 550 CE) targeting elite compounds as evidence of class conflict.',
    diffusion:'Teotihuacan\'s political and religious influence documented at Maya sites from Guatemala to Yucatán — possibly representing military conquest, commercial expansion, or religious diffusion; Quetzalcoatl transmitted to the Aztecs; the talud-tablero architectural form spreading across Mesoamerica; the city\'s sheer size (perhaps 125,000 people) making it the standard of urban ambition for all Mesoamerican successors.',
    migration:'Teotihuacan was built by migration — its rapid growth from a small town to the Americas\' largest city between 100 BCE and 150 CE required migrants from across Mesoamerica. Archaeological evidence shows distinct ethnic enclaves within the city: an Oaxacan barrio, a Gulf Coast Veracruz barrio, a Maya barrio — each maintaining their own ceramic traditions and burial practices within Teotihuacan\'s cosmopolitan urban fabric. Teotihuacan merchants and possibly military colonists migrated outward across Mesoamerica — the \'Teotihuacan entrada\' at the Maya city of Tikal (378 CE) representing either a military migration or a political coup that installed a Teotihuacan-affiliated dynasty. The city\'s burning (c. 550 CE) triggered outward migration of its population across Mexico, dispersing Teotihuacan\'s technological and artistic traditions into successor cultures.',
   }},
  {id:'puebloans',fp:{mil:4,com:5,art:7,sci:5,reach:4,lon:6},music:{scale:'pentatonic',root:64,tempo:72,timbre:'panpipe',rhythm:[1,0,1,0,1,0,0,1],reverb:.35,artifact:'Anasazi bone flute (Canyon del Muerto, c.620 CE) — oldest playable flute in North America; painted flute player (Kokopelli) in rock art; drum-and-chant ceremonies in kiva contexts'},lon:-108,lat:36,nm:'Ancestral Puebloans',sb:'American Southwest · 100–1300 CE',x:153,y:216,s:100,e:1300,
   conns:['cahokia'],
   overview:'The Ancestral Puebloans of the American Southwest built Chaco Canyon\'s great houses, Mesa Verde\'s cliff dwellings, and Pueblo Bonito\'s 800-room complex as the centres of a regional civilisation whose influence extended across 100,000 km² connected by engineered roads that served no wheeled vehicles and no draft animals. Chaco\'s great houses aligned to lunar standstills and solar solstices; its Sun Dagger site tracked the calendar with precision across carved canyon walls. The Great Drought of 1275–1299 CE triggered an organised withdrawal southward to the Rio Grande — not a collapse but a deliberate relocation — and the descendant Pueblo communities (Hopi, Zuni, Acoma) have maintained cultural continuity ever since. The Pueblo Revolt of 1680, expelling the Spanish from New Mexico for twelve years, was the most successful Indigenous uprising against European colonialism in North American history.',
   d:{
    economy:'Turquoise trade networks connecting Chaco Canyon to Mesoamerica; a redistributive economy managed through the great houses; agricultural intensification in a semi-arid environment through irrigation, water harvesting, and drought-resistant maize cultivation.',
    political:'Chaco Canyon as a regional centre of ritual and political authority — the great houses (Pueblo Bonito, 800 rooms) functioning as ceremonial aggregation centres rather than permanent residences, coordinating communities across 100,000km².',
    art:'Pueblo Bonito and Cliff Palace at Mesa Verde — architectural achievements of breathtaking elegance built directly into canyon walls; black-on-white pottery of geometric precision; turquoise mosaic jewellery of great refinement.',
    literature:'Oral traditions preserved by descendant Pueblo communities (Hopi, Zuni, Acoma) encoding cosmological narratives, agricultural knowledge, and historical memory across 2,000 years; kiva wall paintings as visual theological statements.',
    military:'Cliff dwellings at Mesa Verde as defensive architecture responding to regional conflict in the 13th century; the abandonment of Chaco Canyon possibly representing organised retreat in response to drought and social instability rather than military defeat.',
    science:'Astronomical alignment of Chaco Canyon\'s great houses to solstice and lunar standstill events; the Sun Dagger site at Fajada Butte as a precision solar and lunar calendar carved into a canyon wall; sophisticated water harvesting systems in a desert environment.',
    medicine:'Ethnobotanical traditions of the American Southwest — peyote, datura, and hundreds of medicinal plants; skeletal evidence of sophisticated bone-setting; kiva ceremony as communal psychological healing integrated with agricultural ritual.',
    religion:'Kachina spirits as intermediaries between humanity and the cosmic order; the kiva as the sacred subterranean space recreating the sipapu (emergence hole) through which humanity entered this world; rain ceremony as the central ritual.',
    legacy:'Pueblo communities (Hopi, Zuni, Acoma) as direct living descendants maintaining cultural continuity; Chaco Canyon a UNESCO World Heritage site; Pueblo architectural principles influencing Adobe Revival architecture across the American Southwest.',
    gender:'The matrilineal and matrilocal social organisation of Pueblo societies — women owning houses and passing them to daughters; the female-controlled agricultural cycle as the economic foundation; the kachina religious system with female kachina figures representing sacred powers; yet the male-dominated kiva religious societies restricting women from the most sacred ceremonies.',
    slavery:'The capture and adoption (rather than chattel slavery) of individuals from raiding as the primary form of coerced incorporation; the nadir (Navajo for "enemy") captive adoption system; the encomienda system after Spanish contact (1540s) imposing forced labour tribute on Pueblo communities — the Pueblo Revolt (1680) the most successful Indigenous uprising against European colonialism in North America.',
    collapse:'The Great Drought (1275–1299 CE) triggering the depopulation of Chaco Canyon and the Mesa Verde cliff dwellings — an organised retreat rather than catastrophic collapse, with communities relocating southward to the Rio Grande; the drought-collapse cycle as a recurring feature of Southwestern prehistory, each time producing cultural reorganisation rather than disappearance.',
    trade:'The Chaco road system — 400+km of engineered roads radiating from Chaco Canyon without wheeled vehicles or draft animals — as a ceremonial and commercial infrastructure; turquoise from New Mexico found as far as Teotihuacan; macaw feathers from Mexico found in Chaco Canyon — evidence of long-distance exchange reaching deep into Mesoamerica.',
    language:'The Pueblo language families — Tanoan, Keresan, Zunian, and Hopi — as isolated language families with no relatives, suggesting extraordinary antiquity; the preservation of oral ceremonial traditions across 2,000 years despite Spanish suppression; the Hopi language as a completely isolated language family.',
    technology:'Dry masonry construction achieving multi-story structures at altitude; the Hohokam irrigation system in the Sonoran Desert (600km of canals) as one of North America\'s most sophisticated pre-Columbian hydraulic works; the kiva (sunken ceremonial chamber) as an architectural technology recreating the underworld in every community.',
    ecology:'The Ancestral Puebloan adaptation to one of Earth\'s most challenging agricultural environments — the Colorado Plateau\'s semi-arid sandstone landscape — through water harvesting, check dams, terracing, and drought-resistant maize breeding; the deep reading of environmental signs encoded in ceremonial knowledge.',
    food:'The Three Sisters (corn, beans, squash) as both dietary foundation and agricultural theology — the sacred plants whose cultivation defined Pueblo identity; pine nuts, deer, and rabbit supplementing the agricultural diet; the grinding stone (mano and metate) as the primary food technology, shaping women\'s daily labour and social organisation.',
    philosophy:'The sipapu — the emergence hole through which humanity entered this world from the underworld below — as the central cosmological concept, recreated physically in every kiva; the kachina spirits as intermediaries between human and cosmic order; rain ceremony as the fundamental obligation of the community to maintain the cosmic contract.',
    inequality:'The great house residents of Chaco Canyon showing significantly better nutrition and health than outlier community members — evidence of elite extraction of resources; turquoise ornaments concentrated in Chaco Canyon elite contexts; yet the later Rio Grande Pueblo communities showing more egalitarian social organisation after the Chaco system\'s collapse.',
    diffusion:'The Pueblo Revolt (1680) as the most successful Indigenous uprising against European colonialism, expelling the Spanish from New Mexico for 12 years and forcing the return of religious and land rights; Pueblo pottery traditions (Maria Martinez\'s black-on-black ware) as living artistic traditions; Adobe architecture as the aesthetic foundation of Southwestern American design.',
    migration:'The Ancestral Puebloans were perpetual migrants — moving their communities in response to drought, soil exhaustion, and social stress, leaving behind the cliff dwellings and great houses that have become their most visible legacy. The Basketmaker-to-Pueblo transition (c. 700 CE) involved progressive migration from pit-house villages into above-ground masonry communities as populations aggregated. The Great Drought (1275–1299 CE) triggered the most dramatic migration event: the complete abandonment of the Colorado Plateau and Mesa Verde region, as communities of thousands moved southward to the Rio Grande valley over a generation. This was organised migration, not panicked flight — communities arriving in the Rio Grande with their ritual objects, architectural knowledge, and ceremonial calendars intact. Their descendants, the modern Pueblo peoples, are migrants who found their permanent home.',
   }},
  {id:'tiwanaku',fp:{mil:5,com:6,art:7,sci:6,reach:5,lon:4},music:{scale:'andean',root:57,tempo:66,timbre:'panpipe',rhythm:[1,0,1,0,0,1,0,0],reverb:.4,artifact:'Siku (panpipes) found in Tiwanaku burials (c.700 CE) — male/female interlocking parts; quena (notched flute) bone examples; pututu (conch horn) for ceremonial assemblies'},lon:-69,lat:-16,nm:'Tiwanaku & Wari',sb:'Andean Highlands · 300–1000 CE',x:212,y:370,s:300,e:1000,
   conns:['inca'],
   overview:'Tiwanaku flourished on the Bolivian altiplano around Lake Titicaca at 3,800 metres altitude — one of the highest cities in the ancient world — sustained by the suka kollus raised-field agriculture system, which turned the waterlogged altiplano into productive farmland whose water channels absorbed solar heat, protecting crops from night frosts. The Gateway of the Sun, carved from a single andesite block, encodes a complete cosmological system in its frieze; the Akapana pyramid replicates the shape of the sacred mountain Illimani. The empire collapsed around 1000 CE from a 400-year drought that lowered Lake Titicaca and made the raised-field system unworkable — an ecological collapse that was also a theological one, as the agricultural system\'s failure delegitimated the gods who had supposedly sustained it. Tiwanaku\'s religious iconography (the Viracocha creator deity) was transmitted directly into Inca cosmology, making the Inca the Tiwanaku tradition\'s living heir.',
   d:{
    economy:'Raised-field (suka kollus) agriculture on the Bolivian altiplano at 3,800 metres elevation — an agricultural engineering system draining waterlogged land into productive fields, sustaining a population of 400,000 around Lake Titicaca.',
    political:'The first Andean horizon empire — Tiwanaku\'s religious iconography (the Gateway God, the Staff God) spreading across the Andes through prestige goods and pilgrimage rather than military conquest, prefiguring the Inca model.',
    art:'The Gateway of the Sun — a monolithic stone arch carved from a single andesite block weighing 10 tonnes, its gateway figure radiating 48 effigies encoding a complete cosmological system; polychrome Wari textiles of extraordinary complexity.',
    literature:'No surviving writing system; iconographic programs on pottery, textiles, and stone monuments encoding cosmological and historical narrative in visual form; the quipu recording tradition may originate in Tiwanaku administrative practice.',
    military:'Wari\'s military expansion across Peru contrasting with Tiwanaku\'s religious diplomacy — the two empires representing complementary models of Andean state formation, coexisting for 500 years without apparent major conflict.',
    science:'Raised-field agriculture as a climate-buffering technology — the water-filled channels between raised beds absorbing solar radiation and releasing heat at night, protecting crops from Andean frosts; hydraulic engineering at altitude.',
    medicine:'High-altitude medicine of great sophistication; coca leaf as the primary pharmacological tool for altitude adaptation; skull trepanation with survival rates suggesting advanced surgical skill; evidence of intentional cranial modification as cultural practice.',
    religion:'The Gateway God as the supreme Andean deity — a weeping figure holding staffs, flanked by winged attendants — transmitted forward into Inca religion as Viracocha; the Sun Island on Lake Titicaca as the sacred origin point of the Inca civilisation itself.',
    legacy:'The raised-field agricultural system being actively reconstructed by Bolivian and Peruvian farmers as a climate-adaptive food security technology; Tiwanaku\'s Gateway God as a symbol on the Bolivian coat of arms; the Inca civilisation the direct cultural and religious heir.',
    gender:'Limited direct evidence of gender at Tiwanaku; the Gateway God\'s gender ambiguity (possibly androgynous); textile production (typically female in Andean societies) as a sacred activity producing ritual clothing; the female deity Pachamama (earth mother) as the supreme agricultural deity in the Andean cosmological system that Tiwanaku helped institutionalise.',
    slavery:'The mit\'a (rotational labour tax) system requiring periodic labour service from all community members for state projects — a form of coerced labour without permanent enslavement; the Wari Empire\'s administrative system using attached retainers (yana) in conditions closer to permanent servitude; llama herding communities providing tribute in animal products.',
    collapse:'Tiwanaku\'s collapse (c. 1000 CE) from a 400-year drought reducing Lake Titicaca\'s level and making the raised-field agricultural system unworkable — one of the most thoroughly documented climate-driven civilisational collapses in archaeology; the agricultural system whose collapse killed the state was ironically the most sophisticated climate-adaptive farming system ever devised.',
    trade:'The Tiwanaku exchange network connecting the altiplano to the Pacific coast (dried fish, seaweed, copper), the eastern valleys (coca, tropical fruits), and the Amazon basin (feathers, hallucinogens) — an altitude-gradient trade system uniquely adapted to the Andes\' vertical ecology.',
    language:'No writing system at Tiwanaku; Aymara as the probable spoken language — still spoken by 2.8 million people in Bolivia and Peru as a direct cultural descendant; the quipu (knotted-string recording) possibly originating in Tiwanaku administrative practice before its full development under the Inca.',
    technology:'Raised-field (suka kollus) agriculture as the supreme Andean technological achievement — draining waterlogged altiplano into productive fields whose water channels absorb solar heat, protecting crops from night frosts at 3,800 metres altitude; stone architecture achieving precise fitting without mortar at extreme altitude with bronze tools.',
    ecology:'The suka kollus raised-field system as one of history\'s most ecologically intelligent agricultural technologies — simultaneously draining waterlogged land, creating frost protection, and generating fish and waterfowl as additional food sources; its active reconstruction by Bolivian farmers today as a climate-adaptive food security system.',
    food:'Quinoa, potatoes (the origin of all global potato cultivation), and chuño (freeze-dried potato technology enabling multi-year storage) as Tiwanaku\'s supreme food contributions; llama and alpaca as both labour animals and meat sources; totora reed from Lake Titicaca as food, building material, and boat construction resource.',
    philosophy:'The Gateway God (Viracocha) as the Andean cosmological synthesis — a creator deity whose weeping eyes (possibly rain) and staffs (possibly thunderbolts) encoding a theology of cosmic generosity; the concept that the sacred and the practical are identical — the suka kollus fields as both agricultural technology and cosmological statement.',
    inequality:'The sunken temple and Akapana pyramid at Tiwanaku encoding extreme sacred-secular hierarchy; the elite consumption of chicha (maize beer) and rare imports (Spondylus shells, tropical feathers) versus commoner subsistence on potatoes and quinoa; yet the mit\'a system distributing state labour obligations across all social groups.',
    diffusion:'The potato and its cultivation spreading from Andean origins to become one of the four most important crops in world history (feeding Europe\'s population boom after 1600); quinoa now a globally consumed superfood; the Viracocha deity transmitted into Inca religion; the Inca empire the direct political and cultural successor.',
    migration:'Tiwanaku\'s expansion across the Andes was accomplished through an archipelago migration strategy — sending colonists to distant ecological zones (the coast, the tropical valleys, the altiplano) to establish resource-extraction communities while the capital remained fixed. These vertical archipelago colonies, described by John Murra as an \'Andean ecological model\', were deliberate migrations of between 50 and 500 families maintaining cultural identity while exploiting diverse environments. The empire\'s collapse (c. 1000 CE) triggered reverse migration — altiplano colonists withdrawing back toward Lake Titicaca, abandoning agricultural investments in the lowlands. This collapse migration dispersed Tiwanaku\'s population across the Andes in small groups that became the ethnic seeds from which the Aymara, Quechua, and other Andean peoples assembled.',
   }},
  {id:'colonial',fp:{mil:9,com:10,art:6,sci:8,reach:10,lon:4},music:{scale:'lydian',root:60,tempo:84,timbre:'pluck',rhythm:[1,0,1,0,1,0,1,0],reverb:.35,artifact:'Baroque polyphony (Bach, Handel) as European dominant form; colonial hybrid musics emerging: son jarocho (Mexico), choro (Brazil), Andean mestizo traditions'},lon:2,lat:48,nm:'European Colonial Age',sb:'Europe & Global · 1400–1800 CE',x:442,y:128,s:1400,e:1800,
   conns:['medieval','ottoman','aztec','inca','westafrica','india'],
   overview:'Between roughly 1400 and 1800 CE, European maritime powers — Portugal, Spain, the Netherlands, Britain, France — built the first truly global economy, connecting previously isolated human populations through trade, conquest, and the largest forced migration in history. The consequences were simultaneously the most creative and most destructive set of exchanges in human history: plants, animals, diseases, and ideas crossing oceans in both directions, the Columbian Exchange permanently altering agriculture and ecology on every continent. Twelve and a half million Africans were transported to the Americas as enslaved people; Indigenous American populations fell by 90% from introduced diseases; the plantation system generated the capital that funded the Industrial Revolution. The global inequalities structured by this period — between North and South, between former colonisers and colonised — remain the dominant axis of contemporary geopolitics.',
   d:{
    economy:'The extraction of 150,000 tonnes of silver from Potosí alone between 1545 and 1800 — the first truly global monetary system; the joint-stock company (the Dutch and English East India Companies) as the legal invention funding world-scale commercial enterprise.',
    political:'The Westphalian system (1648) establishing the nation-state as the fundamental unit of international order; colonial administration projecting European legal and political structures across four continents; the Atlantic slave trade as a deliberate political-economic system.',
    art:'Baroque as the art of colonial power — Rubens, Rembrandt, Caravaggio; the extraordinary hybrid artistic traditions of colonial Latin America blending Indigenous, African, and European aesthetics; the Mughal miniature synthesising Persian and European painting.',
    literature:'Cervantes, Shakespeare, Montaigne, and Milton redefining the possibilities of prose and poetry; the first newspapers and the pamphlet as mass communication technologies; travel literature constructing European consciousness of a world suddenly vast.',
    military:'The gunpowder revolution making European military technology decisive at global range; the galleon as a weapons platform enabling oceanic force projection; the first industrialised slave-raiding systems deploying military force for commercial ends.',
    science:'The Scientific Revolution — Copernicus, Galileo, Kepler, Newton — replacing Aristotle\'s cosmology with mathematical physics; the Royal Society founding empirical science as an institutional practice; global botanical expeditions cataloguing the world\'s pharmacopoeia.',
    medicine:'William Harvey\'s blood circulation (1628); the first controlled clinical trials; vaccination\'s precursors in variolation (adopted from Ottoman and Chinese practice); the catastrophic spread of European epidemic diseases killing 90% of some Indigenous American populations.',
    religion:'The Protestant Reformation fracturing European Christendom; Jesuit global missions creating the first multinational religious organisation; religious persecution (Inquisition, Wars of Religion) killing millions while missionary activity spreading Christianity to every continent.',
    legacy:'The nation-state system, capitalism, the scientific method, and global English — four civilizational exports from this 400-year period structuring every aspect of the contemporary world, for better and worse, in ways still being contested.',
    gender:'The colonial encounter radically reorganising gender — European patriarchal legal systems imposed on societies with matrilineal governance; the racialised sexual violence of slavery and conquest as a systematic tool of domination; yet the convento (colonial convent) as a space of female intellectual and artistic activity, producing poets like Sor Juana Inés de la Cruz (Mexico, 1648–1695) — arguably the greatest poet of the colonial era.',
    slavery:'The Atlantic slave trade as the largest forced human migration in history — 12.5 million Africans transported, 10.7 million arriving; the plantation system as an industrial-scale slavery apparatus producing sugar, cotton, and tobacco for European markets; the racial ideology developed to justify it (African inferiority as natural fact) as the most consequential intellectual crime of the modern era.',
    collapse:'The collapse of Indigenous American civilisations under European contact — 90% population loss from smallpox, measles, and other Eurasian diseases to which Americas had no immunity; Tenochtitlan falling in 1521, Cusco in 1533 — the fastest civilisational collapse in history, primarily biological rather than military.',
    trade:'The creation of the first truly global economy — the Manila Galleon Trade connecting China, the Philippines, Mexico, and Spain in a single circuit; Potosí silver funding the global money supply; the triangular trade (European goods to Africa, enslaved people to the Americas, American goods to Europe) as the economic engine of early capitalism.',
    language:'Spanish and Portuguese becoming global languages through conquest — now spoken by 700 million people; English, French, and Dutch following through colonial expansion; the systematic suppression of Indigenous languages; yet creole languages (Haitian Creole, Papiamento, Tok Pisin) emerging as new linguistic creations from the colonial encounter.',
    technology:'The caravel and later the galleon as the technology enabling oceanic empire; the musket and cannon creating a military technology gap between Europe and the rest of the world; the printing press enabling the propaganda that justified conquest; the joint-stock company as an institutional technology mobilising capital for intercontinental commercial enterprise.',
    ecology:'The Columbian Exchange — the trans-Atlantic transfer of plants, animals, and diseases as the most ecologically consequential event since the extinction of the dinosaurs; potatoes and maize transforming European and African agriculture; European cattle and sheep transforming American landscapes; smallpox killing 90% of some Indigenous populations in a decade.',
    food:'The Columbian Exchange\'s food dimension: potatoes, tomatoes, chocolate, chili, maize, and vanilla from the Americas transforming world cuisine; sugar and coffee from tropical colonial plantations becoming global commodities; the plantation system\'s labour requirements driving the Atlantic slave trade; Italian pasta with tomato sauce, Swiss chocolate, and Indian curry all colonial-era food fusions.',
    philosophy:'Las Casas\'s defence of Indigenous humanity (1550) as the first systematic European argument against colonialism; Grotius\'s Law of the Sea as international law; Locke\'s labour theory of property (land belongs to whoever improves it) as the philosophical justification for Indigenous dispossession; the Enlightenment\'s universalism in permanent tension with its colonial practice.',
    inequality:'The caste systems (castas) of colonial Latin America producing perhaps the most elaborate racial hierarchy in history — with 16 categories distinguishing degrees of European, Indigenous, and African ancestry; the plantation system creating extreme wealth inequality between slave-owners and enslaved people; colonial extraction creating the North-South global wealth gap that structures the contemporary world.',
    diffusion:'The most consequential diffusion event in human history — the Columbian Exchange spreading plants, animals, diseases, and cultures across all previously separated human populations simultaneously; European languages, Christianity, and legal systems becoming the global baseline; the global food systems, languages, and inequalities of today all traceable to this 400-year period.',
    migration:'The colonial age was the greatest migration event in human history — forcibly and voluntarily moving populations between continents at scales never before seen. The Atlantic slave trade transported 12.5 million Africans to the Americas as the largest forced migration in history. European voluntary migration — Puritans, Spanish settlers, indentured servants, transported convicts — created new demographic realities in the Americas, Australia, and South Africa. The demographic collapse of Indigenous American populations (90% death from epidemic disease within a century of contact) created the empty ecological space that drew European and African migrants. The Indian Ocean indenture system (1834–1920) moved 2 million Indians as replacement labour to Fiji, Trinidad, Mauritius, South Africa, and Malaysia after slavery\'s abolition — creating the Indian diaspora communities that persist across five continents.',
   }},
  {id:'usa',fp:{mil:10,com:10,art:8,sci:10,reach:10,lon:3},music:{scale:'blues',root:57,tempo:92,timbre:'pluck',rhythm:[1,0,1,1,0,1,0,1],reverb:.2,artifact:'Delta Blues (Mississippi, 1890s) — Robert Johnson recordings 1936–37; New Orleans jazz synthesis of African polyrhythm and European harmony; Rock\'n\'Roll (1950s) as global civilisational export'},lon:-95,lat:38,nm:'United States',sb:'North America · 1776 CE – present',x:155,y:203,s:1776,e:2024,
   conns:['colonial','cahokia','medieval'],
   overview:'The United States was founded in 1776 as a philosophical experiment — the Enlightenment\'s claim that rights were self-evident and governments derived their legitimacy from the consent of the governed, written into a constitutional order that has now lasted 235 years. It became the world\'s largest economy by 1890, won two world wars, built the post-1945 international order (the dollar, the IMF, NATO, the UN), landed humans on the Moon, and invented the internet, GPS, and the smartphone. Its foundational contradiction — a republic of liberty built on slavery — was not resolved by the Civil War and remains the deepest fault line in its political life. The America of 2024 is simultaneously the world\'s indispensable power and a society under severe internal strain; whether its constitutional institutions can absorb the present polarisation is the most consequential open question in world politics.',
   d:{
    economy:'The world\'s largest economy since 1890; the dollar as global reserve currency since 1944; Silicon Valley as the 21st century\'s most consequential economic geography; a GDP of $27 trillion representing 25% of global output from 4% of global population.',
    political:'The Constitution (1787) as the world\'s oldest written national constitution still in force; federalism, separation of powers, and judicial review as constitutional innovations copied by over 100 subsequent constitutions; democracy promotion as an explicit civilizational export.',
    art:'Jazz, blues, rock and roll, hip-hop — a sequence of African-American musical innovations each becoming the dominant global popular music of its generation; Hollywood as the world\'s most powerful cultural projection machine; Abstract Expressionism; the skyscraper.',
    literature:'Walt Whitman, Mark Twain, Emily Dickinson, Toni Morrison, Ernest Hemingway — a literary tradition of democratic individualism and moral reckoning with race; the novel as mass entertainment; the screenplay as the 20th century\'s dominant narrative form.',
    military:'The world\'s only global military force with 800+ overseas bases; nuclear weapons used in war (1945) and defining all subsequent great-power conflict through deterrence; the internet as a military technology (ARPANET) that became civilisational infrastructure.',
    science:'The Manhattan Project; the Moon landing (1969); the Human Genome Project; CRISPR; the mRNA vaccine platform — a century of scientific achievement funded by the unprecedented combination of federal research spending and venture capital.',
    medicine:'The FDA regulatory model adopted globally; organ transplantation; the polio vaccine; antiretroviral HIV therapy; the mRNA COVID-19 vaccines developed in under a year — the most concentrated medical innovation infrastructure in history.',
    religion:'The First Amendment\'s separation of church and state as a constitutional model; evangelical Christianity as a global export; the prosperity gospel; religious pluralism absorbing Buddhism, Islam, and Hinduism into a competitive spiritual marketplace.',
    legacy:'The internet, the smartphone, the mRNA vaccine, GPS, and the modern university research model — the United States\' civilizational export is the infrastructure of the contemporary world, operating largely invisibly and almost universally.',
    gender:'The contradiction between the Declaration\'s "all men are created equal" and the systematic exclusion of women from political life until 1920; the feminist movements (1848 Seneca Falls to 1970s second wave to contemporary intersectional feminism) as the primary driver of expanding the definition of full humanity; American women\'s rights movements profoundly influencing global feminism.',
    slavery:'Slavery in the United States as the most politically and culturally consequential institution in American history — 4 million enslaved people at emancipation (1865); the Civil War as the bloodiest conflict in American history; the racial wealth gap created by 250 years of unpaid labour persisting into the present; the legacy shaping every dimension of American society.',
    collapse:'The United States has not collapsed but faces structural stress — declining institutional trust, political polarisation at levels not seen since the Civil War, fiscal sustainability questions, and the challenge of transitioning global hegemony; the historical pattern of democratic backsliding that has ended every previous democracy is the existential civilisational risk.',
    trade:'The creator of the post-1945 global trade architecture — the Bretton Woods system (IMF, World Bank), GATT (now WTO), and the dollar as global reserve currency; American consumer markets as the engine of global export-led growth; Silicon Valley as the centre of the digital economy reshaping all global commerce.',
    language:'English as the global lingua franca — spoken as a first or second language by 1.5 billion people — not primarily through American cultural export but through British colonial seeding, with American media (Hollywood, internet) accelerating the process; American English increasingly the global standard over British English.',
    technology:'The assembly line (Ford, 1913); the transistor (Bell Labs, 1947); the internet (ARPANET, 1969); GPS; the smartphone; CRISPR; mRNA vaccines — a century of technology creation at a scale and density of innovation unprecedented in human history, enabled by the combination of federal research investment, university research, and venture capital.',
    ecology:'The United States as both the world\'s largest historical carbon emitter and the nation that established the modern environmental movement (Sierra Club 1892, Clean Air Act 1970, Clean Water Act 1972, Endangered Species Act 1973); the contradiction between ecological destruction at scale and the creation of global environmental law.',
    food:'American industrial agriculture as the template for the global Green Revolution — high-yield grain varieties, synthetic fertilisers, pesticides — feeding an additional 2 billion people and creating environmental degradation at planetary scale simultaneously; McDonald\'s as the world\'s most visible cultural export; American processed food exports globalising obesity.',
    philosophy:'American pragmatism (Peirce, James, Dewey) as the only major philosophical tradition originating outside Europe; the Declaration\'s self-evident truths as a philosophical claim still reverberating globally; the tension between Jeffersonian liberty and Hamiltonian order as the permanent axis of American political thought.',
    inequality:'The United States as the most economically unequal developed nation — the top 1% holding 35% of wealth; the racial wealth gap between Black and white Americans as the direct legacy of slavery and redlining; yet simultaneously the world\'s primary source of the social movement rhetoric (civil rights, feminism, LGBTQ rights) that challenges inequality globally.',
    diffusion:'American cultural exports (Hollywood, rock music, fast food, blue jeans, the internet, English) as the most pervasive civilisational diffusion event since the Roman Empire; the American university model adopted globally; Silicon Valley\'s startup culture reshaping economies from London to Lagos; American constitutional design influencing 100+ constitutions.',
    migration:'The United States is the world\'s largest immigrant nation — founded by colonists, built by enslaved Africans, and continuously transformed by immigration waves that have successively reshaped its demographic character. The forced migration of 4 million enslaved people within the domestic slave trade (1790–1860) was as significant as transatlantic importation. The Great Migration (1910–1970) of 6 million African Americans from the South to northern cities created the demographic foundation for 20th-century Black political power and cultural production. Immigration waves — Irish (1840s), Chinese (1850s), Southern and Eastern European (1880–1920), Latin American and Asian (1965–present) — each arrived, were resisted, and eventually absorbed. America\'s immigration policy remains its most politically charged civilisational question: a nation of migrants arguing about migration.',
   }},
];



const DIPLOMATIC=[
  {from:'egypt',to:'hittites',year:-1259,title:'Treaty of Kadesh',desc:'The world\'s oldest surviving peace treaty, negotiated between Ramesses II and Hattusili III after the Battle of Kadesh. Both parties swore to mutual non-aggression and extradition of refugees. A copy is displayed at the United Nations headquarters.'},
  {from:'egypt',to:'mesopotamia',year:-1350,title:'Amarna Letters',desc:'382 clay tablets discovered at Amarna: diplomatic correspondence between Egypt and Babylonian, Assyrian, Hittite and Canaanite rulers. Written in Akkadian (the diplomatic lingua franca), they reveal a sophisticated international system of gift exchange and marriage alliance.'},
  {from:'india',to:'greece',year:-300,title:'Ashoka\'s Western Missions',desc:'Emperor Ashoka sent Buddhist missionaries to the courts of Antiochus II (Seleucid), Ptolemy II (Egypt), Antigonus (Macedonia), Magas (Cyrene) and Alexander (Epirus). The edicts name the recipients by name — the earliest documented Indian diplomatic outreach to the Mediterranean world.'},
  {from:'china',to:'rome',year:166,title:'First Roman Embassy to China',desc:'Han Annals record the arrival of envoys claiming to represent "Andun, King of Daqin (Rome)" — almost certainly a private merchant mission rather than official diplomacy. It marks the moment the two greatest empires of antiquity registered each other\'s existence in writing.'},
  {from:'islamicworld',to:'china',year:651,title:'Arab Embassy to Tang China',desc:'Caliph Uthman sent an embassy to Emperor Taizong in 651 CE — the first official diplomatic contact between the Islamic world and Tang China. The Arab ambassadors reportedly demonstrated Islam to the emperor. Regular Abbasid-Tang exchanges followed.'},
