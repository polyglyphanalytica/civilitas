    trade:'The largest maritime exchange network in the pre-Columbian world — Polynesian exchange systems circulating prestige objects (whale teeth, red feathers, fine mats) across 25 million km² of ocean; the Kula-like exchange systems binding islands in reciprocal obligation across thousands of kilometres.',
    language:'The Polynesian language family — Hawaiian, Maori, Samoan, Tongan, Tahitian — sharing 50–80% vocabulary, reflecting a common origin 3,000 years ago; the Easter Island rongorongo script as an undeciphered writing system possibly representing independent invention; Hawaiian language revival (from 2,000 to 24,000 speakers in 40 years) as the world\'s most successful language revitalisation.',
    technology:'The double-hulled voyaging canoe (waka hourua) as the greatest pre-modern maritime technology — stable enough to cross the Pacific, fast enough to average 150–200km/day, large enough to carry families, livestock, and plants for colonisation; the breadfruit preservation technique (mā) enabling multi-month ocean provisioning.',
    ecology:'The settlement of each Pacific island transforming its ecology — introducing rats, pigs, and dogs that drove bird extinctions; clearing forest for agriculture; yet simultaneously developing sophisticated agroforestry systems integrating food production with ecological management.',
    food:'Breadfruit (artocarpus altilis) as the Pacific\'s civilisational staple — starchy, calorie-dense, and preservable for years through fermentation (mā/poi); taro, yam, coconut, and fish completing a maritime diet enabling ocean colonisation; the imu (earth oven) as the primary cooking technology across Polynesia.',
    philosophy:'Mana as the most important concept in Polynesian philosophy — a sacred power or authority inherent in people, objects, and places, transferable through contact and action; the tapu/noa polarity structuring all social and ecological relations; whakapapa (genealogical recitation) as a complete epistemology connecting present persons to cosmic origins.',
    inequality:'The ali\'i/maka\'āinana (chief/commoner) distinction as an extreme social hierarchy — Hawaiian ali\'i of the highest rank so sacred that commoners prostrated themselves at their approach; yet the kapu system\'s elaborate rules also constrained chiefly behaviour, and commoners could achieve status through skill and service.',
    diffusion:'The peopling of the Pacific as humanity\'s final great migration, completing the settlement of every habitable landmass on Earth; the sweet potato\'s presence in Polynesia (a South American plant) as evidence of pre-Columbian Pacific-American contact; Polynesian navigation techniques now informing GPS-free navigation research.',
    migration:'Polynesian civilisation is the story of the greatest voluntary ocean migration in human history. From an Austronesian origin in Taiwan, successive migrations moved through the Philippines, Indonesia, and Melanesia over 2,000 years, developing the double-hulled voyaging canoe and the star-compass navigation system that would eventually allow intentional settlement of every habitable island in the Pacific. The settlement of Eastern Polynesia (Hawaii, New Zealand, Easter Island) between 700 and 1300 CE required voyages of 2,000–4,000km across open ocean with no landmarks — the most technically demanding migration events in human history before the modern era. Evidence of Polynesian contact with South America (sweet potato in the Cook Islands, Polynesian chicken bones in Chile) suggests trans-Pacific migration reaching the Americas centuries before Columbus.',
   }},
  {id:'melanesia',fp:{mil:4,com:5,art:6,sci:6,reach:4,lon:10},music:{scale:'pentatonic',root:43,tempo:84,timbre:'drum',rhythm:[1,1,0,1,0,1,1,0],reverb:.3,artifact:'Kundu (hour-glass drum) — New Guinea; garamut (slit drum) for long-distance inter-village communication; panpipes from Solomon Islands Kwaio tradition; bull-roarers in male initiation'},lon:147,lat:-6,nm:'Melanesian Cultures',sb:'New Guinea & Island Pacific · 40,000 BCE – present',x:872,y:310,s:-40000,e:2024,
   conns:['aboriginal','polynesia'],
   overview:'Melanesia — Papua New Guinea and the surrounding island arc — is home to the greatest linguistic diversity on Earth (840 languages in Papua New Guinea alone, 12% of all human languages), evidence of 40,000 years of cultural divergence in an island landscape that separated communities into intense local distinctiveness. The New Guinea Highlands saw one of humanity\'s three independent agricultural revolutions, beginning around 7,000 BCE with taro, yam, and banana cultivation. The Kula ring — a ceremonial exchange of shell valuables circulating in opposite directions around an island chain — is one of the most studied economic systems in anthropology, a model of how prestige and obligation can substitute for currency. Melanesia has rarely been unified politically, and its civilisational achievements are distributed and horizontal rather than monumental and vertical — a different kind of human achievement, no less sophisticated for its invisibility.',
   d:{
    economy:'The Kula ring — a ceremonial exchange system circulating shell armbands and necklaces across 18 Trobriand island communities, binding political alliances through reciprocal gift obligation; one of the most studied economic anthropological systems.',
    political:'The Big Man political system — authority earned through competitive feasting and gift redistribution rather than inherited; a model of achieved rather than ascribed leadership studied as a foundational type in political anthropology.',
    art:'Sepik River sculpture of extraordinary expressive power — ancestor figures, spirit boards, and ceremonial hooks encoding cosmological knowledge; body scarification; elaborate mask traditions used in initiation and mortuary rites.',
    literature:'The world\'s greatest linguistic diversity — Papua New Guinea alone contains over 840 languages (12% of all human languages) in a territory the size of California, representing 40,000 years of cultural divergence and oral tradition.',
    military:'Highland Papua New Guinea\'s long tradition of inter-tribal warfare as a social institution; sophisticated wooden shield and spear technology; warfare ritualised and bounded by ceremonial rules minimising total casualties.',
    science:'The Highlands of New Guinea saw one of humanity\'s independent inventions of agriculture (c. 7,000 BCE) — taro, yam, and banana cultivation predating most Old World farming; sophisticated irrigation and drainage systems in the Wahgi Valley.',
    medicine:'One of the world\'s richest ethnobotanical traditions; highland New Guinea plant medicines used for wound healing, fever reduction, and pain management increasingly documented by pharmaceutical researchers.',
    religion:'Animist traditions in which every landscape feature, plant, and animal is imbued with spiritual agency; cargo cult movements (20th century) representing a sophisticated indigenous critique of colonial economic inequality.',
    legacy:'Independent agricultural invention; the world\'s greatest linguistic diversity as a living archive of cognitive diversity; Kula ring exchange as a foundational model in economic anthropology; 40,000 years of unbroken habitation.',
    gender:'Melanesian gender relations among the most studied in anthropology — Margaret Mead\'s Coming of Age in Samoa (however controversial) opening the field; the extraordinary variation from the gender-reversed Tchambuli (where women are dominant) to strictly patriarchal Highland Papua New Guinea systems; women\'s gardens and men\'s hunting as parallel economic spheres of equal importance.',
    slavery:'No institutionalised chattel slavery — but significant exploitation of women and junior men through bride-price systems placing women as exchangeable property; the moka exchange system among the Melpa creating debt obligations resembling indentured service; colonial plantation labour recruitment (blackbirding) introducing industrial coercive labour in the 19th century.',
    collapse:'No single political collapse — the absence of centralised states means resilience through distributed organisation; the colonial period (1880s–1975) as the catastrophic rupture, introducing epidemic disease, missionary suppression of ceremony, and plantation labour extraction; yet cultural complexity survived largely intact in highland areas.',
    trade:'The Kula ring as the most intensively studied pre-modern exchange system — shell valuables circulating clockwise and counter-clockwise around an island ring, creating webs of obligation and alliance without market exchange; the obsidian trade from Manus Island and Lou Island reaching thousands of kilometres across the Pacific.',
    language:'The greatest linguistic density on Earth — Papua New Guinea\'s 840 languages (12% of all human languages) in a territory the size of California; Tok Pisin (Melanesian Pidgin) as one of the world\'s most successful creole languages, now a national language of Papua New Guinea; the linguistic diversity representing 40,000 years of human cognitive experiment.',
    technology:'Sophisticated outrigger and double-hull canoe construction; the bilum string bag (woven from plant fibre) as a multi-purpose technology of great engineering sophistication; taro and yam cultivation with elaborate drainage and mounding systems; the Chimbu agricultural terraces as landscape engineering rivalling any in the world.',
    ecology:'The independent invention of agriculture in the New Guinea Highlands (c. 7,000 BCE) — taro, yam, and banana cultivation among the world\'s earliest; the extraordinary biodiversity of the Coral Triangle (the world\'s richest marine ecosystem) managed through traditional taboo systems; forest gardens as agroforestry models of sustainable land use.',
    food:'Taro, yam, sago, and banana as the dietary foundations; the mumu earth oven as the primary feast cooking technology; pork as the supreme prestige food, central to all major exchange ceremonies; the extraordinary dietary diversity of the Papua New Guinea highlands, with 250+ cultivated food species.',
    philosophy:'The cargo cult phenomenon as one of the 20th century\'s most remarkable philosophical responses to radical inequality — indigenous communities observing that Europeans\' wealth arrived by ship and aircraft and constructing ritual systems to attract equivalent cargo; a sophisticated indigenous theory of colonial capitalism expressed in religious action.',
    inequality:'The Big Man system as achieved rather than ascribed inequality — status earned through competitive feasting and gift redistribution, potentially lost if generosity fails; bride-price as a mechanism creating debt inequality between lineages; colonial cash economy introducing permanent rather than transient inequality.',
    diffusion:'The Austronesian expansion from Taiwan through Melanesia and into Polynesia as one of the great population diffusions; the Lapita cultural complex (3500–1000 BCE) spreading pottery, pig domestication, and agricultural practices across the Pacific; New Guinea\'s independent agricultural revolution demonstrating that farming was a human universal given the right ecological conditions.',
    migration:'Melanesia\'s population history is the record of multiple overlapping migrations. The first Australoid migrants arrived 40,000 years ago, walking across the Sahul land bridge when sea levels were lower. The Austronesian migration wave (c. 3500–1000 BCE) — the Lapita cultural complex — brought pottery, pigs, and a new population layer from Southeast Asia, mixing with the earlier population to produce the Melanesian genetic mosaic. The Polynesian migration through Melanesia was one component of the wider Austronesian expansion. Within Melanesia, continuous inter-island migration created the Kula ring\'s circulation of people as well as objects. New Guinea\'s highland valleys were settled by agriculturalists who migrated up from the coast 9,000 years ago, creating the isolated communities whose 40,000 years of separation produced the world\'s greatest linguistic diversity.',
   }},
  {id:'norse',fp:{mil:8,com:7,art:6,sci:5,reach:8,lon:3},music:{scale:'aeolian',root:57,tempo:72,timbre:'brass',rhythm:[1,1,0,0,1,1,0,0],reverb:.3,artifact:'Lur (bronze horn) — paired examples from Brudevælte, Denmark (c.800 BCE) still playable; bone flute from Viking Age Hedeby; skaldic verse set to music'},lon:10,lat:59,nm:'Norse & Viking World',sb:'Scandinavia · 793–1100 CE',x:455,y:68,s:793,e:1100,
   conns:['byzantine','islamicworld','cahokia'],
   overview:'For roughly three centuries from 793 CE, Norse seafarers from Scandinavia terrorised, traded with, and settled virtually every coastline in the North Atlantic and down the river systems of Russia to the Black Sea and Caspian. The longship — shallow enough to beach on open coasts and narrow enough to navigate rivers — was the technology that made this possible; the thing-assembly political tradition and Valhalla\'s warrior cosmology supplied the cultural fuel. Norsemen settled Iceland, Greenland, and briefly North America five centuries before Columbus; Varangian traders established the Kievan Rus\' state that became Russia; Norman descendants conquered England in 1066. The Viking Age ended as Christianity replaced the warrior-death theology that motivated raiding, but its legal, linguistic, and genetic legacy persists across half the Northern Hemisphere.',
   d:{
    economy:'The most far-reaching mercantile network of the early medieval world — Varangian trade routes connecting Scandinavia to Constantinople and Baghdad via Russian rivers, exchanging furs, amber, and slaves for silver dirhams and Byzantine silk.',
    political:'A decentralised thing-assembly system of participatory governance where free men voted on law, arbitrated disputes, and elected leaders — one of the earliest documented forms of representative democracy, predating Magna Carta by four centuries.',
    art:'The Oseberg ship burial — a masterpiece of interlaced animal ornament; runestone carving across Scandinavia encoding memorial narratives; the Bayeux Tapestry\'s Norman-Viking fusion aesthetic; intricate gold and silver jewellery of the highest craftsmanship.',
    literature:'The Eddas (Poetic and Prose) preserving the Norse cosmological and mythological tradition; the Icelandic Sagas — prose narratives of psychological realism and historical memory unmatched in medieval European literature; runic inscriptions across three continents.',
    military:'The longship — shallow-drafted enough to beach on open coasts and navigate rivers, enabling simultaneous oceanic and continental reach; the berserker shock tactic; raids from Ireland to the Caspian Sea across a 300-year window.',
    science:'The first Europeans to reach North America (Leif Erikson at L\'Anse aux Meadows, c. 1000 CE) — 500 years before Columbus; open-ocean navigation by sun compass, landmark memory, and possibly solar crystals (Iceland spar).',
    medicine:'Practical battlefield medicine of notable effectiveness; the völva seeress tradition as healer-diviner; herbal treatments documented in Norse medical texts; evidence of surprisingly sophisticated cranial surgery in skeletal remains.',
    religion:'A cosmology of extraordinary richness — nine worlds on Yggdrasil the world-tree; Odin, Thor, Freya; Ragnarök as cyclical cosmic destruction and renewal; a warrior afterlife (Valhalla) and a moral universe without eternal punishment.',
    legacy:'English days of the week (Tuesday–Friday) named for Norse gods; the Icelandic Althing as the world\'s oldest surviving parliament (930 CE); Norse mythology foundational to Tolkien and the entire modern fantasy genre; first European contact with the Americas.',
    gender:'The Norse völva (seeress) as a revered figure wielding spiritual and political power; the Icelandic sagas depicting women initiating divorce, managing estates, and occasionally taking arms; the shieldmaiden tradition (whether historical or mythological) representing a culturally acknowledged female martial archetype unique in medieval Europe.',
    slavery:'The thrall (slave) as the Norse social system\'s foundation — raids specifically targeting captives for sale or domestic labour; Dublin as a major Viking slave market; enslaved Irish, English, and Scottish people trafficked to Scandinavia and Iceland; the sagas\' casual mention of thrall-killing as revealing of their legal non-personhood.',
    collapse:'The Viking Age\'s end (c. 1100 CE) driven by Christianisation removing the ideological basis for raiding (Valhalla requiring a warrior\'s death), the consolidation of European kingdoms making coastal raids more costly, and climate cooling making Greenland and Vinland marginal.',
    trade:'The Varangian Route — from Scandinavia down the Dnieper and Volga to Constantinople and Baghdad — as the medieval world\'s most surprising long-distance trade artery; Hedeby and Birka as proto-urban trading emporia; amber, furs, and slaves exchanged for silver dirhams flowing northward in quantities visible in Scandinavian coin hoards.',
    language:'Old Norse as the ancestor of all Scandinavian languages; runic inscriptions (the Elder Futhark) as a writing system adapted for wood and stone; over 600 words entering English from Old Norse — sky, window, egg, knife, husband, law, ugly, anger — reflecting deep Anglo-Norse cultural contact.',
    technology:'The longship — a clinker-built vessel of extraordinary hydrodynamic efficiency, drawing less than a metre of water, enabling both oceanic voyaging and river navigation; the Norse woodworking tradition (stave churches) representing the highest level of timber joinery in medieval Europe.',
    ecology:'The Norse colonisation of Iceland (874 CE) and Greenland (985 CE) as human adaptation to sub-Arctic environments; the rapid deforestation of Iceland by Norse settlers, transforming the island\'s ecology permanently within generations; the Medieval Warm Period enabling Greenland settlement, its end forcing abandonment.',
    food:'Preserved foods (dried cod, salted herring, skyr cheese) enabling long ocean voyages without refrigeration; the Norse longhouse as a communal food production and consumption space; mead and ale as the primary social lubricants; the feasting hall as the central institution of reciprocity and political obligation.',
    philosophy:'Norse fatalism — the certainty of Ragnarök, the twilight of the gods — as a philosophical acceptance of inevitable destruction producing a warrior ethics of defiant courage; the concept of wyrd (fate) as the fundamental condition of existence against which heroic action is defined.',
    inequality:'A three-tier society of jarls (nobility), karls (free farmers), and thralls (slaves) with significant social mobility through raiding success and commercial wealth; the thing assembly as a levelling institution where free men had equal legal standing regardless of wealth.',
    diffusion:'Norse genetic and cultural legacy visible across the British Isles, Normandy, Russia (the Varangian founding dynasty), and Iceland; the Icelandic democratic tradition (Althing) as an institutional model; Old Norse words embedded in English; the discovery of the Americas 500 years before Columbus.',
    migration:'The Viking Age was fundamentally a migration era — Norse people moving outward in every direction simultaneously. Norwegians settled Iceland (874 CE) and Greenland (985 CE), and briefly Vinland (c. 1000 CE); Danes settled eastern England (the Danelaw) and Normandy; Swedes (Varangians) migrated east down Russian rivers to found the Kievan Rus\' state and staff the Byzantine imperial guard. These were not merely raids but permanent demographic settlements: the Norse genetic signature is detectable today across Iceland, the British Isles, Normandy, and the Russian heartland. The Norman migration from Normandy to England (1066), southern Italy, and the Holy Land was a second-generation Norse migration that reshaped three civilisations.',
   }},
  {id:'sami',fp:{mil:3,com:5,art:6,sci:4,reach:3,lon:10},music:{scale:'pentatonic_minor',root:57,tempo:48,timbre:'drone',rhythm:[1,0,0,0,0,1,0,0],reverb:.7,artifact:'Joik (personal-song tradition) documented by Lappish missionaries from 17th century; gievrie (shaman drum) as primary ceremonial instrument; yoiking noted by Olaus Magnus (1555)'},lon:25,lat:68,nm:'Sámi Civilization',sb:'Arctic Fennoscandia · 8000 BCE – present',x:472,y:45,s:-8000,e:2024,
   conns:['norse'],
   overview:'The Sámi have inhabited the Arctic and subarctic regions of Fennoscandia for at least 10,000 years — making them one of Europe\'s oldest continuous populations — sustaining a sophisticated civilisation of reindeer herding, seasonal migration, and profound ecological knowledge across one of the planet\'s most demanding environments. The joik oral tradition, the noaidi shamanic practice, and the siida cooperative governance system provided cultural continuity through centuries of pressure from Scandinavian, Russian, and Finnish state expansion that progressively reduced Sámi territories and suppressed their language. The 20th-century boarding school systems inflicted severe cultural trauma. But the Sámi Parliament established in Norway in 1989, and equivalent bodies in Sweden and Finland, represent a genuine political recovery — and Sámi ecological knowledge is now recognised as irreplaceable in managing the Arctic landscapes that climate change is rapidly transforming.',
   d:{
    economy:'A sophisticated mixed economy of reindeer herding, fishing, hunting, and trade — the only culture to domesticate the reindeer, developing a mobile pastoral system of extraordinary ecological precision adapted to Arctic conditions.',
    political:'The siida — a cooperative kin group of 5–15 families jointly managing a seasonal territory, making collective decisions on migration routes, resource allocation, and conflict resolution without hierarchical authority.',
    art:'Duodji — the Sámi tradition of functional objects made beautiful: decorated knife sheaths, reindeer-hide clothing with geometric embroidery, woven belts, and silver jewellery encoding cultural identity and social status in every stitch.',
    literature:'The joik — a personal song assigned to each individual, place, or animal at birth, functioning simultaneously as personal identity, meditation, and prayer; an oral tradition of 10,000 years encoding ecological and cosmological knowledge.',
    military:'Persistent and largely successful resistance to Scandinavian, Russian, and Finnish state expansion through mobility, ecological knowledge, and diplomatic flexibility; the noaidi (shaman) as political as well as spiritual leader.',
    science:'The world\'s most sophisticated reindeer ecology — tracking herd health, predicting migration routes, and managing population dynamics across 400,000km² of tundra and taiga with no instruments beyond accumulated generational knowledge.',
    medicine:'The noaidi shaman as primary healer; extensive Arctic pharmacopoeia including lichen, willow bark, and reindeer organ components; drumming and trance as therapeutic practice; cold-water and sauna therapy as physiological medicine.',
    religion:'Animist cosmology in which every significant landscape feature — mountain, lake, and stone — is a seita (sacred site) housing a spirit whose relationship must be maintained; the drum (goavddis) as cosmological map and ritual instrument.',
    legacy:'The world\'s most enduring Arctic survival culture; reindeer herding techniques now informing climate-adaptive pastoralism; joik music influencing contemporary Scandinavian artists; land rights battles shaping indigenous sovereignty law across the Arctic.',
    gender:'The noaidi shaman tradition accessible to both men and women in many Sámi groups — female noaidi wielding equivalent spiritual and political authority to male counterparts; the hearth goddess Máttaráhkká and her daughters as the primary female sacred figures overseeing human birth and life transitions; reindeer herding as a gender-mixed economy with women managing camp logistics and men the long-distance migrations.',
    slavery:'No institutionalised slavery within Sámi society; the fikte (trade fair) system creating mutual commercial dependency with Norse and later Scandinavian states without political submission; Norwegian, Swedish, and Russian crown taxation from the 16th century as a form of tributary extraction; the forced assimilation policies (Norwegianisation, c. 1850–1980) as cultural enslavement.',
    collapse:'The Sámi face ongoing civilisational pressure rather than historical collapse — Norwegian, Swedish, Finnish, and Russian state absorption reducing traditional lands by 90%; forced Christian conversion from the 17th century; the boarding school system suppressing the Sámi language; yet the Sámi Parliament (Sámediggi, established Norway 1989) representing a political recovery.',
    trade:'The Sámi as essential commercial intermediaries between the Norse/Scandinavian agricultural economy and the Arctic tundra — furs (beaver, marten, fox), dried fish, reindeer products, and down exchanged for grain, iron tools, and silver; the vintermarked (winter markets) at Jokkmokk (established 1605) still the world\'s largest traditional Sámi trade fair.',
    language:'The Sámi language family — 10 distinct languages from South Sámi to Kildin Sámi — as the northernmost surviving language group in Europe; critically endangered (fewer than 20,000 speakers across all varieties); the joik as a living oral performance tradition maintaining cultural continuity; the Sámi Parliament\'s official language status in Norway as a language rights milestone.',
    technology:'The ahkio (sledge pulled by reindeer) as the primary Arctic transport technology; the lavvu (conical tent, structurally superior to the tipi for Arctic wind resistance); the komager (traditional shoe) using reindeer sinew and skin in a construction technique providing insulation at -40°C; the gievrie (drum) as a cognitive technology mapping the cosmos.',
    ecology:'The Sámi as the world\'s most sophisticated reindeer ecologists — managing 400,000km² of tundra and taiga through seasonal migration, predator management, and herd selection for 10,000 years without measurably degrading the landscape; their ecological knowledge now formally integrated into Norwegian and Swedish national park management.',
    food:'Reindeer as the complete food source — meat, fat, marrow, blood (mixed with reindeer fat as blood pudding), milk, and internal organs; dried reindeer meat (juoigan) as a storable protein source; cloudberries, lingonberries, and fish as supplements; the sámi knife (leuku) as the multi-purpose food preparation and butchery tool.',
    philosophy:'The Sámi concept of siida (cooperative community) as the fundamental unit of social and philosophical organisation — not the individual or the state but the small cooperative group managing a territory in perpetual dialogue with its landscape; the seita as a sacred place demanding reciprocal relationship rather than exploitation.',
    inequality:'Relatively egalitarian within the siida, with status based on reindeer herding skill and shamanic knowledge rather than birth; the noaidi as the highest-status individual; yet significant wealth differences between large reindeer owners and herders without animals visible in historical and contemporary Sámi communities.',
    diffusion:'Sámi reindeer herding techniques influencing Norwegian and Finnish agricultural policy; the joik tradition influencing contemporary Scandinavian music (Mari Boine, Sofia Jannok); land rights battles establishing Indigenous territorial rights precedents across the Arctic; Sámi traditional ecological knowledge being formally incorporated into climate change research.',
    migration:'The Sámi are among Europe\'s oldest resident populations — genetic evidence suggesting their ancestors arrived in Fennoscandia after the last ice age retreated (c. 10,000 BCE), migrating north as the tundra opened. Their traditional seasonal migration between winter forest camps and summer coastal or mountain pastures was not nomadism but a precise ecological circuit encoded in songlines and oral law. Reindeer herding (c. 1000 CE) intensified and extended these migration routes, with herds moving up to 500km seasonally. State pressures progressively confined Sámi migration: national borders drawn in 1826 cut traditional herding routes, and 20th-century forced sedentarisation policies attempted to end the migratory lifestyle entirely. Sámi herders still negotiate trans-border migration rights with Norway, Sweden, Finland, and Russia.',
   }},
  {id:'inuit',fp:{mil:3,com:4,art:6,sci:5,reach:4,lon:9},music:{scale:'pentatonic',root:55,tempo:80,timbre:'drum',rhythm:[1,1,0,1,1,0,1,1],reverb:.2,artifact:'Qilaut (frame drum) — Dorset Culture examples c.1000 CE; katajjaq (throat singing) documented across Inuit Arctic; drum dance as primary social and spiritual ceremony'},lon:-68,lat:63,nm:'Inuit & Arctic Cultures',sb:'Arctic Circle · 2500 BCE – present',x:175,y:55,s:-2500,e:2024,
   conns:['cahokia','norse'],
   overview:'The Inuit represent humanity\'s most extreme adaptive achievement — a civilisation that has sustained itself for 4,000 years in the Arctic, the most physiologically hostile environment humans continuously inhabit, through technology, social philosophy, and ecological knowledge of unmatched sophistication. The kayak, igloo, umiaq, and qulliq lamp are each engineering solutions of elegant precision; the obligation to share all food eliminates starvation risk through collective insurance; the 52 Inuktitut categories of sea ice encode navigational safety data no satellite imagery can replicate. European contact brought epidemic disease, colonial dispossession, and residential schools designed to destroy cultural transmission. The Nunavut territory established in 1999 represents genuine political recovery; and Inuit traditional knowledge is now formally integrated into Arctic climate science, because nobody understands the changing ice better than the people who have lived on it for four millennia.',
   d:{
    economy:'A gift economy of total resource sharing within the camp group — no individual ownership of food, eliminating starvation risk through collective obligation; long-distance trade in soapstone, copper, and walrus ivory connecting Arctic communities across 8,000km.',
    political:'Egalitarian band organisation with authority vested in the most skilled hunter or elder; angakkuit (shamans) as the primary political and spiritual arbiters; consensus decision-making as the only legitimate governance form.',
    art:'Ivory and bone carving of extraordinary miniaturist skill — polar bear, seal, and human figures with anatomical precision; throat singing (katajjaq) as competitive musical dialogue; the amauti parka engineered for carrying infants in Arctic conditions.',
    literature:'An oral tradition encoding 4,000 years of Arctic ecological knowledge — sea ice behaviour, animal migration, weather prediction, and navigational landmarks — transmitted through storytelling (unipkaaqtuat) across winter camp gatherings.',
    military:'Conflict resolution through drum dance competitions (the drummer-duel) rather than physical violence — a cultural technology for de-escalating disputes that scholars regard as among the most elegant conflict resolution systems ever devised.',
    science:'The igloo — a hemispherical snow structure maintaining interior temperatures of 16°C when outside temperatures reach -45°C, built in under an hour using only a snow knife; sea ice classification with over 50 distinct terms encoding navigational safety data.',
    medicine:'Cold-climate pharmacopoeia; the qulliq (oil lamp) managing thermal environment for medical as well as practical purposes; recognition and treatment of Arctic-specific conditions including snow blindness, frostbite, and vitamin D deficiency.',
    religion:'Animist cosmology in which every animal killed must be treated with ritual respect or its soul will refuse to return in another body — an ecological ethic enforced by spiritual sanction; the angakkuq shaman mediating between human and animal worlds.',
    legacy:'Inuktitut syllabics as one of the most successful indigenous writing systems created in the modern era; igloo engineering principles influencing emergency shelter design; Arctic indigenous land rights setting global legal precedents for traditional territory claims.',
    gender:'The complementary gender division as the Inuit survival system — men hunting large marine mammals, women processing food, making clothing, and managing the igloo\'s thermal environment; the amauti (parka with infant pouch) as a specifically female technology enabling infant survival in Arctic conditions; the angakkuq (shaman) accessible to both genders, though most commonly male.',
    slavery:'No institutionalised slavery; the camp sharing ethic preventing resource accumulation by individuals; captive women sometimes incorporated into camps after raids — a practice documented but culturally regulated; the Inuit\'s relative geographic isolation from slave-trading networks as a major factor in the absence of slave economy.',
    collapse:'The Dorset Culture\'s sudden replacement by the Thule Inuit (c. 1000 CE) — a rapid population replacement across the entire Arctic that archaeologists are still explaining; European contact bringing epidemic disease (measles, smallpox) killing 50–90% of some Inuit groups; the residential school system (Canada 1883–1996) as deliberate cultural destruction; yet Inuit cultural identity surviving.',
    trade:'The Pre-Dorset and Thule exchange networks moving soapstone, iron meteorites from Greenland, and copper from the Coppermine River across 8,000km of Arctic coastline; walrus ivory as the primary long-distance trade commodity reaching Norse Greenland and eventually Europe; the qamutiik (dog sled) as the Arctic trade vehicle.',
    language:'The Inuit-Yupik language family as a dialect continuum from Siberia to Greenland — arguably the world\'s most geographically extensive linguistic continuum; the Inuktitut syllabic writing system (created by missionary James Evans, 1840, based on Indigenous phonetic structure) as one of the most successful modern script creations; 40,000 Inuktitut speakers today.',
    technology:'The kayak as the world\'s most hydrodynamically efficient small watercraft — the basis of modern kayaking; the umiaq (large open skin boat) enabling family group Arctic migration; the ice-testing qimugjuk (walking stick) for sea ice navigation; the seal-breathing-hole hunting technique as a supreme example of observational ecology applied as technology.',
    ecology:'The Inuit as the world\'s most sophisticated sea ice ecologists — 52 distinct sea ice categories in Inuktitut encoding navigational safety data that no satellite imagery can fully replicate; the knowledge that bowhead whales use specific Arctic leads encoded in oral tradition; the Inuit Circumpolar Council\'s contributions to Arctic climate monitoring now internationally recognised.',
    food:'The muktuk (raw frozen beluga or narwhal skin and blubber) as the supreme Arctic food — providing Vitamin C in an environment with no plant foods for eight months; the igunaq (fermented walrus meat, aged under stones for months) as a fermentation technology in a sub-zero environment; the technological elegance of extracting nutrition from an environment that would kill most humans.',
    philosophy:'Isuma (thought, reason, consciousness) as the Inuit\'s supreme philosophical value — the ability to think clearly, exercise patience, and maintain emotional equilibrium in conditions of extreme stress as the defining human virtue; the drum dance not merely entertainment but a philosophical technology for maintaining psychological balance and community harmony.',
    inequality:'The most egalitarian complex society in this dataset — the taboo against food accumulation, the obligation to share all large kills, and the absence of heritable wealth creating genuine material equality; the angakkuq\'s spiritual authority as the only significant hierarchical distinction; colonial contact introducing cash economy and inequality simultaneously.',
    diffusion:'The kayak as the basis of modern recreational kayaking, military special forces watercraft, and sea kayaking tourism; the igloo\'s engineering principles informing emergency survival shelter design; Inuit traditional ecological knowledge integrated into Arctic climate research; Inuktitut syllabics as a model for Indigenous script creation globally.',
    migration:'Inuit civilisation is defined by migration — the Thule expansion from Alaska across the entire Arctic in approximately 200 years (c. 1000–1200 CE) is one of history\'s most remarkable population movements, covering 8,000km of the world\'s most hostile terrain and displacing the Dorset culture as it went. This migration was technology-enabled: the dog sled, the umiaq, and the kayak allowed movement at speeds impossible on foot. Seasonal migration between winter sea-ice camps and summer inland hunting grounds was the fundamental rhythm of Inuit life — not wandering but a precise annual circuit as legible as a calendar. The Inuit Circumpolar Council now tracks how climate change is altering these ancestral migration routes as the sea ice that structured them becomes unpredictable.',
   }},
  {id:'nubia',fp:{mil:7,com:6,art:7,sci:5,reach:5,lon:9},music:{scale:'pentatonic',root:53,tempo:66,timbre:'pluck',rhythm:[1,0,1,0,1,0,0,1],reverb:.4,artifact:'Arched harp depicted in Meroitic tomb reliefs (c.300 BCE); sistrum rattles from Kushite Amun temples; Nubian lyre evidence from Ballana culture (c.400 CE)'},lon:33,lat:19,nm:'Nubia & Kush',sb:'Upper Nile · 3500 BCE – 350 CE',x:534,y:263,s:-3500,e:350,
   conns:['egypt','aksum'],
   overview:'The Nubian corridor along the upper Nile — south of Egypt\'s first cataract — produced civilisations of extraordinary sophistication for 5,000 years, yet remains the most systematically overlooked in this entire dataset. Nubian archers were the most feared in the ancient world; the Kushite 25th Dynasty ruled all of Egypt for nearly a century; Meroë\'s iron industry exported weapons and tools across northeast Africa; and the Meroitic script was the first writing system indigenous to sub-Saharan Africa. Colonial-era Egyptology treated Nubia as Egypt\'s dependent periphery rather than its equal and sometimes superior; more recent scholarship has begun the correction, but the Meroitic script\'s partial undecipherability still locks an entire civilisational voice from modern hearing. The Nubian communities displaced by the Aswan Dam\'s construction carry this heritage into the present.',
   d:{
    economy:'Control of the gold-rich corridor between sub-Saharan Africa and the Mediterranean made Kush one of the ancient world\'s wealthiest states; Meroë\'s iron smelting industry exported tools and weapons across northeast Africa.',
    political:'Kush conquered and ruled all of Egypt as the 25th Dynasty (747–656 BCE) — often erased from mainstream history — governing an empire stretching from the Mediterranean to the confluence of the Niles.',
    art:'Nubian pyramids at Meroë and Nuri — steeper and more numerous than Egypt\'s — with distinctive burial chapels; polychrome pottery of great delicacy; gold jewellery synthesising Egyptian and sub-Saharan aesthetic traditions.',
    literature:'The Meroitic script (300 BCE), the first writing system indigenous to sub-Saharan Africa, remains only partially deciphered — an entire literary tradition whose full content is still locked from modern scholarship.',
    military:'Nubian archers were the most feared in the ancient world — Egypt hired them as elite troops for millennia; Kushite armies conquered Egypt twice; iron weapons from Meroë supplied military networks across northeast Africa.',
    science:'Advanced iron smelting at Meroë predating most sub-Saharan metallurgy; sophisticated water harvesting in semi-arid environments; astronomical knowledge inherited from and contributing to Egyptian traditions.',
    medicine:'Shamanistic and herbal healing traditions documented in archaeological contexts; evidence of trepanation surgery; significant pharmacological knowledge of Nile Valley plant species.',
    religion:'Nubian religion synthesised Egyptian theology with indigenous traditions — worshipping Amon, Isis, and indigenous lion-god Apedemak simultaneously; pyramid burials with Egyptian mortuary ritual adapted to Nubian royal custom.',
    legacy:'The 25th Dynasty\'s patronage revived and preserved Egyptian temple-building traditions that had declined; Meroitic script as Africa\'s first indigenous writing system; Nubian Christian kingdoms surviving until the 14th century CE.',
    gender:'Nubian queens (kandakes) wielding real political power — Amanirenas leading military resistance to Rome (c. 24 BCE), forcing Augustus to negotiate rather than conquer; the Meroitic queen mother as a constitutional office of genuine authority; matrilineal succession in many Nubian dynasties making female ancestry the legitimating bloodline.',
    slavery:'Nubia and Kush as both a slave-trading culture and a slave-supplying region — enslaved Nubians serving in Egyptian military units from the Old Kingdom; Meroitic trade in enslaved people northward to Egypt and eastward to Arabia; the irony of a sophisticated civilisation whose people were simultaneously prized as soldiers and enslaved as goods.',
    collapse:'The Aksumite destruction of Meroë (c. 350 CE) ending the Kushite state; yet Nubian Christian kingdoms (Nobatia, Makuria, Alodia) surviving until the 14th century CE; the persistence of Nubian cultural identity across 5,000 years despite repeated conquest — one of history\'s most durable civilisational identities.',
    trade:'The gold road — Nubia as the conduit for sub-Saharan gold, ivory, ebony, and enslaved people flowing northward to Egypt and the Mediterranean; Meroë\'s iron exports flowing southward into sub-Saharan Africa; Nubia as the commercial hinge between the Mediterranean world and sub-Saharan Africa for 3,000 years.',
    language:'Meroitic script (300 BCE) as the first writing system indigenous to sub-Saharan Africa — consonantal like Egyptian hieroglyphs but phonetically distinct, still only partially deciphered; Old Nubian as the oldest written sub-Saharan African language, documented from the 8th century CE in Christian liturgical texts.',
    technology:'The Nubian pyramid\'s distinctive steep-sided form as an architectural innovation; iron smelting at Meroë as one of the world\'s major early metallurgical centres, supplying tools and weapons across northeast Africa; water lifting technology enabling agriculture in the semi-arid Nile corridor.',
    ecology:'The Nubian Nile corridor as a linear oasis in the Sahara — narrow strips of agricultural land between desert cliffs; the Nile\'s annual flood as the ecological foundation of all Nubian civilisation; the gradual southward shift of the Sahara affecting agricultural viability across Nubian history.',
    food:'Sorghum as the primary Nubian grain (more drought-resistant than Egyptian wheat or barley); dates, fish, and cattle as dietary supplements; the Nubian brewing tradition (merissa sorghum beer) as both nutritional and social staple; the introduction of the donkey to Egypt possibly mediated through Nubian intermediaries.',
    philosophy:'The Nubian philosophical tradition is largely inaccessible due to the undeciphered Meroitic script; what survives through Egyptian and Greek sources suggests a synthesis of Egyptian Ma\'at ethics with indigenous Nubian values; the Christian Nubian period producing theological literature in Old Nubian that awaits full translation.',
    inequality:'A sharply stratified society with a small royal and priestly elite commanding enormous tributary wealth; the pyramid burial tradition itself encoding extreme inequality — monumental tombs for royalty, simple graves for commoners; yet Nubian society appears from archaeological evidence to have been somewhat less unequal than contemporary Egypt.',
    diffusion:'The 25th Dynasty\'s pharaonic rule preserving and reviving Egyptian temple traditions; the Christian Nubian kingdoms transmitting Orthodox Christianity into sub-Saharan Africa; Nubian mercenary soldiers serving in armies from Egypt to Rome; the undeciphered Meroitic script as a historical black box whose decipherment would open an entire civilisational tradition.',
    migration:'Nubia\'s position as the Nile\'s corridor between Africa and the Mediterranean made it a perpetual migration zone. The C-Group and Kerma cultures represent successive waves of sub-Saharan African populations moving northward along the river. Nubian mercenaries migrated into Egypt from the Old Kingdom onward — entire communities of Nubian archers settling in Egypt, their descendants documented in Middle Kingdom papyri as a distinct ethnic military community. The Meroitic state\'s collapse (c. 350 CE) triggered a southward migration of the population that became the medieval Nubian Christian kingdoms. The construction of the Aswan High Dam (1960–1970) forcibly displaced 90,000 Nubian people from their ancestral villages — the most recent and traumatic migration in this civilisation\'s 5,000-year story.',
   }},
  {id:'aksum',fp:{mil:6,com:8,art:6,sci:5,reach:6,lon:6},music:{scale:'ethiopian',root:57,tempo:62,timbre:'flute',rhythm:[1,0,0,1,0,1,0,0],reverb:.45,artifact:'Begena (10-string lyre) — Aksumite tradition still practiced today; krar (bowl lyre) depicted in Lalibela church manuscripts; liturgical chant system (zema) documented from 6th century CE'},lon:38,lat:14,nm:'Aksumite Empire',sb:'Horn of Africa · 100–940 CE',x:560,y:292,s:100,e:940,
   conns:['nubia','islamicworld','india'],
   overview:'The Aksumite Empire of the Ethiopian highlands became, in 330 CE, the first state in history to officially adopt Christianity — three years before Rome, and with a theological independence that has characterised the Ethiopian Orthodox Church ever since. At its commercial peak (1st–6th centuries CE), Aksum controlled the Red Sea trade route between Rome, Arabia, and India, issuing gold coinage that circulated across three continents and building obelisks taller than any monument since the Egyptian pyramids. The Arab commercial expansion of the 7th century rerouted Red Sea trade, gradually marginalising Aksum, but the Ethiopian highland state survived as a Christian kingdom through the medieval period and was never colonised — the only African nation to defeat a European power in open battle (Adwa, 1896). Ethiopia is today the world\'s second-oldest Christian nation.',
   d:{
    economy:'Control of the Red Sea trade corridor between Rome, Arabia, and India made Aksum one of the four great powers of late antiquity alongside Rome, Persia, and China — issuing gold, silver, and bronze coinage across this network.',
    political:'Emperor Ezana\'s conversion to Christianity in 330 CE made Aksum the world\'s first officially Christian state — predating Rome by three years — shaping Ethiopian political identity for 1,700 years to the present.',
    art:'The Aksumite stelae — monolithic carved obelisks up to 33 metres tall, the largest monoliths ever erected — representing a unique architectural tradition of unmatched ambition in sub-Saharan Africa.',
    literature:'Ge\'ez script (the ancestor of Amharic and Tigrinya) as one of the few original African writing systems; the Kebra Nagast epic legitimating Solomonic dynasty through the story of the Queen of Sheba; early Christian biblical translation.',
    military:'Campaigns extending into Arabia, Sudan, and Egypt; the destruction of the Himyarite Kingdom of Yemen (525 CE); a navy operating across the Red Sea; control of strategic straits enabling both commerce and military projection.',
    science:'Advanced stone construction without mortar; sophisticated agricultural terracing; astronomical traditions inherited from earlier Horn of Africa cultures and enriched through contact with Hellenistic Alexandria.',
    medicine:'Inherited Egyptian and Indian medical traditions through trade; indigenous Ethiopian herbal medicine of great sophistication; teff cultivation providing nutritional density enabling population density in the Ethiopian highlands.',
    religion:'Ethiopian Orthodox Christianity — one of the oldest Christian traditions — preserving Aramaic liturgical elements, the Ark of the Covenant tradition, and theological positions predating the Council of Nicaea.',
    legacy:'Ethiopia as the world\'s second-oldest continuously Christian nation; the Ethiopian Orthodox Church with 50 million adherents; Ge\'ez script still in liturgical use; the only African nation never colonised, in part due to Aksumite institutional legacy.',
    gender:'The Aksumite Kebra Nagast epic encoding the Queen of Sheba (Makeda) as a ruler of extraordinary wisdom and agency — a foundational narrative of female royal authority; the empress in the Aksumite court wielding ceremonial power; the Ethiopian Orthodox Church\'s female diaconate as a persistent tradition of women\'s religious authority.',
    slavery:'Aksum as a major participant in the Red Sea and Indian Ocean slave trade — enslaved Africans, Arabians, and Indians transiting through Aksumite ports; yet the adoption of Christianity (330 CE) introducing some theological pressure against enslaving fellow Christians, creating distinctions within the practice.',
    collapse:'The decline of Aksum (c. 700–940 CE) from multiple pressures — Arab commercial competition rerouting Red Sea trade, Islamic expansion cutting Aksumite connections to the Mediterranean, and possible environmental degradation from agricultural overextension; the capital shifting southward to the Ethiopian highlands where Aksumite institutional traditions survived.',
    trade:'The Red Sea as Aksum\'s commercial highway — ivory, gold, obsidian, and enslaved people exported; textiles, wine, olive oil, and metalwork imported; Aksumite gold coinage circulating across the Indian Ocean trade network; the port of Adulis as one of late antiquity\'s most important commercial entrepôts.',
    language:'Ge\'ez as one of the few Semitic languages to develop its own indigenous script rather than borrowing; the Ge\'ez Bible as the oldest complete Christian Bible; Amharic (descended from Ge\'ez) as Africa\'s second most widely spoken language (57 million native speakers); the Ethiopian calendar and numerical system as living Ge\'ez inheritance.',
    technology:'The obelisk (stele) construction achieving heights of 33 metres in monolithic form; sophisticated coinage with multiple metals (gold, silver, bronze) and multiple scripts; agricultural terracing enabling cultivation in the steep Ethiopian highlands.',
    ecology:'The Ethiopian highlands as a biodiversity hotspot — the origin of coffee (Coffea arabica, from Kaffa province), teff, enset, and dozens of other crops now globally important; the Ethiopian church forest tradition (trees around every Orthodox church) preserving remnant highland forest in an otherwise deforested landscape.',
    food:'Coffee as Aksum\'s greatest culinary export — the coffee ceremony (jebena buna) as the central social ritual of Ethiopian culture; injera (fermented teff flatbread) as the foundation of East African cuisine; the Ethiopian cuisine\'s extraordinary spice complexity reflecting the highlands\' biodiversity.',
    philosophy:'The Kebra Nagast as a philosophical statement of Ethiopian national-religious identity — claiming the Ark of the Covenant and Solomonic lineage as Ethiopia\'s special covenant with God; Ethiopian Orthodox theology preserving theological positions (including the Book of Enoch, excluded from other canons) offering unique insights into early Christian thought.',
    inequality:'A society stratified by ethnicity, religion, and occupation; the Beta Israel (Ethiopian Jews) as a marginalised community despite their antiquity; artisan castes (smiths, weavers, potters) considered ritually impure across Aksumite and subsequent Ethiopian cultures; the Orthodox Church as both a levelling institution (all souls equal before God) and a hierarchy-maintaining one.',
    diffusion:'Christianity transmitted through Aksum to Nubia and the Horn of Africa; the Arabic word for king (negus) borrowed from Ge\'ez; coffee transmitted from Ethiopia to Arabia and then globally; the Ethiopian Orthodox theological tradition preserving texts (Enoch, Jubilees) that have shaped contemporary Biblical scholarship.',
    migration:'Aksum\'s origin is itself a migration story: South Arabian (Sabaean) migrants crossing the Red Sea mixed with indigenous Cushitic populations to produce the Aksumite ethnic blend. The empire\'s Red Sea position made it a permanent migration crossroads — Jewish refugees possibly arriving after the Temple\'s destruction (70 CE), early Christian missionaries reaching the court by the 4th century, Indian merchants maintaining resident communities in Aksumite ports. Aksumite military migration into Arabia (525 CE, the Himyarite campaign) briefly made the Horn of Africa power a trans-continental empire. After Aksum\'s decline, population movement southward into the Ethiopian highlands created the demographic and cultural foundations of the medieval Solomonic kingdom.',
   }},
  {id:'swahili',fp:{mil:4,com:9,art:7,sci:4,reach:6,lon:5},music:{scale:'arabic',root:60,tempo:76,timbre:'oud',rhythm:[1,0,1,0,0,1,0,1],reverb:.35,artifact:'Taarab ensemble documented from Zanzibar sultans\' court (19th century); oud introduced via Arab traders (9th century CE); msondo ceremonial drums from coastal ritual practice'},lon:40,lat:-5,nm:'Swahili Coast',sb:'East African Coast · 800–1500 CE',x:550,y:355,s:800,e:1500,
   conns:['aksum','islamicworld','india'],
   overview:'The Swahili city-states of the East African coast — Kilwa, Mombasa, Zanzibar, Sofala — were among the Indian Ocean world\'s most sophisticated commercial societies from roughly 800 CE, built on the gold and ivory of the African interior and the textile and ceramic imports of India and China. They were not an empire but a coastal culture: Islamic, literate, mercantile, and architecturally refined, building in coral stone with carved doorways and vaulted ceilings unlike anything else in Africa. The Portuguese burning of Kilwa in 1505 was an act of commercial conquest — destroying a competitor rather than a military threat — that decapitated the Swahili commercial system. Swahili culture survived, and its language (Kiswahili) became the most widely spoken African tongue, now the official language of the African Union. The ruins of Kilwa, a UNESCO World Heritage site, remain one of the medieval world\'s most eloquent monuments to a civilisation history forgot.',
   d:{
    economy:'The Indian Ocean\'s western anchor — city-states at Kilwa, Mombasa, Zanzibar, and Sofala trading gold, ivory, iron, and enslaved people for Persian ceramics, Indian textiles, and Chinese porcelain, generating extraordinary mercantile wealth.',
    political:'A confederation of independent merchant city-states governed by sultans whose authority rested on commercial networks and Islamic legal frameworks rather than military conquest of hinterlands.',
    art:'Swahili coral-stone architecture — intricately carved doorways, vaulted ceilings, and courtyard houses of a distinctive aesthetic synthesising Arabic, Indian, and African design traditions found nowhere else on Earth.',
    literature:'Swahili language — a Bantu base with Arabic, Persian, and Indian loan vocabulary — as the commercial lingua franca of the entire East African coast; oral epic poetry (utenzi) of great formal sophistication.',
    military:'Naval power enabling inter-city competition and protection of maritime trade routes; fortified stone cities; diplomatic rather than military expansion as the primary mode of influence.',
    science:'Navigation of the Indian Ocean using monsoon winds with precision equal to Arab and Indian mariners; astronomical knowledge enabling accurate oceanic timing; architectural engineering in coral stone of remarkable structural sophistication.',
    medicine:'Access to Indian and Arabic medical traditions through trade; indigenous coastal pharmacopoeia; the synthesis of Ayurvedic, Islamic, and African healing traditions producing a rich medical culture.',
    religion:'Islam adopted through trade contact from the 9th century — not conquest — producing a distinctively African Islam blending Sufi mysticism with indigenous coastal spiritual traditions still practised today.',
    legacy:'Swahili as the most widely spoken African language (200 million speakers); the coral-stone ruins of Kilwa (a UNESCO World Heritage site) as evidence of a sophisticated civilisation erased from popular historical memory.',
    gender:'Swahili women of merchant families wielding significant economic agency — managing household commerce, owning property, and controlling the textile trade; the female seclusion (purdah) adopted with Islam creating tension with the pre-Islamic tradition of female public commercial activity; the mwana wa mkubwa (great woman) as a recognised status of female authority.',
    slavery:'The Swahili coast as the western terminus of the Indian Ocean slave trade — enslaved people from the interior of East Africa (Mozambique, Tanzania, Congo) transported to Arabia, Persia, India, and the Persian Gulf; Zanzibar as the world\'s largest slave market in the 19th century, processing 50,000 enslaved people annually.',
    collapse:'The Portuguese destruction of Kilwa and Mombasa (1505–1506) burning the richest Swahili cities and decapitating the commercial network; yet Swahili culture survived the Portuguese period, recovering after Omani intervention (1698) expelled Portugal from most of the coast; colonial German and British rule as the second catastrophic rupture.',
    trade:'The Indian Ocean as the Swahili world\'s total medium — dhow trade routes running on monsoon winds, carrying gold, ivory, and enslaved people eastward, returning with Indian textiles, Chinese porcelain, and Persian metalwork; Kilwa Kisiwani\'s great mosque funded by Indian Ocean gold trade as the material monument of this exchange.',
    language:'Swahili (Kiswahili) as the most successful African language — a Bantu base enriched by Arabic, Persian, Portuguese, and Indian vocabulary reflecting centuries of commercial contact; spoken by 200+ million people as first or second language across 14 countries; the official language of the African Union.',
    technology:'Coral-stone architecture using the unique properties of porite coral as a building material — light, workable when fresh, hardening on exposure to air — enabling multi-story structures of great elegance without kiln-fired brick; the lateen-rigged dhow as a maritime technology perfectly adapted to the Indian Ocean\'s seasonal wind patterns.',
    ecology:'The mangrove forests of the East African coast as both ecological resource (building timber, fishing grounds, storm protection) and commercial product — mangrove poles exported to the treeless Arabian Peninsula for centuries as the building material of Gulf architecture.',
    food:'The synthesis of East African, Arabic, Indian, and Persian cuisines creating the Swahili culinary tradition — coconut milk, spices, rice, and seafood as the foundation; biryani and pilau as Swahili adaptations of South Asian rice dishes; the Zanzibar spice trade (cloves, cinnamon, black pepper) shaping global cuisine.',
    philosophy:'The uswahili concept — a civilised, educated, Islamic urbanity — as the Swahili self-definition contrasting with the "uncivilised" interior; the tension between this urbane identity and African cultural roots visible in the oral tradition; the Swahili philosophical tradition encoded in proverb (methali) as a form of distributed ethical wisdom.',
    inequality:'The waungwana (freeborn elite) versus watumwa (slaves) as the fundamental social polarity; Arab and South Asian merchant families as a commercial patriciate; the complex hierarchies of the patio house architecture physically encoding social status in spatial terms.',
    diffusion:'Swahili as Africa\'s most widely diffused language; the architectural tradition of carved wooden doors spreading across the Indian Ocean from Zanzibar to Gujarat; the commercial and cultural networks connecting East Africa to the entire Indian Ocean world, making the Swahili coast a true crossroads civilisation.',
    migration:'The Swahili coast was assembled by migration: Bantu-speaking farmers arriving from the interior meeting Arab and Persian merchants who established seasonal and then permanent trading settlements from the 8th century CE. Shirazi Persian origin myths, maintained by Swahili elite families, encode a real memory of Persian Gulf migration into a founding narrative. The monsoon wind system made the Indian Ocean a migration highway: Hadhrami Arabs from Yemen created permanent diaspora communities across the coast; Gujarati Indians settled in Mombasa and Malindi; freed slaves from mainland Africa joined the coastal urban populations. After Omani Arab conquest (1698), a new Omani administrative and merchant class migrated in, creating the Busaidi dynasty that would rule Zanzibar until 1964.',
   }},
  {id:'zimbabwe',fp:{mil:5,com:6,art:6,sci:3,reach:4,lon:3},music:{scale:'pentatonic',root:55,tempo:84,timbre:'mbira',rhythm:[1,0,1,0,1,1,0,0],reverb:.3,artifact:'Mbira dzavadzimu (voice of ancestors) — 22-key lamellophone documented in Shona tradition from 14th century CE; gourd resonators to amplify ceremonial sound'},lon:31,lat:-20,nm:'Great Zimbabwe & Shona',sb:'Southern Africa · 1100–1450 CE',x:518,y:408,s:1100,e:1450,
   conns:['swahili'],
   overview:'Great Zimbabwe\'s dry-stone walls — built without mortar to heights of 11 metres and still standing 600 years later — are the most visible monument of a civilisation that controlled the gold trade of the southern African plateau and built a state whose influence extended to the Swahili coast. At its peak (1250–1450 CE), the city housed perhaps 18,000 people, making it one of sub-Saharan Africa\'s largest pre-colonial urban centres. The 19th-century colonial insistence that Great Zimbabwe must have been built by Phoenicians or Arabs — because Africans supposedly couldn\'t have built it — was one of archaeology\'s most dishonest chapters, definitively refuted by excavation in the 1930s but embedded in popular imagination for decades longer. The zimbabwe (stone house) as a symbol of indigenous African architectural achievement is now on the Zimbabwean national flag.',
   d:{
    economy:'The terminus of a gold and ivory trade network connecting the interior of southern Africa to the Swahili Coast and Indian Ocean — Great Zimbabwe\'s rulers controlled access to the gold fields of the Zimbabwe Plateau.',
    political:'A centralised state with the Zimbabwe bird as its dynastic symbol — the ruler (Mambo) controlling trade routes, redistributing wealth, and conducting diplomacy with the Swahili city-states across 400km of territory.',
    art:'Dry-stone masonry walls up to 11 metres high and 5 metres thick, built without mortar with extraordinary precision — 900 years later they still stand; carved soapstone Zimbabwe bird sculptures of austere elegance.',
    literature:'Oral dynastic traditions preserved by specialist praise-singers (masvikiro) encoding political history, genealogy, and cosmological narrative across centuries; no surviving written record from within the civilisation itself.',
    military:'Control of the plateau gold trade as the primary instrument of political power; stone-walled citadels serving defensive functions; expansion through economic incorporation rather than military conquest.',
    science:'Architectural engineering achieving structural stability in large dry-stone enclosures with no mortar; sophisticated cattle management enabling the food surplus sustaining urban populations of 10,000–18,000.',
    medicine:'Indigenous southern African herbal traditions; cattle-based dietary practices; shamanistic healing integrated with the spirit mediumship (svikiro) tradition still practised by Shona communities today.',
    religion:'The Zimbabwe bird as dynastic ancestor spirit; spirit mediumship connecting the living to founding ancestors; a religious-political fusion in which the ruler\'s legitimacy depended on ancestral sanction.',
    legacy:'The Zimbabwe bird on the national flag of Zimbabwe; dry-stone construction techniques studied in modern sustainable architecture; the ruins\' existence disproving 19th-century colonial claims of no pre-European civilisation in southern Africa.',
    gender:'Limited direct evidence of gender relations at Great Zimbabwe; the Zimbabwe bird (possibly a female bateleur eagle) as a dynastic symbol potentially encoding female sacred authority; oral traditions of Shona descendant communities recording significant female spiritual roles (svikiro mediumship equally accessible to women); the queen mother as a political institution in subsequent Shona states.',
    slavery:'The Shona and Mutapa kingdoms\' participation in the East African slave trade through Swahili intermediaries; internal slavery of war captives; the Portuguese disruption of the interior trade networks introducing new forms of coerced labour in the 16th century.',
    collapse:'Great Zimbabwe\'s abandonment (c. 1450 CE) possibly from ecological exhaustion — the plateau\'s grazing lands depleted by the royal cattle herds, firewood for smelting exhausting local woodland, and gold deposits becoming less accessible; the political centre shifting north to Khami and the Mutapa kingdom rather than a total civilisational collapse.',
    trade:'Gold — the Zimbabwe Plateau\'s defining commodity — channelled through Great Zimbabwe to Sofala and the Swahili coast, purchasing Chinese porcelain, Indian glass beads, and Persian ceramics found in the ruins; the Portuguese arriving in the early 16th century seeking the source of this gold, which they called Ophir.',
    language:'No writing system at Great Zimbabwe; the Shona language as the oral repository of dynastic history and cosmological knowledge; the Zimbabwe birds (soapstone carvings) as visual emblems encoding dynastic identity without phonetic script.',
    technology:'Dry-stone construction achieving structural stability in large enclosures without mortar — a technique requiring precise understanding of stone properties and weight distribution; the conical tower at Great Zimbabwe (9 metres tall, solid stone, of unknown function) as an architectural puzzle still debated by scholars.',
    ecology:'The Zimbabwe Plateau as a relatively well-watered highland environment supporting both cattle pastoralism and agriculture; the potential ecological collapse from deforestation for iron smelting and gold processing as a factor in Great Zimbabwe\'s abandonment; cattle as the primary ecological indicator of political and social wealth.',
    food:'Sorghum and millet as the primary grains; cattle as wealth-object, ritual food, and dairy source simultaneously; the lobola (bride-price) cattle system making food and social currency identical; hunting as both subsistence and elite status activity.',
    philosophy:'The ancestral mediumship tradition (svikiro) as Great Zimbabwe\'s philosophical foundation — political authority mediated through ancestral spirits rather than deriving from military force alone; the concept that land belongs to the ancestors (and through them to the living community) rather than to individual owners.',
    inequality:'Control of the gold trade creating extreme wealth concentration at Great Zimbabwe; the spatial layout of the ruins encoding hierarchy — the Hill Complex (elite residential and ritual) separated from the Valley Complex (ordinary) and the Great Enclosure; cattle wealth as the primary inequality measure.',
    diffusion:'The dry-stone construction tradition continuing in Khami and other Shona successor sites; the Zimbabwe Plateau gold trade as the economic engine drawing Swahili, Arab, Indian, and ultimately Portuguese commercial attention into southern Africa; the Zimbabwe bird as one of Africa\'s most recognised cultural symbols.',
    migration:'Great Zimbabwe\'s population was assembled through migration from the interior plateau and from coastal Swahili trade connections. The Shona-speaking peoples who built it were themselves the product of the Bantu expansion\'s southern wave, arriving on the Zimbabwe Plateau around 200 CE. Elite families from Great Zimbabwe migrated northward to found the Mutapa state (c. 1430 CE) after the plateau\'s ecological exhaustion — a directed state migration in which the capital physically moved with its ruling lineage. The Portuguese disruption of Swahili trade routes forced economic migration across the plateau; the 19th-century Nguni (Ndebele) migration from South Africa under Mzilikazi created a new military aristocracy overlying Shona agricultural communities.',
   }},
  {id:'carthage',fp:{mil:8,com:9,art:5,sci:5,reach:8,lon:5},music:{scale:'phrygian',root:64,tempo:72,timbre:'flute',rhythm:[1,0,1,1,0,0,1,0],reverb:.3,artifact:'Aulos depicted on Punic terracotta statuettes; Livy records Carthaginian musical customs; double-pipe evidence from North African archaeological contexts'},lon:10,lat:37,nm:'Carthage',sb:'North Africa · 814–146 BCE',x:452,y:196,s:-814,e:-146,
   conns:['rome','egypt','phoenicians'],
   overview:'Carthage was for 600 years the western Mediterranean\'s dominant commercial power — a Phoenician colony that outgrew its parent, controlling trade routes from Britain to the Red Sea and building the ancient world\'s finest merchant fleet. It came within a general\'s tactical error of destroying Rome entirely at Cannae in 216 BCE, when Hannibal\'s double envelopment killed 70,000 Romans in a single afternoon. Rome\'s eventual victory in the three Punic Wars was followed not by settlement but by the literal erasure of Carthage: the city was destroyed in 146 BCE, its population enslaved, and — according to the medieval story, though not the historical record — its ground salted. Almost nothing of Carthaginian literature survives, because Rome burned the library. What we know of Carthage, we know almost entirely through the accounts of its enemies.',
   d:{
    economy:'The Mediterranean\'s dominant commercial power for three centuries — controlling trade between the western Mediterranean and Atlantic, monopolising tin routes from Britain, and extracting silver from Iberian mines.',
    political:'A merchant oligarchic republic governed by two elected suffetes (judges) and a senate of wealthy merchants — a constitutional model of elite commercial governance that directly influenced Rome\'s republican institutions.',
    art:'Tophet sanctuary sculpture; intricate gold jewellery; Punic glass-paste figurines; a distinctive architectural tradition across North Africa and Sicily that influenced Roman design in ways seldom credited.',
    literature:'Mago\'s 28-volume agricultural treatise — the only surviving Carthaginian text, translated into Latin and Greek after Carthage\'s destruction as too valuable to lose; the rest of Carthaginian literature was burned by Rome in 146 BCE.',
    military:'Hannibal Barca\'s crossing of the Alps with 37 war elephants and destroying three Roman armies at Trebia, Trasimene, and Cannae (216 BCE, 70,000 Romans killed in one day) — studied at military academies as the greatest tactical masterpiece in history.',
    science:'Carthaginian navigators explored the Atlantic coast of Africa and possibly reached the Gulf of Guinea; Hanno the Navigator\'s periplus (c. 500 BCE) documents the first recorded sub-Saharan African exploration.',
    medicine:'Inherited Phoenician medical traditions blending Egyptian, Mesopotamian, and indigenous North African practice; evidence of child sacrifice at Tophet sites remains deeply contested in modern scholarship.',
    religion:'Worship of Baal Hammon and Tanit as supreme deities; the Tophet (sacred enclosure) at the centre of Punic religious life; religious practices deliberately demonised by Roman sources after Carthage\'s destruction.',
    legacy:'Hannibal as the tactical model for every subsequent commander from Napoleon to Patton; Punic agricultural techniques adopted by Rome and preserved in Mago\'s treatise shaping Mediterranean farming for millennia; "Punic faith" as Rome\'s term for treachery — the defeated writing history.',
    gender:'Dido (Elissa), the legendary founder of Carthage, as one of antiquity\'s most powerful female founding narratives; Carthaginian women managing commercial enterprises during husbands\' long trading voyages; Tanit as the supreme deity outranking the male Baal Hammon — an unusual theological female supremacy reflecting genuine cultural status.',
    slavery:'Carthaginian slavery following Phoenician patterns — enslaved war captives, debt bondage, and purchase; the Sicilian and Spanish mines using slave labour; Hannibal\'s army including enslaved people as support workers; yet Carthaginian commercial law gave enslaved people more rights than Roman chattel slavery.',
    collapse:'The Third Punic War (149–146 BCE) ending in the total destruction of Carthage — the city razed, its population sold into slavery, and the site cursed (though the Roman "salting the earth" story is a 19th-century invention); the most deliberate civilisational erasure in antiquity, Rome destroying its greatest rival so thoroughly that Carthaginian literature survives only in quotation.',
    trade:'The western Mediterranean\'s commercial hegemon — controlling tin from Britain, silver from Spain, grain from North Africa, and purple dye from Tyre\'s successor traditions; the closed-sea policy (sinking foreign ships found in western Mediterranean waters) as protectionist commercial imperialism.',
    language:'Punic (a Phoenician dialect) persisting as a spoken language in North Africa until the 4th century CE — Augustine of Hippo spoke it as a child; the Punic script as the ancestor of the Hebrew square script; Neo-Punic inscriptions found across North Africa into the Roman period.',
    technology:'Carthaginian agricultural technology as the most advanced in the ancient Mediterranean — Mago\'s 28-volume treatise (the only surviving Carthaginian text) so valued that Rome translated it into Latin after destroying the city; sophisticated metalworking for weapons and ship construction.',
    ecology:'Mago\'s agricultural treatise describing sophisticated soil management, irrigation, and crop rotation across North African conditions — evidence of serious ecological knowledge; the North African littoral under Carthaginian management maintaining its fertility for centuries, degrading only under subsequent Roman grain monoculture.',
    food:'North African olive oil and wine as Carthaginian commercial staples; the introduction of the pomegranate (Punica granatum, literally "Carthaginian apple") to the Mediterranean world; garum production for export; the sophisticated viticulture documented in Mago\'s treatise.',
    philosophy:'Carthaginian philosophical tradition inaccessible due to deliberate Roman destruction of the library; Hannibal\'s memoirs and Carthaginian diplomatic and legal texts are entirely lost; what survives through hostile Roman and Greek sources suggests a pragmatic commercial ethic without the idealist pretensions of Greek philosophy.',
    inequality:'The suffet oligarchy as a narrow merchant aristocracy; the mercenary system using non-citizen soldiers reflecting the commercial calculation that citizenship was too valuable to risk in battle; the Libyan and Numidian subject peoples providing military manpower in exchange for autonomy rather than citizenship.',
    diffusion:'Punic language surviving in Augustine\'s North Africa; Carthaginian agricultural techniques embedded in Mago\'s treatise and transmitted through the Roman agricultural tradition; Hannibal\'s tactical innovations (the double envelopment) studied at military academies globally; the word "Punic" entering English as a synonym for treachery — the victor\'s prerogative.',
    migration:'Carthage was itself a migration — a Phoenician colonial settlement traditionally dated to 814 BCE, founded according to legend by Queen Dido and refugees from Tyre. The city then became a migration hub, sending out its own colonists to Iberia, Sardinia, Sicily, and North Africa to create a Punic demographic zone across the western Mediterranean. Carthaginian mercenary armies were migration assemblages: Iberians, Balearic slingers, Numidian cavalry, Gauls, and Libyan infantry all serving under Punic command. Hannibal\'s army crossing the Alps (218 BCE) was a directed migration of 40,000 men that permanently changed Italy\'s demographic mix — Gauls and Ligurians who fought with Hannibal remained in the Po Valley after his eventual withdrawal.',
   }},
  {id:'hittites',fp:{mil:9,com:6,art:6,sci:6,reach:7,lon:4},music:{scale:'lydian',root:60,tempo:64,timbre:'pluck',rhythm:[1,0,0,1,0,1,0,0],reverb:.4,artifact:'Kinnarum (lyre) mentioned in Hittite cult inventory texts; Anatolia documented as origin of Phrygian mode by ancient Greeks; Hurrian musical terminology in Hittite archives'},lon:34,lat:40,nm:'Hittite Empire',sb:'Anatolia · 1700–1178 BCE',x:526,y:140,s:-1700,e:-1178,
   conns:['egypt','mesopotamia','minoans'],
   overview:'The Hittites built the ancient Near East\'s second superpower in Anatolia between 1700 and 1178 BCE, matching Egypt as the only other state capable of treating with the pharaoh as an equal. Their supreme achievement was not military but diplomatic: the Treaty of Kadesh (1259 BCE), negotiated after the world\'s first recorded chariot battle, is the oldest surviving international peace treaty, and a copy hangs at the United Nations headquarters in New York. The Hittites were also the first to smelt iron systematically, guarding the technology as a state monopoly that gave them decisive military advantage. Their empire collapsed catastrophically around 1180 BCE in the general Late Bronze Age Collapse that simultaneously destroyed the Mycenaean Greeks, the Ugaritic city-states, and destabilised Egypt — one of history\'s most puzzling and consequential simultaneous civilisational failures.',
   d:{
    economy:'Iron smelting technology jealously guarded as a state monopoly — the Hittites were among the first to work iron systematically, providing a decisive military advantage that they leveraged through strategic export control.',
    political:'The only ancient Near Eastern power to negotiate with Egypt as an equal — the Treaty of Kadesh (1259 BCE) with Ramesses II is the world\'s oldest surviving peace treaty, its text inscribed at the United Nations headquarters in New York.',
    art:'Rock reliefs at Yazılıkaya depicting the entire Hittite pantheon in procession; monumental gateway lions and sphinxes; cuneiform archives at Hattusa numbering 30,000 clay tablets — one of antiquity\'s richest palace libraries.',
