    food:'The Islamic world as the vector transmitting agricultural knowledge between continents — coffee (from Ethiopia to Arabia to the world); sugar cane cultivation spreading westward; spice trade connecting Southeast Asian production to European consumers; the cookbook as a literary genre invented in Baghdad (10th century).',
    philosophy:'Ibn Rushd\'s (Averroes) commentaries on Aristotle transmitting Greek philosophy to Latin Europe and triggering the Scholastic revolution; Al-Ghazali\'s Incoherence of the Philosophers as the definitive response; Sufism (Ibn Arabi, Rumi) as a philosophical mysticism of extraordinary depth and enduring global influence.',
    inequality:'The dhimmi system granting legal protection but second-class status to Christians and Jews; the mamluk (military slave) institution creating an enslaved military ruling class — the Mamluks of Egypt being enslaved soldiers who became sultans; within Muslim society, tribal and family networks as the primary axes of inequality.',
    diffusion:'The preservation and transmission of Greek, Indian, and Persian knowledge to medieval Europe — without Al-Khwarizmi\'s algebra, Ibn Sina\'s medicine, and Al-Haytham\'s optics, the European Renaissance has no foundation; the word "algebra" (al-jabr), "algorithm" (Al-Khwarizmi), "zero" (sifr), and "chemistry" (al-kimiya) as linguistic monuments to this transmission.',
    migration:'The Arab migration out of the Arabian Peninsula following Muhammad\'s death (632 CE) was history\'s fastest voluntary demographic expansion — Arab armies, administrators, and settlers reaching Spain, Central Asia, and the Indus Valley within a century. But the Islamic world was itself a migration magnet: Persians, Berbers, Turks, and Africans converted and joined the umma, producing a civilisation defined not by Arab ethnicity but by Islamic identity. The Turk migrations from Central Asia (10th–11th centuries) fundamentally altered the Islamic world\'s ethnic composition, with Turkic dynasties (Seljuks, Ottomans) providing the military and political leadership while Persian remained the language of culture. The Mongol destruction of Baghdad (1258) triggered a scholarly migration to Cairo, Damascus, and eventually Ottoman Istanbul.',
   }},
  {id:'mongol',fp:{mil:10,com:7,art:5,sci:5,reach:10,lon:2},music:{scale:'pentatonic_minor',root:45,tempo:52,timbre:'drone',rhythm:[1,0,0,0,1,0,0,0],reverb:.6,artifact:'Morin khuur (horse-head fiddle) — ancient steppe origin; höömii throat singing documented among Tuvan/Mongolian peoples; praise epics (tuuli) of Chinggis Khan'},lon:106,lat:47,nm:'Mongol Empire',sb:'Eurasia · 1206 – 1368 CE',x:728,y:150,s:1206,e:1368,
   conns:['china','islamicworld','india','byzantine'],
   overview:'Chinggis Khan unified the Mongol tribes in 1206 and launched the most rapid territorial expansion in history, creating an empire stretching from Korea to Poland within two generations. The destruction was real and immense — Baghdad\'s libraries burned, Central Asian cities depopulated, perhaps 40 million dead across the campaigns. But the Pax Mongolica that followed was equally real: for the first time, a merchant could travel safely from China to France under a single political authority, and the ideas, technologies, and microbes that moved with them reshaped the world. The Black Death moving west through Mongol trade routes killed 30–60% of Europe\'s population, dissolving feudal labour control and setting the conditions for the Renaissance. The Mongol Empire lasted less than 150 years but catalysed a century of transformation it did not survive to see.',
   d:{
    economy:'The Pax Mongolica — enforced peace across Eurasia enabling safe trade from China to France. Marco Polo\'s journey was only possible because one political authority controlled the entire Silk Road corridor.',
    political:'The largest contiguous land empire in history (24 million km²); the Yasa law code applied uniformly across cultures and religions; a sophisticated yam postal relay system enabling communication at unprecedented speed.',
    art:'Mongol court patronage produced extraordinary hybrid art forms — synthesising Chinese, Persian, and Islamic traditions into illuminated manuscripts and silk paintings unlike anything before or since.',
    literature:'The Secret History of the Mongols — a rare steppe oral tradition committed to writing in 1227, revealing the inner world of nomadic Central Asian culture with startling intimacy and poetry.',
    military:'Campaign speeds of 80km per day; psychological warfare using total city destruction as deliberate policy; a command structure so disciplined that armies of 100,000 operated as a single weapon across a continent.',
    science:'The Mongols transferred Chinese and Islamic scientific knowledge westward; established the Maragheh Observatory in Iran (1259), producing astronomical tables that influenced Copernicus.',
    medicine:'The Mongol westward drive transmitted bubonic plague from Central Asian rodent reservoirs into European trade networks, causing the Black Death (1347–1351) — the defining biological catastrophe of the medieval world.',
    religion:'Complete state policy of religious tolerance — Nestorian Christians, Buddhists, Muslims, Shamanists, and Jews all served in the Mongol court simultaneously, making it history\'s first deliberately pluralist empire.',
    legacy:'The Pax Mongolica connected Eurasia as a single exchange zone for the first time; the Black Death it inadvertently triggered killed 30–60% of Europe\'s population, reshaping its labour economics, religious authority, and political structure.',
    gender:'Mongol women had significantly more freedom than sedentary contemporaries — managing camp households autonomously, owning property, riding and hunting, and wielding political influence; Töregene Khatun and Oghul Qaimish actually governed the empire as regents after their husbands\' deaths, commanding obedience from the Caspian to the Pacific.',
    slavery:'The Mongol conquests producing slaves on an industrial scale — artisans, scholars, and administrators were extracted from conquered cities and redistributed across the empire; yet the Mongols rapidly elevated talented slaves to administrative positions, creating a meritocratic use of unfree labour.',
    collapse:'The Mongol Empire fragmented within fifty years of Chinggis Khan\'s death (1227) — not from external pressure but from the structural tension between nomadic governance and the administration of sedentary empires; the Black Death they inadvertently spread (1347–1351) killing 30–60% of Europe and undermining Mongol-controlled trade routes.',
    trade:'The Pax Mongolica (c. 1250–1350) — enforced peace across Eurasia enabling safe trade from China to France; the yam postal relay stations every 25km across the entire empire; Marco Polo\'s journey only possible under Mongol protection; the greatest single expansion of Eurasian commercial integration before the modern era.',
    language:'The Uyghur script adapted for Mongolian by Chinggis Khan\'s decree (1204) — the first standardised Mongolian writing; the Secret History of the Mongols as the empire\'s founding literary text; the Mongol court\'s multilingualism reflecting its cosmopolitan administration of Chinese, Persian, Turkic, and Russian populations.',
    technology:'The composite recurve bow — storing more energy per unit weight than any other bow type, accurate to 200 metres from horseback — as the defining weapon of Mongol military supremacy; Chinese gunpowder weapons integrated into Mongol siege arsenals; the Maragheh Observatory as a Mongol investment in astronomical science.',
    ecology:'The catastrophic ecological impact of Mongol depopulation — vast areas of agricultural China and Central Asia reverting to forest after conquest, measurably reducing atmospheric CO₂; conversely, the destruction of Iraq\'s irrigation infrastructure (1258) turning productive farmland into permanent desert.',
    food:'A nomadic pastoral diet of fermented mare\'s milk (airag), dried meat, and blood — extraordinarily calorie-dense and storable; the Mongols\' astonishment at the food variety of conquered sedentary civilisations documented in court records; the transmission of Chinese and Persian culinary traditions westward through Mongol court feasting.',
    philosophy:'A pragmatic amoralism of power — "the greatest happiness is to vanquish your enemies, to chase them before you, to rob them of their wealth, to see those dear to them bathed in tears, to clasp to your bosom their wives and daughters" (attributed to Chinggis Khan) — a philosophical position of pure vitalism without moral framework.',
    inequality:'The most extreme inequality in history created and destroyed within decades — conquered populations reduced from civic life to slavery or death, while a small Mongol aristocracy commanded continent-scale tribute; yet within the Mongol aristocracy, a genuine meritocracy based on military ability rather than birth.',
    diffusion:'The Black Death as the most consequential involuntary diffusion event in history; Chinese technology (gunpowder, printing, paper money) transmitted westward; Islamic astronomical knowledge moving east to China; the Mongol Empire as the catalyst for the Eurasian exchange that produced the modern world.',
    migration:'The Mongol expansion was the most consequential migration-catalyst in Eurasian history — not primarily through Mongol settlement (the population was too small) but through the population movements it triggered. The Mongol terror drove the Kipchak Turks westward into Hungary; it pushed Iranian populations into the Indian Deccan (founding the Bahmani Sultanate); it drove Anatolian refugees into cities that became Ottoman power bases. The Mongols themselves settled most thickly in Persia and China, rapidly assimilating into local populations. The Pax Mongolica simultaneously enabled the largest voluntary migration network yet seen — Venetian merchants, Chinese diplomats, and Persian scholars all moving safely across Eurasia under Mongol protection.',
   }},
  {id:'westafrica',fp:{mil:6,com:8,art:7,sci:6,reach:5,lon:7},music:{scale:'pentatonic',root:55,tempo:96,timbre:'mbira',rhythm:[1,0,1,1,0,1,1,0],reverb:.25,artifact:'Kora (21-string harp-lute) in Mande griot tradition; balafon wooden xylophone depicted at Mali court; djembe drum and sabar ensemble'},lon:-4,lat:13,nm:'West African Empires',sb:'Ghana · Mali · Songhai · 300 BCE – 1600 CE',x:436,y:278,s:-300,e:1600,
   conns:['islamicworld','egypt'],
   overview:'The empires of Ghana, Mali, and Songhai controlled the trans-Saharan gold trade for nearly two thousand years, making West Africa one of the medieval world\'s wealthiest regions. Mansa Musa\'s 1324 hajj — with 60,000 attendants and so much gold that its distribution crashed Mediterranean prices — was the single most visible demonstration of pre-colonial African wealth in the historical record. Timbuktu\'s Sankore university attracted scholars from across the Islamic world, and its libraries held 700,000 manuscripts. The Atlantic slave trade, beginning in the 15th century, systematically extracted this region\'s human capital for four centuries, creating the wealth of the Atlantic world at the cost of West Africa\'s own development. The griot oral historians, the kente weavers, and the descendants of this tradition rebuilt what could not be taken.',
   d:{
    economy:'Gold and salt trade of continental scale — the Mali Empire\'s Mansa Musa controlled an estimated 50% of the world\'s gold in 1324, crashing Mediterranean gold prices on his pilgrimage to Mecca with 60,000 attendants.',
    political:'Ghana, Mali, and Songhai — successive empires with sophisticated administrative structures, provincial governance, diplomatic networks spanning the Sahara, and taxation systems of considerable complexity.',
    art:'Benin bronzes (14th–17th century) of extraordinary technical mastery; Nok terracotta figures (500 BCE–200 CE); the Great Mosque of Djenné — enduring monuments of African artistic and architectural achievement.',
    literature:'The griot oral historians preserving dynastic genealogies and epic narratives across generations; the Sundiata epic; over 700,000 manuscripts held in Timbuktu\'s libraries, written in Arabic, Songhay, and Mandé scripts.',
    military:'Cavalry-based warfare of high sophistication; iron weapons and metallurgy among the earliest in the world; strategic control of Saharan trade routes as simultaneously military and commercial assets.',
    science:'Timbuktu\'s Sankore University — a major medieval centre of Islamic astronomy, mathematics, and law, attracting scholars from across the Muslim world and producing advanced astronomical calculations.',
    medicine:'Extensive herbal medical traditions; Islamic medical texts at Sankore; sophisticated community health practices within the complex urban environments of Djenné, Timbuktu, and Gao.',
    religion:'Indigenous animist traditions blending with Islam adopted through trade contact, producing unique syncretic religious cultures whose practices persist in West African diaspora communities globally.',
    legacy:'Timbuktu\'s 700,000 manuscripts (still being digitised); the gold that seeded medieval European coinage and trade; and enduring griot oral historical traditions maintained by hereditary lineages across 12 modern nations.',
    gender:'West African societies showed enormous variation — from the matrilineal Akan system where property and political succession passed through the female line, to the strictly patriarchal Hausa states; the queen mother (ohemaa) among the Akan as a political office of genuine authority, able to destool (depose) the king.',
    slavery:'West Africa\'s pre-colonial slavery was varied and limited by kinship obligations; the Atlantic slave trade transformed this entirely — creating a demand for enslaved people that destabilised every West African state, rewarded those who raided neighbours, and extracted 12–15 million people from the region over 400 years.',
    collapse:'The Ghana Empire collapsed (c. 1100) partly from Almoravid pressure, partly from desertification; Mali declined after Mansa Musa\'s successors proved incompetent; Songhai destroyed by Moroccan arquebusiers at Tondibi (1591) — yet cultural traditions, trade networks, and griot historical memory survived all political collapses.',
    trade:'The trans-Saharan trade as West Africa\'s civilisational engine — gold and slaves northward, salt, horses, and manufactured goods southward; Timbuktu as a major commercial hub where scholars, merchants, and caravans converged; the kola nut as West Africa\'s internal trade commodity and social lubricant.',
    language:'The Mande language family connecting merchants, scholars, and political networks across West Africa; Arabic as the language of Islamic scholarship at Timbuktu; the N\'Ko script invented in 1949 for the Mande languages as one of the most successful modern indigenous script creations; over 700,000 manuscripts in Arabic and indigenous scripts.',
    technology:'Iron smelting in West Africa (c. 1400 BCE at Termit, Niger) — among the world\'s earliest and possibly independent of Near Eastern traditions; sophisticated gold and bronze casting (Akan goldweights as a complete measurement system); the kente weaving tradition as textile engineering of great complexity.',
    ecology:'The Sahel as a dynamic ecological frontier whose southward advance (desertification) and northward retreat shaped the rise and fall of empires; indigenous forest management systems; the baobab as a civilisational tree providing food, water storage, medicine, and shelter encoded in oral tradition.',
    food:'The African origin of rice cultivation (Oryza glaberrima, domesticated in the Niger River Delta c. 1500 BCE) — enslaved West Africans bringing rice cultivation knowledge to the American South; millet and sorghum as ancient West African cereal domestications; the palm oil, groundnut, and okra traditions shaping global cuisine.',
    philosophy:'Ubuntu (I am because we are) as West Africa\'s foundational ethical concept — a relational ontology defining personhood through community rather than individual autonomy; the griot tradition as an applied philosophy of historical memory; Timbuktu\'s Islamic scholarly tradition producing legal and ethical philosophy of great sophistication.',
    inequality:'The jeli (griot) hereditary caste as the extreme of status hierarchy — simultaneously indispensable and ritually impure; noble, artisan, and slave castes across the Mande world; yet the trans-Saharan trade creating merchant wealth independent of birth, and Islamic egalitarianism theoretically dissolving caste distinctions.',
    diffusion:'The African diaspora carrying West African cultural traditions — music (the banjo, blues, jazz), food (rice cultivation, okra, black-eyed peas), religious practices (Vodou, Candomblé, Santería), and linguistic structures — to the Americas, where they became foundational elements of American culture.',
    migration:'West African population movements structured the continent\'s civilisational geography. The Bantu expansion — originating in the Nigeria-Cameroon borderland around 3000 BCE — was the greatest migration in African history, spreading Bantu languages, iron smelting, and agricultural practices across the entire sub-Saharan continent over 3,000 years. The trans-Saharan trade routes were migration corridors: Berber and Arab merchants, Tuareg intermediaries, and Hausa traders created permanent diaspora communities across the Sahara. The Atlantic slave trade (1500–1900) forcibly migrated 12–15 million West Africans to the Americas — history\'s largest forced migration — creating the African diaspora whose cultural contributions to American music, food, language, and religion are foundational.',
   }},
  {id:'byzantine',fp:{mil:7,com:8,art:9,sci:7,reach:7,lon:10},music:{scale:'byzantine',root:60,tempo:58,timbre:'bell',rhythm:[1,0,0,1,0,0,0,1],reverb:.65,artifact:'Byzantine Octoechos (8-mode system) codified by John of Damascus (c.726 CE); church bell casting documented from 4th century; Egeria\'s travel diary describes liturgical chant'},lon:29,lat:41,nm:'Byzantine Empire',sb:'Eastern Rome · Constantinople · 330 – 1453 CE',x:516,y:152,s:330,e:1453,
   conns:['rome','islamicworld','mongol','greece'],
   overview:'When Rome\'s western half fell in 476 CE, the eastern half simply continued — as it would for another thousand years from Constantinople, the city that controlled the Bosphorus between Europe and Asia. Byzantium preserved Roman law, Greek philosophy, and Christian theology in a single political synthesis while Europe\'s west fragmented into kingdoms. Its scholars copied and transmitted the ancient texts that would trigger the Renaissance; its missionaries invented the Cyrillic alphabet and carried Orthodox Christianity into Russia and the Slavic world; its gold standard kept Mediterranean commerce alive for seven centuries. When the Ottomans finally took Constantinople in 1453, the Byzantine scholars who fled to Italy brought their Greek manuscripts with them — and lit the Renaissance\'s intellectual fire.',
   d:{
    economy:'The hyperpyron gold standard maintained for 700 years; Constantinople as the medieval world\'s single largest market, linking the Silk Road to Europe and controlling trade between the Black Sea and Mediterranean.',
    political:'A continuous Roman imperial state lasting 1,100 years after Rome\'s fall — preserving Roman law, Greek philosophy, and Christian theology in a single political synthesis of extraordinary institutional durability.',
    art:'The mosaic tradition of Ravenna and Hagia Sophia; the icon as a theological art form whose aesthetic conventions shaped Eastern Christian visual culture; illuminated Gospel manuscripts of breathtaking skill.',
    literature:'The preservation and copying of ancient Greek texts — without Byzantine monasteries, most of Plato, Aristotle, Thucydides, and Sophocles would be lost; the chronicles of Procopius; theological writings defining Christian doctrine.',
    military:'Greek fire — a naval incendiary weapon of devastating effect whose formula remains unknown; professional tagmata armies; strategic diplomacy deployed as deliberately as military force.',
    science:'The conservation and transmission of ancient Greek scientific texts; the Pantokrator xenon hospital complex as the most advanced medical institution of its era; legal codification of all Roman law in the Corpus Juris Civilis.',
    medicine:'The most systematic hospital organisation in the medieval world; the Pantokrator xenon in Constantinople with specialised wards, outpatient clinics, and pharmacies — the direct model for European monastic hospitals.',
    religion:'The Eastern Orthodox Church — defining the spiritual and cultural character of Greece, Russia, Serbia, Bulgaria, Romania, and Ethiopia to this day; the Great Schism of 1054 reshaping all subsequent Christian history.',
    legacy:'Greek text preservation enabling the Renaissance; Orthodox Christianity\'s spread to Russia and Eastern Europe; Justinian\'s Corpus Juris Civilis as the basis of European civil law from the Channel to the Urals.',
    gender:'Byzantine women could own property, conduct business, and pursue religious life as nuns with genuine institutional authority; the empress wielded real political power — Theodora effectively co-ruled with Justinian, her influence shaping both the Nika Revolt response and religious policy; yet legal subordination in marriage persisted.',
    slavery:'Byzantine slavery was comparatively mild — regulated by Roman law with significant protections, including the right to marry, own property, and seek legal redress; the eunuch institution created a third social category of deliberately altered men serving as palace administrators, chamberlains, and sometimes generals.',
    collapse:'The slow collapse across 400 years — losing Syria and Egypt to Islam (636–641 CE), Anatolia to the Seljuks (1071 CE), and Constantinople to the Ottomans (1453 CE) — yet at each stage Byzantine scholars and texts fled westward to Italy, directly triggering the Italian Renaissance.',
    trade:'Constantinople as the medieval world\'s greatest market — the Golden Horn controlling the Bosphorus toll, taxing all Black Sea to Mediterranean trade; Byzantine silk production as a state monopoly; the hyperpyron gold standard maintained for 700 years as the Mediterranean\'s reserve currency.',
    language:'Greek as the language of Orthodox Christianity, philosophy, and Byzantine administration; Cyrillic script invented by Byzantine missionaries (Sts Cyril and Methodius, 863 CE) for the Slavic peoples — now used by 250 million people across Russia, Ukraine, Serbia, and Bulgaria.',
    technology:'Greek fire — a naval incendiary weapon whose exact formula remains unknown despite extensive analysis, repelling Arab naval attacks on Constantinople in 674 and 718 CE; the codex (bound book) replacing the scroll as the standard document form; sophisticated silk weaving technology guarded as a state secret.',
    ecology:'Byzantine environmental history marked by the Plague of Justinian (541–750 CE) — possibly the first pandemic of Yersinia pestis — reducing the Mediterranean population by 25–50% and fundamentally altering the empire\'s agricultural and fiscal capacity.',
    food:'Byzantine cuisine synthesising Greek, Roman, and Near Eastern traditions; wine as a sacramental, commercial, and dietary staple; honey as the primary sweetener before cane sugar; the monastery as a centre of food production and agricultural innovation, preserving Roman agricultural techniques through the medieval period.',
    philosophy:'The preservation and transmission of ancient Greek philosophy; the Christian Neoplatonism of Pseudo-Dionysius the Areopagite; the hesychast controversy (Gregory Palamas, 14th century) as a profound theological debate about the nature of divine experience and the boundary between mysticism and rationalism.',
    inequality:'The pronoia land grant system creating a military aristocracy with increasingly hereditary power, progressively weakening central state authority; the dynaton (powerful ones) accumulating peasant lands through debt and foreclosure — the same process of elite land consolidation that weakened the Western Roman Empire.',
    diffusion:'The transmission of Greek texts to Italy through Byzantine scholars fleeing the Ottoman conquest — Plethon, Bessarion, Chrysoloras — directly triggering Italian Humanism; the Cyrillic alphabet and Orthodox Christianity defining the civilisational character of Russia, Serbia, and Bulgaria to this day.',
    migration:'Constantinople was the ancient and medieval world\'s greatest migration destination — a city of perhaps 500,000 at its height drawing migrants from every direction: Slavic settlers in the Balkans, Armenian merchants and soldiers, Syriac and Coptic Christians from the east, Vikings (Varangians) as palace guards from the north. Byzantine missionary migration was among the most consequential in history: Cyril and Methodius travelling to Moravia (863 CE) to create the Glagolitic alphabet and convert the Slavs began a demographic-cultural process that eventually produced Orthodox Russia. The empire\'s contraction drove Greek scholars westward into Italy, particularly after 1453, directly triggering the Renaissance through their migrating libraries and expertise.',
   }},
  {id:'olmec',fp:{mil:5,com:5,art:8,sci:5,reach:4,lon:7},music:{scale:'pentatonic',root:55,tempo:80,timbre:'drum',rhythm:[1,1,0,1,1,0,0,1],reverb:.3,artifact:'Ceramic whistles and clay ocarinas from San Lorenzo (c.1200 BCE); turtle-shell drum evidence; clay figurines holding musical instruments in ceremonial postures'},lon:-94,lat:18,nm:'Olmec',sb:'Gulf Coast Mesoamerica · 1500–400 BCE',x:188,y:253,s:-1500,e:-400,
   conns:['maya'],
   overview:'The Olmec of Mexico\'s Gulf Coast (1500–400 BCE) were Mesoamerica\'s founding civilisation — the cultural source code from which Maya, Zapotec, Aztec, and every subsequent Mesoamerican tradition compiled their religious, calendrical, and artistic programs. Their colossal basalt heads — portraits of rulers weighing up to 40 tonnes, transported 150km across difficult terrain without wheels or metal tools — are among the ancient world\'s most astonishing engineering achievements. The were-jaguar deity, the Mesoamerican ballgame, pyramid construction, ritual bloodletting, and astronomical calendar-keeping all originate here. The Cascajal Block may represent the Americas\' oldest writing (c. 900 BCE), though its decipherment remains incomplete. San Lorenzo was systematically abandoned around 900 BCE — its colossal heads ritually mutilated before departure, suggesting a political revolution rather than simple decline.',
   d:{
    economy:'Obsidian, jade, and magnetite traded across Mesoamerica through long-distance exchange networks; ceremonial centres like San Lorenzo supported by intensive wetland agriculture and tribute from surrounding polities.',
    political:'The first complex polity in Mesoamerica — hierarchical chiefdoms centred on monumental urban centres at San Lorenzo and La Venta, with evidence of hereditary rulership and a priestly administrative class.',
    art:'Colossal basalt heads — up to 3.4 metres tall, weighing 40 tonnes, transported 150km without wheeled vehicles or draft animals — among the most striking monumental sculpture in the ancient world.',
    literature:'Possible proto-writing on the Cascajal Block (c. 900 BCE) — potentially the oldest writing system in the Americas, predating Maya script by centuries, though its full decipherment remains contested.',
    military:'Evidence of inter-polity conflict and fortifications at San Lorenzo; ritual ballgame courts with probable sacrificial significance; the colossal heads may represent defeated enemy rulers.',
    science:'Sophisticated astronomical observation informing agricultural calendars; understanding of magnetism evidenced by magnetite mirror artefacts; engineering capable of moving multi-tonne basalt sculptures across terrain with no metal tools.',
    medicine:'Shamanistic healing traditions tightly integrated with religious practice; use of rubber for practical and ritual purposes — including rubber balls for the Mesoamerican ballgame — represents early organic polymer technology.',
    religion:'The were-jaguar deity — part human, part jaguar — dominating Olmec iconography and seeding religious symbolism that persisted across Mesoamerica for 2,000 years into Aztec civilisation.',
    legacy:'The mother culture of Mesoamerica — establishing the ballgame, were-jaguar iconography, pyramid-building traditions, ritual bloodletting, and astronomical calendrics that Maya, Zapotec, and Aztec civilisations all inherited.',
    gender:'The colossal heads\' all-male iconography suggesting a male-dominated elite culture; yet the Olmec figurine tradition includes numerous female forms possibly representing fertility, midwifery, or religious specialisation; the lack of clear palace archaeology making gender hierarchies difficult to reconstruct from material evidence.',
    slavery:'No direct evidence of institutionalised slavery; the colossal head transport (40-tonne basalt blocks moved 150km without wheels or metal tools) requiring organised mass labour — whether voluntary corvée, tribute labour, or coerced captive work is unknown; the ballgame\'s sacrificial dimension suggesting captive exploitation.',
    collapse:'San Lorenzo abandoned c. 900 BCE, La Venta c. 400 BCE — possibly from climate change reducing agricultural productivity, volcanic activity, or internal social conflict; the colossal heads at San Lorenzo systematically mutilated before abandonment, suggesting deliberate ritual killing of royal monuments in a political revolution.',
    trade:'The Olmec exchange network — obsidian from Oaxaca, iron ore from Oaxaca, jade from Guatemala, magnetite from Oaxaca — all converging at the Gulf Coast sites; Olmec-style artefacts found across Mesoamerica indicating either trade diaspora, political hegemony, or cultural prestige.',
    language:'The Cascajal Block (c. 900 BCE) as the possible earliest writing in the Americas — 62 signs in a system not yet deciphered; if genuine, the Olmec script predates Maya writing by centuries; the language spoken (possibly ancestral Mixe-Zoquean) potentially identifiable through the loanwords Maya and Nahuatl borrowed from Mixe-Zoquean.',
    technology:'The hydraulic engineering at San Lorenzo — artificial ridges and a sophisticated drainage system carved into the natural plateau — as the earliest large-scale landscape modification in Mesoamerica; the colossal head transport as a logistics and engineering achievement accomplished without metal tools, wheels, or draft animals.',
    ecology:'The Gulf Coast tropical lowlands as one of Mesoamerica\'s most productive agricultural environments — alluvial soils, reliable rainfall, and the rich estuary ecosystem of the Gulf Coast; the Olmec capitalising on this productivity to generate the surplus supporting monumental construction.',
    food:'Maize cultivation as the Olmec agricultural foundation; cacao first cultivated as a ritual drink in Olmec culture (1900 BCE — the earliest evidence of cacao use); the Mesoamerican ballgame\'s rubber ball connecting the Olmec to the first use of rubber as a processed material.',
    philosophy:'The were-jaguar as the Olmec\'s central philosophical figure — a transformation being partway between human and jaguar, embodying shamanic power to move between worlds; the shaman as the political and spiritual leader whose authority derived from trans-species transformation rather than military force.',
    inequality:'The colossal heads as portraits of rulers requiring hundreds of workers for years to produce — evidence of extreme wealth concentration and coercive labour extraction; the ceremonial centres at San Lorenzo and La Venta showing sharp spatial separation between elite and non-elite residential zones.',
    diffusion:'The were-jaguar, the ballgame, pyramid construction, bloodletting ritual, and astronomical calendar — all transmitted from the Olmec to later Mesoamerican civilisations; the Olmec as the source code from which Maya, Zapotec, and Aztec civilisations compiled their cultural programs.',
    migration:'The Olmec heartland on Mexico\'s Gulf Coast was populated by Mixe-Zoquean-speaking people who migrated into the tropical lowlands from highland Mexico around 1500 BCE, attracted by the alluvial soils and estuarine fisheries that could support population concentration. The extraordinary effort required to transport 40-tonne basalt boulders 150km — involving hundreds of workers, rafts, and overland sledging — implies a political capacity to direct large-scale labour migration across the landscape. Olmec traders and possibly colonists migrated outward carrying their distinctive iconography — the were-jaguar, the ballgame, the pyramid form — across Mesoamerica, creating the cultural template that later civilisations would elaborate. The systematic abandonment of San Lorenzo (c. 900 BCE) may represent an organised migration to La Venta rather than simple collapse.',
   }},
  {id:'maya',fp:{mil:5,com:6,art:9,sci:9,reach:4,lon:9},music:{scale:'pentatonic',root:53,tempo:78,timbre:'panpipe',rhythm:[1,0,1,1,0,1,0,0],reverb:.35,artifact:'Bonampak murals (c.750 CE) depict full orchestra of trumpets, drums, rattles, flutes; Dresden Codex shows musical ceremonies; turtle-shell drums and conch trumpets documented'},lon:-90,lat:16,nm:'Maya Civilization',sb:'Mesoamerica · 2000 BCE – 1500 CE',x:205,y:262,s:-2000,e:1500,
   conns:['olmec','aztec'],
   overview:'The Maya civilisation endured for 3,500 years across the jungle lowlands and highland valleys of southern Mexico and Central America — a decentralised confederacy of competing city-states that never unified into empire, yet produced the ancient world\'s most accurate astronomical calendar, independently invented zero, and created a fully deciphered hieroglyphic script capable of recording history, poetry, and prophecy. The Classic period (250–900 CE) saw Tikal, Palenque, and Copán as competing centres of architectural and intellectual achievement; the Classic Collapse (800–950 CE) depopulated the lowland cities within 150 years, most likely from drought, soil exhaustion, and elite mismanagement. But the Maya never disappeared: 7 million Maya people are alive today, speaking Mayan languages and maintaining cultural traditions that trace continuously to the civilisation whose ruins draw millions of visitors.',
   d:{
    economy:'Cacao as currency in standardised units; obsidian blade trade networks across 1,000km; raised-field wetland agriculture of extraordinary productivity; merchant class operating under divine protection.',
    political:'A confederacy of competing city-states — Tikal, Palenque, Copán, Chichén Itzá — never unified into a single empire, with dynastic kingship legitimated by divine descent and astronomical events.',
    art:'Corbelled arch architecture; polychrome ceramic painting of narrative complexity rivalling Greek vase painting; jade mosaic death masks; intricately carved limestone stelae recording dynastic history in breathtaking relief.',
    literature:'The Dresden, Madrid, and Paris Codices — surviving bark-paper books encoding astronomical tables and ritual calendars. The Popol Vuh creation epic preserves a cosmology of extraordinary philosophical depth.',
    military:'Highly ritualised elite warfare aimed at capturing rather than killing opponents for sacrificial use; fortified cities; the sacking of Teotihuacan (c. 550 CE) demonstrating capacity for large-scale strategic warfare.',
    science:'The most accurate astronomical calendar in the pre-telescopic world; calculation of the Venus cycle to within two hours per 500 years; zero independently invented — one of only three cultures in history to do so.',
    medicine:'Extensive herbal pharmacopoeia; skeletal evidence of successful skull trepanation; dental inlays of jade and pyrite; sweat baths (temazcal) for therapeutic and ritual purification.',
    religion:'A pantheon of 166 named deities; ritual human sacrifice and bloodletting as cosmic maintenance; the ballgame re-enacting the Hero Twins creation myth from the Popol Vuh.',
    legacy:'The independent invention of zero; the most accurate pre-modern astronomical calendar; 7 million Maya people alive today maintaining language and cultural identity; Chichén Itzá among the world\'s most visited heritage sites.',
    gender:'Lady Xoc of Yaxchilan (c. 726 CE) depicted in bloodletting ritual and military celebration — monumental public acknowledgment of female sacred participation; royal women as political actors through marriage alliance; yet the highest political and military authority remaining consistently male; the Moon Goddess (Ix Chel) as a powerful female deity associated with medicine and weaving.',
    slavery:'The Maya pen (enslaved person) — obtained through warfare, judicial punishment, and purchase — as a distinct social category; temple sacrifice of captured warriors as the extreme of enslaved captive treatment; the ballgame\'s sacrificial dimension turning captive players into cosmic ritual objects.',
    collapse:'The Classic Maya Collapse (800–950 CE) — the depopulation of the southern lowlands cities within 150 years — from a combination of drought (documented in lake sediment isotopes), warfare between polities, soil exhaustion, and political instability; one of the most studied collapses in archaeology, yet still debated in its primary cause.',
    trade:'The Maya trade network connecting obsidian (Guatemala highlands), jade (Motagua Valley), cacao (Pacific lowlands), and salt (Yucatán coast) through a system of maritime and overland routes; Chichén Itzá\'s cenote as a trade and ritual hub attracting goods from across Mesoamerica.',
    language:'Maya script as one of only five fully developed writing systems in world history — a logosyllabic system of 800+ signs decoded primarily by Yuri Knorozov (1952) and the triumvirate of Proskouriakoff, Thompson, and Houston; the decipherment revealing the Classic Maya inscriptions as detailed political history, not just astronomical tables.',
    technology:'The Maya corbelled arch (false arch) enabling multi-story stone construction; the observatories at Chichén Itzá and Palenque aligned to astronomical events with extraordinary precision; rubber vulcanisation (mixing rubber with morning glory vine sap to increase elasticity) as a material technology predating Goodyear by 3,000 years.',
    ecology:'The Maya lowlands\' milpa system — burning and planting in rotation — as a sustainable agricultural practice; the Classic Maya Collapse\'s ecological dimension: soil exhaustion from intensive agriculture on karst limestone with thin soils, and drought reducing the water supply in a region with no rivers.',
    food:'Maize (corn) as the sacred food from which the Maya creation myth says humanity was made — a theological status encoding its dietary centrality; cacao as a divine beverage consumed in elite ritual contexts; the milpa\'s Three Sisters (corn, beans, squash) providing nutritional completeness; the Maya contribution to the global food system through cacao alone is incalculable.',
    philosophy:'The Popol Vuh as one of the world\'s greatest creation narratives — humanity created from maize after failed attempts with mud and wood; the Hero Twins\' underworld journey as a mythological working-through of death and rebirth; the Maya concept of time as cyclical and the present world as the fourth creation (the previous three having been destroyed).',
    inequality:'The Classic Maya\'s extreme social hierarchy — the divine k\'uhul ajaw (holy lord) at apex; nobles, scribes, and warriors below; farmers and enslaved people at the base; yet inscriptions on monuments commemorating rulers rather than commoners make assessing ordinary life difficult; the collapse\'s cause may include elite extraction pushing the agricultural system beyond sustainable limits.',
    diffusion:'The cacao plant and chocolate as the Maya\'s supreme culinary gift to the world (now a $130 billion global industry); the independent invention of zero; the Long Count calendar\'s 2012 CE end-date generating global media coverage demonstrating Mayan time-reckoning still resonates; the 7 million Maya people alive today as living carriers of this tradition.',
    migration:'Maya civilisation\'s demographic history was structured by the forest\'s capacity to absorb and expel populations. The Classic Maya lowlands supported 3–5 million people at peak — densities achievable only through intensive agriculture that progressively degraded the thin karst soils. The Classic Collapse (800–950 CE) was ultimately a migration event: cities of 50,000 people abandoned over decades, their populations dispersing northward to the Yucatán Peninsula and southward into the Guatemalan highlands. This was not extinction but relocation — the northern Maya cities (Chichén Itzá, Uxmal) flourished precisely as the southern cities emptied. Spanish conquest (1520s) triggered further migration as surviving Maya populations were forcibly relocated into congregaciones (planned colonial towns) designed to facilitate tax collection and Christian conversion.',
   }},
  {id:'aztec',fp:{mil:8,com:8,art:8,sci:6,reach:5,lon:2},music:{scale:'pentatonic_minor',root:43,tempo:96,timbre:'drum',rhythm:[1,1,1,0,1,0,1,1],reverb:.25,artifact:'Huehuetl (upright drum) — example in National Museum of Anthropology, Mexico; teponaztli (two-tongued slit drum); Sahagun documents 8 distinct tone types in Aztec music (1569)'},lon:-99,lat:19,nm:'Aztec Empire',sb:'Mesoamerica · 1300–1521 CE',x:178,y:255,s:1300,e:1521,
   conns:['maya'],
   overview:'The Aztec Empire rose from a wandering tribe to the master of central Mexico in under two centuries — an ascent so rapid and violent that later Nahua tradition explained it as cosmic destiny. Tenochtitlan, built on an island in Lake Texcoco, grew to 200,000–300,000 inhabitants, larger than any contemporary European city, sustained by chinampa floating garden agriculture and tribute from 400 subject peoples. The cosmology demanded daily human sacrifice to sustain the sun\'s movement; the political reality was an empire run by merchants, bureaucrats, and a military aristocracy of extraordinary sophistication. Hernán Cortés arrived in 1519 with 600 men, and within two years Tenochtitlan had fallen — primarily because smallpox had already killed half its population, and because the Aztec Empire\'s tributary subjects eagerly joined the Spanish against their overlords.',
   d:{
    economy:'Tenochtitlan\'s Tlatelolco market — described by Cortés as larger than any in Spain — handling tens of thousands of traders daily in cacao, textiles, gold, and foodstuffs with no coinage, only barter and cacao beans.',
    political:'The Triple Alliance of Tenochtitlan, Texcoco, and Tlacopan governing 5–6 million people through a sophisticated tribute system; a professional bureaucracy managing taxation, justice, and military conscription simultaneously.',
    art:'The Sun Stone — a 24-tonne basalt cosmological map; featherwork mosaics requiring 16,000 birds per garment; monumental skull racks as political statement; turquoise mosaic masks of extraordinary technical mastery.',
    literature:'Nahuatl poetry of remarkable lyrical beauty; the Florentine Codex compiled by Sahagún — a 12-volume encyclopaedia of Aztec culture representing the most comprehensive record of any pre-Columbian civilisation.',
    military:'The Flowery War — institutionalised ritual conflict to capture sacrificial victims; elite Eagle and Jaguar warrior orders; Tenochtitlan defended by lake geography and three causeways, initially repelling the Spanish.',
    science:'Chinampas — artificial floating island agriculture achieving multiple annual harvests from swampland, feeding a city of 200,000–300,000 people, larger than any contemporary European city.',
    medicine:'The most comprehensive herbal pharmacopoeia in the Americas, documented in the Badianus Codex (1552); surgical suturing with human hair; over 1,000 medicinal plants systematically categorised.',
    religion:'Huitzilopochtli demanding daily human blood to prevent cosmic destruction; the 365-day and 260-day calendars interlocking in a 52-year cycle; sacrifice understood as cosmic obligation maintaining the sun\'s movement.',
    legacy:'Nahuatl words now in English: chocolate, tomato, avocado, chili, coyote; chinampas informing modern urban farming; Tenochtitlan buried beneath Mexico City, its causeways still defining the street grid.',
    gender:'The cihuatlampa (western realm of women who died in childbirth) as a sacred death equivalent to warriors dying in battle — a theological statement elevating women\'s reproductive labour to cosmic significance; yet political and military authority exclusively male; the goddess Coatlicue (earth mother, depicted with a skirt of serpents and a necklace of human hearts) as the female sacred force at its most terrifying.',
    slavery:'The tlacotin (enslaved person) occupying a complex legal status — able to own property, marry free spouses, and purchase their own freedom; children of enslaved people born free; judicial enslavement as punishment for certain crimes; yet the tlacaelel\'s ideological intensification of sacrifice in the 15th century creating a new category of enslaved war captive designated for the altar.',
    collapse:'The Spanish conquest (1519–1521) as not merely a military defeat but a total civilisational collapse — smallpox killing 50% of Tenochtitlan\'s population before a single battle; the Aztec\'s own tributary subjects joining Cortés; the systematic destruction of the codex library burning the intellectual record of an entire civilisation.',
    trade:'The pochteca (long-distance merchant guild) operating under the protection of Yacatecuhtli (god of merchants), travelling thousands of kilometres with luxury goods; the Tlatelolco market processing tens of thousands of transactions daily in a commodity range from foodstuffs to enslaved people; cacao as both currency and luxury beverage.',
    language:'Nahuatl as the lingua franca of the Aztec Empire\'s 5 million subjects — a polysynthetic language of extraordinary expressive complexity; Nahuatl loanwords in English (chocolate, tomato, avocado, coyote, ocelot, chili, guacamole) as the most widely consumed linguistic legacy of any pre-Columbian civilisation.',
    technology:'The chinampa floating garden system as the supreme Aztec agricultural technology — artificial islands built in Lake Texcoco achieving multiple harvests annually and feeding a city larger than any in contemporary Europe; the Aztec calendar stone as a feat of astronomical calculation and stone carving simultaneously.',
    ecology:'Tenochtitlan\'s island location in Lake Texcoco as both ecological adaptation and engineering challenge — requiring causeways, freshwater aqueducts, and constant dike maintenance; the chinampa system transforming swamp into the most productive agricultural land in Mesoamerica; the ecological disruption of Spanish drainage of the lake after conquest.',
    food:'The Aztec contribution to global cuisine is extraordinary — chocolate (xocolatl as a sacred cold beverage), tomatoes, chilis, vanilla, avocados, and corn tortillas; the elaborate Aztec feast culture documented in the Florentine Codex; pulque (fermented agave sap) as the ritual beverage; human flesh consumed in controlled sacrificial ritual contexts.',
    philosophy:'The Aztec Flower Wars (Xochiyaoyotl) as a philosophical statement — warfare not for territory but for the cosmic maintenance of the sun through sacrifice; the question whether sacrifice was a choice or obligation: human agency participating in the cosmic order\'s perpetuation; the tlamatinime (philosophers) debating whether human existence was real or dream.',
    inequality:'The pipiltin (nobility) versus macehualtin (commoners) as the fundamental divide; the pochteca merchant class accumulating wealth outside the traditional hierarchy; tribute extraction from 400+ subject peoples as institutionalised inequality on a civilisational scale; yet the Tlatelolco market\'s reported fairness — fixed prices, market inspectors, and no short-changing — as evidence of commercial equity.',
    diffusion:'Chocolate, tomatoes, chilis, vanilla, and avocados transforming world cuisine from the 16th century; Nahuatl words embedded in multiple languages; the Aztec political calendar (in terms of civic organisation) influencing subsequent Mexican national identity; the Aztec sun as the central symbol of Mexican national iconography to this day.',
    migration:'The Aztec origin myth is explicitly a migration narrative — the Mexica people wandering for 200 years from their mythical homeland Aztlan, guided by their god Huitzilopochtli, before founding Tenochtitlan on the island in Lake Texcoco in 1325 CE. This migration myth served a political function: legitimating a people who were latecomers to the Valley of Mexico, despised by established city-states, as divinely chosen. The pochteca long-distance merchants were professional migrants — travelling thousands of kilometres in armed caravans that served simultaneously as commercial ventures, intelligence-gathering missions, and diplomatic overtures. Spanish conquest triggered a demographic catastrophe: the combination of epidemic disease, warfare, forced labour, and cultural disruption reducing Central Mexico\'s population from 25 million to 1 million within a century.',
   }},
  {id:'inca',fp:{mil:7,com:5,art:7,sci:7,reach:7,lon:2},music:{scale:'andean',root:62,tempo:70,timbre:'panpipe',rhythm:[1,0,1,0,1,0,1,0],reverb:.45,artifact:'Quena (notched flute) examples found at Machu Picchu; siku panpipes in paired male/female interlocking technique (hocket); tinya (small drum) for ceremonial use; conch (pututu) for signals'},lon:-72,lat:-13,nm:'Inca Empire',sb:'Andes · 1400–1533 CE',x:215,y:385,s:1400,e:1533,
   conns:['maya'],
   overview:'The Inca Empire was the largest in the pre-Columbian Americas and one of the most astonishing state experiments in human history — governing 10–12 million people across 4,000km of the world\'s most challenging terrain through a command economy with no currency, no markets, and no writing, using instead a 40,000km road system, relay runners, and a knotted-string recording system (quipu) whose full meaning remains partially undecoded. The mit\'a labour obligation provided state infrastructure and universal basic provision simultaneously; the vertical ecology of the Andes was managed as a single food security system from sea level to 5,000 metres. Francisco Pizarro captured the Sapa Inca Atahualpa in 1532 during a civil war with his brother, collected a room full of gold as ransom, and then killed him anyway. The Inca resistance at Vilcabamba lasted until 1572 — forty years of guerrilla war in the cloud forest above Machu Picchu.',
   d:{
    economy:'A command economy with no currency, no markets, and no merchants — state redistribution (mit\'a labour tax) providing universal food, clothing, and shelter in exchange for labour, governing 10–12 million people.',
    political:'Tawantinsuyu — the Four Quarters — governed from Cusco via a 40,000km highway network enabling military and administrative communication faster than any contemporary state outside China.',
    art:'Machu Picchu\'s dry-stone masonry so precisely fitted no mortar was needed and a knife blade cannot be inserted between stones; textiles encoding cosmological meaning in geometric patterns; gold ceremonial objects.',
    literature:'The quipu — a knotted-string recording device encoding numerical and possibly narrative information — served as the primary administrative and mnemonic system, with over 700 surviving examples not yet fully decoded.',
    military:'Conquest of a 4,000km coastal and mountain territory in under a century; professional armies of 40,000 sustained by the highway network; incorporation rather than destruction as the preferred strategy.',
    science:'Terrace agriculture (andenes) engineering microclimates for crops at altitude; freeze-drying technology (chuño) enabling multi-year food storage; astronomical observatories aligned to solstice and equinox.',
    medicine:'Trepanation surgery with documented survival rates exceeding 80% — higher than European battlefield surgery until the 20th century; coca leaf as anaesthetic and altitude-sickness treatment.',
    religion:'Inti the sun god as divine ancestor of the Sapa Inca; the ceque system — 41 lines radiating from Cusco organising sacred sites, social groups, and the ritual calendar simultaneously.',
    legacy:'Terrace agriculture now studied for climate-resilient mountain farming; quipu decoding ongoing; Andean traditional medicine informing pharmacology; 8–11 million Quechua speakers today maintaining the empire\'s language.',
    gender:'The Sapa Inca\'s principal wife (coya) as a sacred political figure; the aqlla (chosen women) housed in Acllahuasi (house of the chosen) serving as weavers, brewers, and ritual specialists — an all-female institution of significant political importance; Mama Ocllo as the female founding figure of the Inca origin myth; yet political and military authority firmly male.',
    slavery:'The mit\'a (rotational labour obligation) requiring every household to contribute labour to the state for road building, mining, military service, and agricultural work — not chattel slavery but a total claim on subjects\' time; the yana (permanent attached retainers) in conditions closer to personal servitude; Potosí\'s mit\'a after Spanish conquest killing hundreds of thousands of Indigenous workers.',
    collapse:'The Spanish conquest (1532–1533) beginning with Francisco Pizarro capturing Atahualpa during a civil war between Inca factions — the most devastating timing possible; smallpox arriving ahead of the Spanish killing 50–90% of the Andean population; yet Inca resistance continuing until 1572 at Vilcabamba — 40 years of sustained guerrilla resistance.',
    trade:'A state-controlled redistribution system with no markets, no merchants, and no currency — the mit\'a providing labour, the qollqa (state storehouses) distributing food and clothing; yet long-distance exchange of prestige goods (Spondylus shells, tropical feathers, coca) between élites occurring outside the official system.',
    language:'Quechua as the administrative lingua franca imposed across the Inca Empire\'s 100+ ethnic groups — now spoken by 8–11 million people across Peru, Bolivia, Ecuador, Colombia, and Argentina; the quipu as a possible second recording system whose full decipherment could reveal an entire Inca literary tradition.',
    technology:'The 40,000km road system (surpassing Rome\'s in total length) traversing the world\'s most challenging terrain — high-altitude passes, steep ravines, coastal desert — using suspension bridges, tunnels, and stairways; the chasqui (relay runner) system carrying messages 400km/day; freeze-drying food technology (chuño) enabling multi-year storage.',
    ecology:'The andenes (agricultural terraces) as one of history\'s most ambitious landscape modification projects — converting near-vertical Andean slopes into productive farmland across 1 million hectares; the vertical ecology management of different altitude zones (coast, valley, highland, altiplano, jungle) as a sophisticated food security strategy.',
    food:'The Andean contribution to global agriculture is extraordinary — potatoes (5,000 varieties in the Andes), quinoa, amaranth, chuño, freeze-dried potatoes; the potato alone fed Europe\'s population explosion after 1600 and is now the world\'s fourth most important crop; chicha (fermented maize beer) as the sacred and social beverage.',
    philosophy:'The Andean concept of ayni (sacred reciprocity) as the philosophical foundation of the mit\'a system — not exploitation but mutual obligation between individuals, communities, and the cosmos; Pachamama (earth mother) as a living entity to whom humans owed reciprocal care; the concept that the community is the basic unit of existence, not the individual.',
    inequality:'The extreme contrast between the Sapa Inca\'s divine status and the commoner\'s total obligation to the state; the hierarchy of the four suyus (quarters) with the Inca ethnic group at the apex; yet the state redistribution system ensuring that no one starved — a pre-modern universal basic provision system, however coercively achieved.',
    diffusion:'The potato transforming world history — feeding Europe\'s Industrial Revolution labour force, causing Ireland\'s population growth and subsequent famine, now cultivated on every continent; quinoa as a contemporary superfood; Andean textile traditions influencing global fashion; Machu Picchu as Peru\'s primary income source.',
    migration:'The Inca state was a migration-management machine. The mitma system relocated entire communities — typically 1,000 households — from their home region to colonise newly conquered territories, bringing Quechua language and Inca customs to ethnic peripheries while transplanting loyal populations to strategic locations. An estimated 10% of the empire\'s population were mitma colonists living far from their origin communities at any given time. Anti-mitma communities (mitmaqkuna) were conversely transplanted from frontier areas to the imperial heartland to dilute potential resistance. This deliberately scrambled demographic geography — a state-managed migration system of extraordinary scale — is why Quechua today is spoken in communities scattered from Colombia to Argentina, far beyond any natural diffusion.',
   }},
  {id:'cahokia',fp:{mil:5,com:6,art:6,sci:5,reach:4,lon:4},music:{scale:'pentatonic',root:53,tempo:80,timbre:'drum',rhythm:[1,0,1,1,0,0,1,0],reverb:.35,artifact:'Bone flutes found in Mound 34 context; red cedar drum poles of Woodhenge suggesting ritual music; copper repoussé rattles in elite burials; chunkey game accompanied by song'},lon:-90,lat:38,nm:'Cahokia',sb:'Mississippi Valley · 700–1400 CE',x:196,y:203,s:700,e:1400,
   conns:[],
   overview:'Cahokia at its peak around 1050 CE was the largest city north of Mexico — 10,000–20,000 people gathered at the confluence of the Missouri, Illinois, and Mississippi rivers, the greatest inland waterway junction in North America. Monks Mound, its central platform, covers more ground than the Great Pyramid of Giza; Woodhenge\'s cedar posts marked the solstices with calendar precision; the Southeastern Ceremonial Complex spread its iconography across 3 million km² of eastern North America. Then, over the course of a century, the city emptied — from flooding, soil exhaustion, political instability, and possibly disease. By 1400 CE it was abandoned, and by the time Europeans arrived in the Mississippi Valley, the memory of Cahokia had been absorbed into oral tradition. It is the civilisation most thoroughly erased from American historical consciousness, and one of the most actively recovered.',
   d:{
    economy:'Copper, marine shell, and ceremonial objects traded across a network spanning from the Gulf of Mexico to the Great Lakes — the most extensive pre-Columbian trade network in North America, covering over 3 million km².',
    political:'At its peak (c. 1050 CE) Cahokia housed 10,000–20,000 people — larger than contemporary London — governed by a paramount chief of divine status commanding tribute from satellite towns across the Mississippi Valley.',
    art:'Monks Mound covers more ground than the Great Pyramid of Giza; effigy mounds shaped as birds and serpents across Wisconsin; shell gorgets and copper repoussé of refined craftsmanship.',
    literature:'No surviving written record; oral traditions preserved by descendant cultures including the Osage and Natchez encode cosmological narratives that scholars are only beginning to systematically recover.',
    military:'Wooden palisade fortifications surrounding central Cahokia; organised sacrifice at Mound 72 (272 individuals); control of trade network access as the primary instrument of political coercion.',
    science:'Woodhenge — cedar posts functioning as a solar calendar accurately marking solstices and equinoxes; urban planning with a central plaza on astronomical axes; sophisticated water management engineering.',
    medicine:'Skeletal evidence of a well-nourished elite contrasting with nutritional stress in commoner populations — the earliest documented structural health inequality in North America; plant-based healing traditions.',
    religion:'The Southeastern Ceremonial Complex — a shared iconography of the sun, the falcon warrior, and the world tree spanning hundreds of polities across eastern North America.',
    legacy:'North America\'s largest pre-Columbian city, largely absent from mainstream historical narratives; Monks Mound a UNESCO World Heritage site; direct ancestral culture to many surviving Indigenous nations of the American Southeast.',
    gender:'Mound 72\'s "Beaded Burial" — a high-status individual buried on 20,000 shell beads with sacrificed individuals around them — likely male, but accompanied by bundled female remains suggesting complementary gender roles in elite death ritual; the Southeastern Ceremonial Complex\'s female figures suggesting sacred female roles; yet political and military authority appearing male-dominated.',
    slavery:'The mass burials at Mound 72 (272 individuals, many showing signs of sacrifice) — primarily young women aged 15–25 — as evidence of large-scale ritual killing of individuals who may have been enslaved captives, tribute women, or voluntary religious sacrifices; the evidence ambiguous but deeply disturbing.',
    collapse:'Cahokia\'s abandonment (c. 1350 CE) from a combination of flooding, drought, agricultural soil exhaustion from maize monoculture, political instability, and possibly epidemic disease; the city emptied gradually over a century rather than suddenly; yet Mississippian culture continued in smaller centres across the Southeast.',
    trade:'The Mississippian exchange network as North America\'s most extensive commercial system — copper from Lake Superior, marine shell from the Gulf Coast, mica from the Appalachians, and chert from Missouri all converging at Cahokia; the Cahokian influence visible in ceramic and iconographic styles across 3 million km².',
    language:'No writing system; oral traditions preserved by descendant communities (Osage, Ponca, Quapaw, Chickasaw) encoding historical memory of the Cahokian period; linguistic evidence suggesting the Dhegihan Siouan-speaking peoples as the most likely direct descendants.',
    technology:'Monks Mound — 600,000m³ of earth moved without metal tools or draft animals, covering more ground than the Great Pyramid of Giza — as a construction achievement of staggering scale; Woodhenge\'s precise solar alignment; the chunkey game\'s standardised stone discs as evidence of craft specialisation and long-distance exchange.',
    ecology:'Cahokia\'s location at the confluence of the Missouri, Illinois, and Mississippi rivers as an ecological jackpot — the most productive freshwater fishery in North America, rich alluvial soils, and access to diverse ecological zones; yet maize monoculture depleting the alluvial soil and flooding events threatening the low-lying urban core.',
    food:'Maize as the civilisational staple — Cahokia representing the northern limit of reliable maize cultivation, with its agricultural success dependent on warm climate phases; deer, fish, and waterfowl supplementing the diet; the Three Sisters system (corn, beans, squash) providing nutritional completeness; black drink (yaupon holly tea) as the sacred ceremonial beverage.',
    philosophy:'The Southeastern Ceremonial Complex as Cahokia\'s philosophical expression — the solar cross, the falcon warrior (a human-bird transformation being), and the world tree as the three axes of a cosmology connecting sky, earth, and underworld; the chunkey game as a ritual enactment of cosmic order rather than mere entertainment.',
    inequality:'The extreme inequality of the Mound 72 burial — one individual surrounded by thousands of shell beads, copper, and sacrificed attendants — contrasting with the skeletal evidence of nutritional stress and tuberculosis in commoner burials; elite health significantly better than commoner health; yet the monumental construction providing a genuine public infrastructure.',
    diffusion:'The Southeastern Ceremonial Complex\'s iconography spreading across the eastern half of North America as the largest pre-Columbian cultural diffusion north of Mexico; Mississippian political and ceramic traditions influencing societies from the Carolinas to Kansas; Cahokia as the civilisational template for subsequent Natchez, Chickasaw, and Choctaw political organisation.',
    migration:'Cahokia\'s rapid growth between 1050 and 1100 CE — from a modest settlement to the largest city north of Mexico within a generation — required massive in-migration from across the Midwest and South. Archaeological evidence of non-local ceramic styles, exotic materials, and isotopic signatures in human remains all indicate that Cahokia was a pilgrimage and migration destination that pulled people from hundreds of kilometres away. The city\'s abandonment (c. 1350 CE) was equally a migration event: populations dispersing northward, southward, and eastward to found the smaller Mississippian chiefdoms documented by De Soto\'s expedition in 1539. The demographic descendants of Cahokia — the Osage, Ponca, Omaha, and Quapaw nations — are migrations made permanent, their oral traditions preserving fragmented memory of the great city their ancestors built and left.',
   }},
  {id:'aboriginal',fp:{mil:4,com:5,art:8,sci:7,reach:5,lon:10},music:{scale:'pentatonic_minor',root:38,tempo:48,timbre:'didgeridoo',rhythm:[1,0,0,0,0,0,1,0],reverb:.55,artifact:'Yidaki (didgeridoo) — rock art depictions carbon-dated 1,500 years; Arnhem Land cave paintings showing instrument c.1000 CE; clapsticks as rhythmic accompaniment; bullroarer (tjurunga) in ceremony'},lon:133,lat:-25,nm:'Aboriginal Australia',sb:'Sahul · 65,000 BCE – present',x:836,y:400,s:-65000,e:2024,
   conns:['polynesia'],
   overview:'The Aboriginal Australians represent the world\'s oldest continuous civilisation — 65,000 years of unbroken habitation of the Australian continent, managing its entire ecology through firestick farming, maintaining an oral encyclopaedia of navigational, legal, and cosmological knowledge through the Songlines, and developing one of Earth\'s richest artistic traditions in rock engravings, bark painting, and body decoration. The Dreaming is not mythology but a living cosmological framework in which the ancestors who formed the landscape are accessible in the present through ceremony; Country is not property but relational identity. British colonisation from 1788 was the most catastrophic rupture in this dataset after European contact with the Americas — 90% population loss, frontier massacres, dispossession, and the Stolen Generations. Yet 65,000 years of cultural tradition survived, and firestick farming — now recognised as the most sophisticated landscape management system ever devised — is being reintegrated into national fire management policy.',
   d:{
    economy:'The world\'s oldest continuous economic system — a non-accumulative gift and reciprocity economy sustained for 65,000 years, managing continent-scale resources through kinship obligations, ceremonial exchange, and firestick farming.',
    political:'Over 500 distinct nations each with sovereign territorial boundaries, governance by elder councils, and sophisticated inter-nation diplomacy conducted through ceremony, trade routes, and songline networks spanning the continent.',
    art:'The world\'s oldest continuous art tradition — Murujuga rock engravings dating to 40,000 BCE; Arnhem Land bark painting; body decoration encoding cosmological knowledge; Wandjina and Gwion Gwion figures among the oldest figurative art on Earth.',
    literature:'The Songlines — an oral encyclopaedia of navigation, law, ecology, astronomy, and cosmology encoded in sung narratives that map the entire continent. A living library maintained without writing for 65,000 years, the longest literary tradition on Earth.',
    military:'Highly effective guerrilla resistance to British colonisation from 1788; sophisticated inter-clan conflict resolution through ceremony and arbitrated negotiation designed to minimise casualties; territorial defence encoded in ceremonial law.',
    science:'Firestick farming — systematic controlled burning managing vegetation, promoting biodiversity, and preventing catastrophic wildfire — now recognised as the most sophisticated landscape management system ever devised; astronomical knowledge encoded in songlines.',
    medicine:'The world\'s oldest continuous pharmacopoeia: tea tree, eucalyptus, kangaroo apple, and hundreds of other species used for wound treatment, fever, respiratory illness, and pain — many now validated by modern biochemistry.',
    religion:'The Dreaming — a cosmological framework in which creation, law, ecology, and individual identity are unified in a single ontological system. Not mythology but living reality: ancestors whose journeys formed the land are accessible in the present.',
    legacy:'The world\'s longest continuous civilisation at 65,000 years; firestick farming now informing global wildfire management; Indigenous astronomical knowledge being integrated into modern astrophysics; 250+ surviving language groups.',
    gender:'Gender roles in Aboriginal Australia varied enormously across 500+ nations but were typically complementary rather than hierarchical — women\'s gatherer knowledge (70–80% of food) as economically dominant; women\'s sacred ceremonies and restricted knowledge as parallel to men\'s; the explicitly gendered structure of the Dreaming as a cosmological recognition of complementary power.',
    slavery:'No institutionalised slavery in Aboriginal Australian society — the gift economy and kinship obligation system ensuring resource sharing without coercive extraction; the British colonial period introducing a de facto slavery of "apprenticed" Aboriginal workers (especially in the pastoral industry) paid in rations rather than wages until the 1960s.',
    collapse:'The British invasion (1788) as the most catastrophic civilisational collapse in this dataset — 90% population loss from introduced disease, direct killing, and starvation within a century; the Stolen Generations (1910–1970) deliberately removing children to destroy cultural transmission; yet 65,000 years of cultural continuity survived.',
    trade:'The 10,000km exchange network documented by colonists before they destroyed it — ochre from the Flinders Ranges moving to coastal Queensland; pearl shells from the Kimberley reaching South Australia; baler shells travelling 2,000km inland; all governed by ceremonial obligation rather than market exchange.',
    language:'The greatest linguistic diversity outside New Guinea — 250+ distinct languages in Australia at contact, falling into perhaps 30 language families; the Pama-Nyungan family covering 90% of the continent; most languages now critically endangered, with fewer than 100 active speakers; the Australian Institute of Aboriginal and Torres Strait Islander Studies working to preserve and revive them.',
    technology:'The boomerang (returning and non-returning types) as aerodynamic engineering; the woomera (spear-thrower) doubling effective spear range; firestick farming as ecological management technology of continental scale; fish traps at Brewarrina (c. 40,000 years old) as possibly the world\'s oldest human construction.',
    ecology:'Firestick farming as the world\'s most sophisticated landscape management system — creating mosaic habitats increasing biodiversity, reducing catastrophic wildfire risk, and managing animal movement for hunting; the entire Australian landscape that European settlers called "natural" was in fact actively managed cultural landscape.',
    food:'One of the world\'s richest wild food systems — 5,000+ plant species used, 500+ animal species hunted, with nutritional diversity and food security exceeding contemporary agricultural systems in many environments; macadamia nuts, wattle seed, quandong, and bush tomato as recent commercial exports from a 65,000-year food tradition.',
    philosophy:'The Dreaming as the most radical alternative to Western philosophy — a metaphysics in which time is not linear but coextensive, the past accessible in the present through ceremony; country as not a resource but a relational identity; obligation to land as the primary ethical category rather than ownership.',
    inequality:'Kinship systems encoding elaborate reciprocal obligations that distributed resources across the community; ritual status as the primary social hierarchy, accessible through knowledge and ceremony rather than birth; colonial introduction of cash economy and property law as the most devastating inequality-creating event in Aboriginal history.',
    diffusion:'Aboriginal Australians remained substantially isolated for 50,000 years — making their independent intellectual, technological, and ecological achievements the cleanest test case in history of human civilisational capacity in isolation; firestick farming now being integrated into global wildfire management; Dreamtime art influencing modernist painters including Margaret Preston.',
    migration:'Aboriginal Australian migration is the oldest in this entire dataset — the initial peopling of the continent from Southeast Asia across the Sahul land bridge approximately 65,000 years ago, the first time modern humans crossed a significant body of open water. This founding migration required watercraft and planning, making it the earliest documented sea voyage in human history. Within Australia, Aboriginal peoples were not static: songlines encoded migration routes connecting communities across the continent, trade networks moved objects 2,000km from their origin, and seasonal movement between resource patches was the fundamental economic rhythm. Colonial dispossession (1788 onward) created forced migration — communities driven off their country into missions, reserves, and urban fringes — while the Stolen Generations programme forcibly migrated children away from family and culture.',
   }},
  {id:'polynesia',fp:{mil:5,com:6,art:7,sci:8,reach:9,lon:8},music:{scale:'pentatonic',root:57,tempo:76,timbre:'panpipe',rhythm:[1,0,1,0,1,1,0,0],reverb:.4,artifact:'Pahu (sharkskin drum) from Hawaii/Tahiti — temple instrument; putorino (combined trumpet-flute) from Maori tradition; nose flute documented across Polynesia; log-drum signalling between islands'},lon:-170,lat:-15,nm:'Polynesian Civilizations',sb:'Pacific Ocean · 1500 BCE – present',x:900,y:330,s:-1500,e:2024,
   conns:['aboriginal','maya'],
   overview:'The settlement of Polynesia was humanity\'s last great migration and its most technically demanding: intentional open-ocean voyaging across 25 million km² of Pacific with no instruments, using star paths, ocean swell patterns, cloud formations, bird behaviour, and phosphorescence to navigate between islands separated by thousands of kilometres. Between roughly 1500 BCE and 1300 CE, Polynesian voyagers settled every habitable island in the Pacific, from Hawaii to New Zealand to Easter Island — completing the peopling of every landmass on Earth. Easter Island\'s moai, Hawaii\'s feathered cloaks, and Maori tā moko tattooing represent a single cultural tradition adapted to radically different island ecologies. The independent invention of zero is one of history\'s rarest intellectual events; the Polynesian wayfinding tradition is its maritime equivalent — a cognitive achievement of comparable rarity and magnitude.',
   d:{
    economy:'A maritime exchange network spanning 25 million km² of ocean — the largest interaction sphere in the pre-Columbian world — trading obsidian, adze stone, red feathers, and prestige goods across thousands of kilometres of open Pacific.',
    political:'Chiefdom systems of varying complexity from Hawaii\'s divine ali\'i nui monarchy to the egalitarian councils of Tuvalu; the mana concept binding political authority, spiritual power, and social status in a single framework.',
    art:'The feathered cloaks (ahu\'ula) of Hawaii requiring thousands of birds over generations; Maori tā moko facial tattooing encoding genealogy; Easter Island\'s 900 moai — monolithic ancestor figures up to 21 metres tall moved without wheels.',
    literature:'Oral navigation traditions encoding star paths, swell patterns, and wind signatures for 2,000km voyages; Hawaiian chant (mele) preserving 2,000 years of genealogy; Maori whakapapa (genealogical recitation) as historical archive.',
    military:'Inter-island raiding and territorial warfare using sophisticated wooden weapons and shock tactics; the Maori pa (fortified hilltop settlement) among the most sophisticated pre-gunpowder defensive architecture in the world.',
    science:'Wayfinding navigation using star compasses, wave piloting, cloud formation reading, and bird behaviour to achieve intentional trans-Pacific voyages of 4,000km — the greatest feat of non-instrument navigation in human history.',
    medicine:'Traditional medicine (rongoā Māori, la\'au lapa\'au) integrating plant pharmacology, massage, prayer, and spiritual healing; identification of anti-inflammatory and antimicrobial plants now under active pharmaceutical investigation.',
    religion:'A pantheon shaped by the ocean: Tangaroa (sea), Tāne (forest), Tū (war), Rongo (agriculture); the sacred (tapu) and profane (noa) distinction structuring all social and ecological relations; ancestor veneration as ongoing relationship.',
    legacy:'The settlement of the Pacific — humanity\'s final great migration, completing the peopling of every habitable landmass on Earth by 1300 CE; Polynesian wayfinding now informing GPS-free navigation research; living cultures across 1,000 islands.',
    gender:'High-ranking Polynesian women wielded genuine political authority — the kapu (Hawaiian taboo) system encoding female sacred power; female chiefs (ariki wahine in Maori, chiefesses in Hawaii) presiding over ritual and sometimes political decisions; yet the most sacred ritual spaces were gender-segregated, with women excluded from certain ceremonies.',
    slavery:'Captured warriors reduced to slave status (tūtūā in Hawaiian, mōkū in Maori) in a society where status was the supreme value — the contrast between the ali\'i (sacred chief) and the slave as the fundamental social polarity; human sacrifice of slaves and prisoners in major ritual contexts.',
    collapse:'Easter Island (Rapa Nui) as the most studied civilisational collapse in this dataset — deforestation for moai transport and agricultural land eliminating the palm forest that enabled ocean voyaging, followed by clan warfare and population crash; now contested as partly a European disease and colonial exploitation narrative.',
