    literature:'The Hattusa archive preserves the first written Indo-European language; mythological texts including the Song of Kumarbi directly influencing Greek Theogony; diplomatic correspondence with Egypt, Babylon, and Assyria.',
    military:'The war chariot used as a mobile firing platform with three-man crews — a tactical innovation adopted by every subsequent Near Eastern military; the world\'s first recorded chariot battle at Kadesh (1274 BCE) involving 5,000 chariots.',
    science:'Advanced metallurgical knowledge of iron smelting; sophisticated hydraulic engineering in the Hittite capital; astronomical observation serving the religious calendar; legal texts documenting a comprehensive civil and criminal code.',
    medicine:'Medical texts prescribing treatments for wounds, fever, and disease; ritual purification texts blending medical and religious practice; military field medicine supporting large chariot armies in extended campaigns.',
    religion:'A thousand-deity pantheon incorporating the gods of every conquered people — the Hittites called themselves the people of a thousand gods; storm god Teshub as chief deity; elaborate state rituals conducted by the king as chief priest.',
    legacy:'The Treaty of Kadesh as the template for all subsequent international diplomacy; iron metallurgy diffusing from Anatolia into Europe and Africa after the empire\'s collapse; the Hittite language as the key to deciphering the Indo-European linguistic family.',
    gender:'The Hittite queen (tawananna) as one of the ancient world\'s most powerful royal women — maintaining her title for life, outlasting her husband\'s death, and wielding religious authority over the entire kingdom; Queen Puduhepa negotiating directly with Ramesses II as a named signatory to the Treaty of Kadesh — the only woman in the ancient world to sign an international peace treaty.',
    slavery:'The Hittite law code treating enslaved people with comparative leniency — lower fines for crimes against slaves than Egyptian or Mesopotamian contemporaries, reflecting the Hittite tendency to incorporate conquered peoples as productive subjects rather than chattel property.',
    collapse:'The Late Bronze Age Collapse (c. 1200 BCE) ending the Hittite Empire catastrophically — the capital Hattusa burned and abandoned within years; the cause(s) debated among drought, earthquake, Sea People invasion, internal rebellion, and trade network disruption; one of history\'s most dramatic sudden civilisational endings.',
    trade:'Iron as the Hittites\' supreme strategic trade commodity — jealously guarded and sparingly exported; tin for bronze from Afghanistan via intermediaries; silver from Anatolian mines; the Hittite Empire\'s position astride the Anatolia-Levant trade corridor enabling commercial as well as military dominance.',
    language:'Hittite as the oldest attested Indo-European language (c. 1750 BCE) — its decipherment by Bedřich Hrozný (1915) revolutionising understanding of the Indo-European language family; cuneiform borrowed from Mesopotamia for an entirely unrelated language group; the Hattusa archive as the rosetta stone of Bronze Age Anatolian history.',
    technology:'Iron smelting as the Hittites\' defining technological advantage — iron weapons and tools providing military and agricultural superiority over bronze; the war chariot with three-man crew as a tactical innovation; siege engineering capable of taking cities like Babylon.',
    ecology:'The Anatolian plateau\'s climatic vulnerability — dependent on seasonal rainfall for agriculture, subject to periodic drought; the Bronze Age Collapse\'s climatic dimension (evidence of a 300-year drought in the eastern Mediterranean c. 1200 BCE) as potentially the primary cause of Hittite collapse.',
    food:'Wheat, barley, legumes, and viticulture as the agricultural foundation; the Hittite ritual texts documenting an extraordinary variety of breads, beverages, and feast foods for religious ceremonies; deer and wild boar hunting as elite activities documented in royal archives.',
    philosophy:'The Hittite Apology of Hattusili III (c. 1275 BCE) as one of antiquity\'s first personal political autobiographies — a king justifying his usurpation of the throne through divine favour; Hittite prayer texts expressing a personal relationship with the gods of remarkable psychological intimacy.',
    inequality:'The Hittite law code\'s explicit distinction between free person and slave, and between noble and commoner, in assigning penalties; yet the code\'s relative leniency compared to Mesopotamian contemporaries suggesting a somewhat less extreme legal hierarchy.',
    diffusion:'The Treaty of Kadesh as the model for all subsequent international diplomacy; iron metallurgy diffusing from Anatolia across the Near East, Mediterranean, and into Europe and Africa after the empire\'s collapse — the Bronze Age to Iron Age transition largely triggered by Hittite knowledge diffusion after 1200 BCE.',
    migration:'The Hittites were Indo-European migrants who arrived in Anatolia around 2000 BCE, absorbing the indigenous Hattian population whose language and religious traditions they largely preserved. The Hittite state managed migration actively: conquered populations were relocated to new territories as agricultural colonists; specialist craftsmen (particularly in metalworking) were transferred from conquered cities to the capital Hattusa. The Bronze Age Collapse (c. 1200 BCE) triggered a massive outward migration of former Hittite subjects — the Sea Peoples\' movement across the eastern Mediterranean, including Anatolian groups, destabilising Egypt and destroying the Levantine city-states in one of the ancient world\'s great migration-driven catastrophes.',
   }},
  {id:'phoenicians',fp:{mil:5,com:10,art:6,sci:7,reach:9,lon:7},music:{scale:'phrygian',root:62,tempo:78,timbre:'pluck',rhythm:[1,0,1,0,1,0,1,0],reverb:.3,artifact:'Kinnor (lyre) documented in Levantine contexts — ancestor of Greek kithara; aulos spread through Phoenician Mediterranean trade networks; kithara depicted on Byblos ivories'},lon:35,lat:34,nm:'Phoenicians',sb:'Levant & Mediterranean · 1500–332 BCE',x:516,y:174,s:-1500,e:-332,
   conns:['egypt','greece','carthage','mesopotamia'],
   overview:'The Phoenicians were the ancient Mediterranean\'s master traders and the most consequential cultural transmitters in history — not because of what they invented, but because of what they gave away. The 22-letter alphabet they developed from earlier Semitic scripts and spread throughout the Mediterranean was adopted by the Greeks, who added vowels; the Greeks gave it to the Romans; the Romans spread it across Europe; and through these paths, the Phoenician alphabet is the ancestor of virtually every writing system used in the Western world today, and through Arabic, of vast portions of the Eastern world. Their commercial network extended from Britain (for tin) to the Red Sea; their colonies included Carthage, which outlasted Phoenicia itself. Tyre and Sidon were conquered by Assyria, Babylon, and Alexander in succession, but the alphabet was already beyond conquest.',
   d:{
    economy:'The Mediterranean\'s master traders — purple dye (Tyrian purple, worth more than gold), cedar timber, glass, and metalwork exchanged across a maritime network from Lebanon to Spain; the first systematic international commercial culture.',
    political:'A confederation of independent city-states — Tyre, Sidon, Byblos — with no unifying empire, bound instead by shared commercial culture, religious practice, and the Phoenician alphabet; a model of mercantile republicanism.',
    art:'Ivory carving of extraordinary delicacy exported across the Mediterranean; Phoenician glass production; the purple-dyed textiles worn only by royalty; architectural contributions to Solomon\'s Temple in Jerusalem.',
    literature:'The 22-letter Phoenician alphabet — the single most consequential intellectual invention in human history, ancestor of Greek, Latin, Arabic, Hebrew, and through them virtually every writing system used today.',
    military:'Naval supremacy in the Mediterranean for centuries; the trireme warship design adopted by Greece and Rome; the founding of Carthage and dozens of colonies from Spain to North Africa as strategic commercial outposts.',
    science:'Navigational astronomy enabling open-sea Mediterranean voyaging; glass-blowing technology; purple dye extraction from Murex sea snails at industrial scale; cedar shipbuilding engineering of the highest quality.',
    medicine:'Medical traditions inherited from Egyptian and Mesopotamian sources; pharmacological knowledge of Levantine plant species; the port cities of Tyre and Sidon as conduits for medical knowledge exchange across the Mediterranean.',
    religion:'Worship of Baal, Astarte, and Melqart — deities whose attributes were absorbed into Greek religion (Zeus, Aphrodite, Heracles respectively); the practice of child sacrifice at tophets documented archaeologically across Phoenician colonies.',
    legacy:'The alphabet used by four billion people today; Byblos giving its name to the Bible (the city was the world\'s greatest book-exporting port); Phoenician purple dye establishing the association of purple with royalty that persists in ceremonial dress worldwide.',
    gender:'Phoenician women engaged in trade and commercial activity alongside men; the goddess Astarte (love and war) as the supreme female deity reflecting cultural acknowledgment of female power; the Dido/Elissa founding narrative of Carthage as a culturally resonant story of female leadership and independence.',
    slavery:'Phoenician involvement in the Mediterranean slave trade — enslaved prisoners from raids and commerce transiting through Phoenician trading cities; the Hebrew Bible documenting Phoenician slave-trading in Gaza and Edom; Tyre and Sidon as major slave markets in the ancient Levant.',
    collapse:'The Assyrian conquest of Tyre and Sidon (701–664 BCE); the Babylonian siege of Tyre (587–574 BCE); Alexander\'s destruction of Tyre (332 BCE, building a causeway to the island city after a 7-month siege) — yet Phoenician cultural identity survived through Carthage and the diaspora communities across the Mediterranean.',
    trade:'The Phoenicians as the ancient Mediterranean\'s most mobile commercial culture — purple dye, glass, cedar, and metalwork traded across a network from Britain to the Red Sea; the circumnavigation of Africa commissioned by Pharaoh Necho (c. 600 BCE) and achieved by a Phoenician crew, reported by Herodotus as implausible because the sun appeared on their right (i.e., north) — which is exactly what circumnavigation would produce.',
    language:'The 22-letter Phoenician alphabet as the single most consequential intellectual invention — adopted by the Greeks (who added vowels), transmitted to the Romans (Latin alphabet), separately adopted into Aramaic (ancestor of Arabic and Hebrew), and through these into virtually every writing system on Earth; the gift that enables this sentence.',
    technology:'The trireme warship as a Phoenician contribution to Mediterranean naval technology; glass-blowing (possibly Phoenician invention); purple dye extraction from Murex trunculus at industrial scale; the first standardised deep-sea trading vessels capable of open-Mediterranean voyaging.',
    ecology:'The Lebanese cedar forests as Phoenicia\'s ecological foundation and commercial resource — providing the timber for Egyptian temples, Israelite palaces, and Phoenician ships; the systematic logging of Lebanon\'s cedar forests over 3,000 years of Phoenician and subsequent export leaving the landscape largely deforested.',
    food:'Purple-dyed delicacies for elite consumption; wine and olive oil as commercial staples; the Phoenician introduction of grape and olive cultivation to the western Mediterranean through colonial settlement; garum production as an industrial food technology transmitted to Rome.',
    philosophy:'Phoenician philosophical tradition largely inaccessible — the practical commercial culture leaving few theoretical texts; Sanchuniathon\'s Phoenician History (known only through Greek quotation) suggesting a sophisticated cosmological tradition; the practical ethics of honourable dealing encoded in commercial law.',
    inequality:'The merchant oligarchies of Tyre and Sidon as commercial aristocracies; the ba\'al (owner/lord) class controlling land and maritime capital; yet the commercial culture enabling social mobility through mercantile success to a degree unusual in the ancient world.',
    diffusion:'The alphabet as Phoenicia\'s supreme diffusion event — arguably the single most consequential cultural transmission in human history; the vine and olive transmitted to the western Mediterranean through Phoenician colonisation; Astarte/Aphrodite/Venus as a deity transmission from the Levant into Greek and Roman religion.',
    migration:'The Phoenicians were history\'s great voluntary migration people — trading cities with no agricultural hinterland, compelled by ecology to project their population outward across the Mediterranean. Between 1000 and 500 BCE they founded Carthage, Utica, Lixus (Morocco), Gadir (Cádiz), Panormus (Palermo), and over 30 other colonies — the most ambitious voluntary migration program in the ancient world before Greek colonisation. Phoenician merchant families created diaspora communities in every major Mediterranean port, maintaining cultural identity across generations of settlement. Their ships circumnavigating Africa (c. 600 BCE) were perhaps the most distant voluntary migration event in the ancient world — an Atlantic and Indian Ocean journey completed by a Mediterranean people.',
   }},
  {id:'minoans',fp:{mil:4,com:8,art:9,sci:5,reach:6,lon:5},music:{scale:'dorian',root:57,tempo:70,timbre:'pluck',rhythm:[1,0,0,1,1,0,1,0],reverb:.4,artifact:'Lute-player fresco from Akrotiri, Thera (c.1600 BCE); faience figurines with lyres from Knossos palace; bull-rhyton ritual vessels suggest ceremonial music'},lon:25,lat:35,nm:'Minoan Civilization',sb:'Crete · 2700–1100 BCE',x:503,y:174,s:-2700,e:-1100,
   conns:['egypt','greece','phoenicians'],
   overview:'The Minoan civilisation of Crete was Europe\'s first — a palace-based culture of trading cities that flourished from 2700 to 1450 BCE, connecting Egypt, the Levant, and the Aegean in a commercial web funded by olive oil and wine. Its art is among the ancient world\'s most alive: the frescoes of Akrotiri — dolphins leaping, women in procession, boys boxing — have a naturalistic energy that Greek art would not match for another thousand years. The Minoans apparently governed without the monumental military iconography of all their contemporaries: no battle scenes, no warrior kings, no weapons caches in the palace stores. Linear A, their undeciphered script, may eventually reveal a literary and philosophical tradition to match their art; until then, the Minoan voice remains one of history\'s great silences. Their culture was absorbed by the Mycenaean Greeks after 1450 BCE, passing the script (as Linear B) and much religious iconography forward.',
   d:{
    economy:'Europe\'s first palace economy — redistributive storage and allocation of olive oil, wine, grain, and textiles administered from the great palaces at Knossos, Phaistos, and Akrotiri, trading across the eastern Mediterranean.',
    political:'Europe\'s first urban civilisation, apparently governed without the monumental militarism of Near Eastern contemporaries — no city walls, no weapons caches, no battle scenes in art — suggesting a uniquely peaceful palatial administration.',
    art:'The Minoan frescoes of Knossos and Akrotiri — the first naturalistic figural painting in Europe, depicting dolphins, bulls, lilies, and acrobats with a fluid vitality utterly unlike Egyptian or Near Eastern contemporaries.',
    literature:'Linear A script (still undeciphered) and the later Linear B (earliest written Greek) — the former possibly encoding an entire administrative and literary tradition locked from modern scholarship.',
    military:'The thalassocracy (sea power) model — domination through naval control of Aegean trade routes rather than land armies; the absence of fortifications suggesting either exceptional security or a cultural rejection of martial display.',
    science:'Multi-story palace construction with light wells, running water, flush toilets, and drainage systems at Knossos — sanitation infrastructure not seen again in Europe until the 19th century.',
    medicine:'Evidence of herbal medicine and surgical practice; athletic culture (bull-leaping) suggesting sophisticated physical conditioning knowledge; the palace complexes incorporating spaces that may have functioned as healing sanctuaries.',
    religion:'The bull as sacred animal (Minotaur myth); snake goddess figurines; goddess-centred religious iconography unique in the ancient world; possible female priestly authority in religious ceremonies.',
    legacy:'The Theseus-Minotaur myth encoding cultural memory of Minoan civilisation; Linear B as the ancestor of the Greek alphabet and through it all Western writing; Minoan frescoes as the template for Aegean Bronze Age art that shaped classical Greece.',
    gender:'Minoan art\'s consistent depiction of women in prominent ritual roles — the snake goddess figurines, the female officiants at bull-leaping, the priestesses in fresco processions — suggesting either female religious authority or a goddess-centred religious system unique in the ancient world; the apparent absence of male warrior iconography in palace art.',
    slavery:'The Linear B tablets (later Mycenaean, probably inheriting Minoan administrative practices) documenting enslaved women (do-e-ra) working in textile production — palace textile workshops powered by female enslaved labour as the economic foundation of Aegean palatial economy.',
    collapse:'The Minoan collapse (c. 1450 BCE) from the Thera volcanic eruption (c. 1628 BCE, creating the world\'s largest tsunami in the last 10,000 years), Mycenaean conquest, and the general Late Bronze Age Collapse — yet Minoan cultural practices (fresco styles, religious iconography, Linear script) were absorbed and transmitted by the Mycenaean Greeks.',
    trade:'The Minoan thalassocracy — a maritime trading empire connecting Egypt, the Levant, Anatolia, Greece, and the western Mediterranean; Minoan pottery and goods found from Spain to the Levant; the palace storage magazines at Knossos holding industrial quantities of olive oil, wine, and grain for redistribution.',
    language:'Linear A (Minoan, undeciphered) as one of the last great mysteries of ancient writing; Linear B (Mycenaean Greek, deciphered by Michael Ventris 1952) providing a window into the administrative language of the later palace period; the decipherment of Linear A would potentially unlock an entire civilisational voice.',
    technology:'Multi-story palace construction (Knossos had four stories); flush toilets and drainage systems at 1700 BCE; the corbelled drain; fresco painting technique of sophistication not seen again in Europe until the Renaissance; the stone vase as a Minoan art form of extraordinary technical ambition.',
    ecology:'Crete\'s position at the centre of the eastern Mediterranean as the ecological basis of Minoan commercial power; olive oil and wine as the commercial products of Crete\'s Mediterranean climate; the possible role of climate change and the Thera eruption in disrupting the agricultural and commercial system supporting palatial culture.',
    food:'Olive oil as both dietary staple and commercial product — the Linear B tablets documenting industrial-scale olive oil production and storage; wine, figs, grain, and seafood completing a Mediterranean diet; the palace magazines at Knossos holding enough food to feed thousands, revealing the redistributive economic system.',
    philosophy:'The bull as a sacred figure — bull-leaping as a ritual practice, the Minotaur myth preserving a cultural memory — suggesting a nature-based religion centred on the power and danger of wild animals; the Minoan aesthetic\'s consistent naturalism (dolphins, lilies, birds) as a philosophical statement about the beauty of the natural world.',
    inequality:'The palace centres at Knossos and Phaistos controlling the redistribution of agricultural surplus — a palatial economy with significant wealth concentration; yet the apparent absence of military iconography and fortification walls suggesting either exceptional social peace or an elite that legitimated itself through religious rather than military authority.',
    diffusion:'Minoan fresco techniques transmitted to Mycenaean Greece and through them to later Greek art; the bull-leaping tradition possibly influencing the Iberian bullfighting tradition through Phoenician intermediaries; Linear A as the predecessor to Linear B and through it the Greek alphabet; Minoan goddess traditions feeding into Greek religious practice.',
    migration:'Minoan Crete was a migration hub at the intersection of Egyptian, Levantine, and Aegean worlds. The Minoans\' origins remain debated — genetic evidence suggests a Near Eastern population migration to Crete around 7000 BCE, mixing with earlier Anatolian Neolithic farmers. Minoan traders and perhaps settlers created communities across the Aegean — at Akrotiri (Thera), Miletus, and possibly Cyprus. The volcanic destruction of Thera (c. 1628 BCE) created refugees who may have migrated to Crete and mainland Greece. Mycenaean migration into Crete after 1450 BCE transformed the island — Linear B tablets showing Greek-speaking administrators replacing Minoan ones suggests a demographic takeover, possibly through elite migration rather than mass population replacement.',
   }},
  {id:'etruscans',fp:{mil:6,com:7,art:8,sci:5,reach:4,lon:5},music:{scale:'mixolydian',root:55,tempo:84,timbre:'flute',rhythm:[1,1,0,1,0,1,0,1],reverb:.25,artifact:'Tibia (aulos-type) depicted in Etruscan tomb paintings at Tarquinia (c.500 BCE); elaborately carved bone flutes from Etruscan graves; fresco musicians at festive banquets'},lon:11,lat:43,nm:'Etruscans',sb:'Central Italy · 900–264 BCE',x:450,y:158,s:-900,e:-264,
   conns:['rome','greece','phoenicians'],
   overview:'The Etruscans were Rome\'s teachers — the civilisation that occupied central Italy from roughly 900 to 264 BCE, from whose cultural vocabulary Rome built its republic, its architecture, its religious practice, and its symbols of state. The fasces, the triumph, the toga, the gladiatorial games, the arch, the Cloaca Maxima, and the Roman Republic\'s constitutional structure all arrived in Rome from Etruria. Yet Etruscan civilisation is one of antiquity\'s least understood, because their language — though written in an adapted Greek alphabet — remains substantially undeciphered, isolating it from all known language families. The Etruscans were also the ancient Mediterranean\'s most gender-equal elite culture: their tomb paintings show women reclining at banquets alongside men, receiving education, and conducting commerce — a freedom so anomalous that both Greek and Roman observers recorded it with barely concealed horror.',
   d:{
    economy:'The richest iron and copper deposits in the western Mediterranean made Etruria a commercial powerhouse — metal exports to Greece and Carthage funding urban development and artistic patronage of the highest quality.',
    political:'A confederation of 12 city-states (the Etruscan League) with elected magistrates, popular assemblies, and legal codes — the direct institutional model from which Rome\'s Republic was constructed after the expulsion of Etruscan kings.',
    art:'Vibrant tomb paintings at Tarquinia depicting feasting, music, and athletics with an exuberance and naturalism Rome never quite matched; bronze sculpture of great sophistication; terracotta architectural decoration of extraordinary vivacity.',
    literature:'Etruscan remains the only major ancient Mediterranean language still substantially undeciphered; the Liber Linteus (linen book) wrapped around an Egyptian mummy is the longest surviving Etruscan text.',
    military:'The hoplite phalanx transmitted to Rome through the Etruscans; Roman military symbols (the fasces, the triumph, the eagle standard) were all Etruscan; the engineering of Rome\'s first city walls.',
    science:'Sophisticated hydraulic engineering — drainage of the Roman Forum swamp, construction of the Cloaca Maxima — was Etruscan engineering adopted by Rome; architectural innovation in arch and vault construction.',
    medicine:'Etruscan dentistry — gold dental bridges found in archaeological sites represent the most sophisticated dental prosthetics in the ancient world before modern times; liver divination (haruspicy) as the primary form of medical-religious diagnosis.',
    religion:'Haruspicy — reading the liver of sacrificed animals for divine guidance — adopted wholesale by Rome as an official state religious practice; the Etrusca Disciplina as a comprehensive religious legal code governing all aspects of civic ritual.',
    legacy:'Rome\'s founding institutions — the republic, the fasces, the triumph, the arch, the Cloaca Maxima, gladiatorial games — were all inherited from Etruria; Etruscan undecipherability representing one of the great unresolved mysteries of classical studies.',
    gender:'The most gender-egalitarian elite culture in the ancient Mediterranean — Etruscan tomb paintings showing women reclining alongside men at banquets (scandalous to Greek and Roman visitors), women attending public games, receiving education, and conducting business; Greek and Roman authors\' horror at Etruscan female freedom as primary evidence of how anomalous it was.',
    slavery:'The Etruscan economy dependent on enslaved labour in mines, agriculture, and domestic service; enslaved people from raids on coastal communities and from purchase in the Mediterranean slave market; the freed slave (libertus) able to acquire full civic rights within a generation — a more liberal manumission tradition than Roman practice.',
    collapse:'Roman conquest absorbing the Etruscan city-states one by one (Veii 396 BCE, Volsinii 265 BCE) — not a sudden collapse but a 200-year absorption; Etruscan culture persisting as a substratum within Roman civilisation, its language surviving until the 1st century CE; the Etruscan aristocracy fully integrating into the Roman senatorial class.',
    trade:'The richest iron and copper deposits in the western Mediterranean (Elba island iron, Populonia copper) as Etruria\'s commercial foundation; the Etruscan commercial network extending to Greece, Carthage, and Gaul; the Po Valley as the northern extension of Etruscan commercial and cultural reach.',
    language:'Etruscan as the major undeciphered ancient Mediterranean language — the Liber Linteus on an Egyptian mummy as the longest surviving text; isolated from all known language families, possibly a pre-Indo-European survivor; hundreds of inscriptions exist but the full grammar and vocabulary remain elusive.',
    technology:'The arch, vault, and tunnel technique transmitted to Rome; the Cloaca Maxima sewer system; sophisticated bronze casting including the Capitoline Wolf; the toga as an Etruscan garment adopted by Rome; the fasces (bundle of rods with axe) as an Etruscan symbol of magisterial authority adopted as Rome\'s supreme political emblem.',
    ecology:'The Etruscans as sophisticated land managers — the cuniculi (underground drainage channels) transforming the wet Campagna into productive farmland; the Etruscan agricultural tradition that Rome inherited and expanded across the Mediterranean; systematic deforestation of the Apennine slopes for shipbuilding and agriculture.',
    food:'The Etruscans as Rome\'s agricultural teachers — introducing sophisticated viticulture, olive cultivation, and grain farming to the Italian peninsula; the painted tomb banqueting scenes as a window into elite Etruscan food culture; spelt wheat as the Etruscan dietary foundation.',
    philosophy:'The Etrusca Disciplina — a comprehensive religious-philosophical system governing the interpretation of omens, the foundation of cities, and the conduct of all civic ritual — as the Etruscans\' most systematic intellectual contribution; haruspicy (liver reading) as a philosophical system for determining divine will.',
    inequality:'A wealthy merchant aristocracy funding the tomb paintings that survive as Etruria\'s primary historical record; the Etruscan lucumo (king/noble) class as a hereditary elite; yet the relative freedom of Etruscan women suggesting a less extreme social hierarchy than contemporary Greek or Near Eastern societies.',
    diffusion:'The fasces (now the origin of "fascism"), the toga, the triumph, the gladiatorial games, and the arch transmitted to Rome and through Rome to the entire Western world; Etruscan religious practices embedded in Roman augury and haruspicy; the Etruscan alphabet as the ancestor of the Latin alphabet.',
    migration:'The Etruscan origin question — whether indigenous Italian (the \'autochthonous\' theory) or migrants from Lydia (Herodotus\' claim) — was one of antiquity\'s great debates and remains unresolved. Ancient DNA analysis suggests a Near Eastern genetic component supporting partial migration origins around 900 BCE. The Etruscans\' own migration was primarily commercial and political: Etruscan settlements extended into the Po Valley and Campania, creating a cultural zone far beyond Etruria proper. The gradual absorption of Etruscan cities by Rome was accompanied by elite migration — Etruscan noble families moving to Rome and assimilating, their names becoming Latin, their culture absorbed into the Roman mainstream. The last inscriptions in Etruscan date to the 1st century CE, after which the Etruscan people had migrated into Roman identity.',
   }},
  {id:'celts',fp:{mil:7,com:6,art:8,sci:5,reach:7,lon:5},music:{scale:'celtic',root:62,tempo:80,timbre:'pluck',rhythm:[1,0,1,1,0,1,0,0],reverb:.35,artifact:'Carnyx (bronze boar-headed war trumpet) — Deskford example, Scotland (80–250 CE); lyre fragments from Iron Age contexts; Strabo records Celtic poetic-musical tradition'},lon:2,lat:48,nm:'Celtic World',sb:'Europe · 800–50 BCE',x:413,y:103,s:-800,e:-50,
   conns:['rome','norse','greece'],
   overview:'For five centuries before Caesar\'s Gallic Wars, Celtic-speaking peoples occupied most of Europe from the British Isles to Anatolia — a cultural zone united not by political empire but by shared religious practice, artistic tradition, and warrior aristocracy. The druids, who required twenty years of training to memorise the entire oral philosophical and legal corpus, were the pan-Celtic institution that maintained cultural coherence across tribal boundaries without ever unifying into a state. Roman conquest absorbed the continental Celts; the Atlantic periphery (Ireland, Scotland, Wales, Brittany) preserved Celtic languages that are still spoken today, the most endangered major language family in Europe. Halloween, May Day, and midsummer celebrations are the everyday debris of a two-thousand-year-old ritual calendar.',
   d:{
    economy:'Iron technology enabling agricultural intensification across northern Europe; the oppidum (proto-urban trading centre) as the Celtic commercial hub; long-distance exchange networks for amber, tin, furs, and slaves connecting the Atlantic to the Mediterranean.',
    political:'Tribal confederacies governed by warrior aristocracies; the druidic order serving simultaneously as judges, priests, historians, and political arbiters across tribal boundaries — a pan-Celtic institution without political parallel.',
    art:'La Tène curvilinear metalwork — the most sophisticated decorative metal tradition in prehistoric Europe; the Gundestrup Cauldron; torcs of twisted gold worn by warriors; illuminated manuscript tradition culminating in the Book of Kells.',
    literature:'An entirely oral tradition maintained by druids who memorised encyclopaedic knowledge over 20 years of training; Irish and Welsh medieval literature preserving pre-Christian mythological cycles of extraordinary richness.',
    military:'The shock charge tactic of naked warriors painted in woad; chariot warfare in Britain; Celtic mercenaries serving across the Mediterranean from Spain to Anatolia; the sacking of Rome (390 BCE) and Delphi (279 BCE).',
    science:'Advanced iron smelting and agricultural technology; calendrical knowledge preserved in the Coligny Calendar; sophisticated engineering of hillforts, oppida, and the earliest road networks in northern Europe.',
    medicine:'Druidic herbal medicine of great sophistication; mistletoe as a sacred healing plant (Pliny documents its harvesting ritual); Celtic surgical practice documented in skeletal evidence of healed traumatic injuries.',
    religion:'The druids as the most powerful religious institution in pre-Roman Europe; the otherworld (Tír na nÓg) as a parallel realm more real than the visible world; the sacred grove (nemeton) as the primary ritual space; head-hunting as religious act.',
    legacy:'Celtic languages surviving in Welsh, Irish, Scottish Gaelic, Breton, and Cornish; the Book of Kells as one of the world\'s great manuscripts; Halloween (Samhain), May Day (Beltane), and midsummer festivals as living Celtic ritual inheritance.',
    gender:'Celtic women in Irish and Gaulish law could own property, divorce, command armies, and serve as druids — a legal status radically more advanced than Greek or Roman contemporaries; Boudicca leading 100,000 warriors against Rome (60 CE), Cartimandua ruling the Brigantes as a queen, and the Irish Brehon Law\'s provisions for women as warriors and professionals.',
    slavery:'Celtic warfare generating enslaved captives sold into the Mediterranean market — British tin and enslaved people as the primary exports attracting Phoenician and later Roman commercial interest; the Latin word for slave (servus) possibly Celtic in origin; debt bondage within Celtic society creating internal unfree labour.',
    collapse:'Roman conquest (58–51 BCE in Gaul, 43 CE in Britain) absorbing continental Celtic culture into Roman provincial civilisation; Irish and Scottish Gaelic surviving as living languages precisely because Rome never reached them; Celtic identity persisting as a substratum across France, Spain, and Britain visible in place names, linguistic borrowings, and ritual practices.',
    trade:'The Hallstatt and La Tène trade networks connecting Celtic Europe to the Mediterranean — Attic pottery, Etruscan bronze, and Greek wine in Gaulish elite burials; the salt mines of Hallstatt (Austria) as a commercial foundation; amber from the Baltic reaching the Mediterranean through Celtic intermediary networks.',
    language:'The Celtic language family — Gaulish, Brittonic, Gaelic — once spoken from Anatolia to Ireland; modern survivors Welsh, Irish, Scottish Gaelic, Breton, Cornish, and Manx as Europe\'s most endangered major language family; over 300 Celtic place names in England alone as linguistic monuments to pre-Roman Britain.',
    technology:'Iron ploughshares enabling deeper cultivation of heavy northern European soils — the technological foundation of Celtic agricultural expansion; the barrel (a Celtic invention, superior to the amphora for storage and transport); chainmail armour; the iron tyre (metal rim) for wooden wheels.',
    ecology:'The sacred nemeton (forest grove) as the primary ritual space — encoding a religious relationship with the natural world that resisted deforestation; the druidic tradition\'s deep knowledge of plant properties; the Celtic agricultural expansion into the heavy soils of northern Europe transforming its landscape over 500 years.',
    food:'Cauldron culture — the cauldron as both cooking vessel and sacred object, the Gundestrup Cauldron depicting ritual feasting; fermented grain drinks (Celtic ale, the ancestor of beer); the Iron Age introduction of improved ploughing technology enabling agricultural surplus to fund the warrior aristocracy.',
    philosophy:'The druidic philosophical tradition as an oral system of extraordinary complexity — 20 years of training required to memorise the entire corpus; the Celtic concept of the Otherworld as more real and permanent than the visible world; metempsychosis (soul transmigration) documented by Greek observers as a core druidic belief, removing the fear of death.',
    inequality:'A warrior aristocracy sustained by agricultural surplus from a free peasantry; the druidic order as an intellectual elite transcending tribal boundaries; yet the Brehon Laws (Irish legal code) providing more equality between social classes than Roman law, with compensation (eric) rather than punishment as the primary legal remedy.',
    diffusion:'Celtic languages surviving in Welsh, Irish, Scottish Gaelic, and Breton; Halloween (Samhain), May Day (Beltane), and midsummer festivals persisting as popular traditions; the Book of Kells and Lindisfarne Gospels as the supreme achievements of Celtic Christian art; La Tène decorative style influencing Art Nouveau and modern Celtic revival aesthetics.',
    migration:'The Celtic expansion (c. 800–200 BCE) was one of the ancient world\'s most dramatic voluntary migration events — Celtic-speaking peoples moving outward from a Central European heartland to occupy Britain, Ireland, Iberia, northern Italy (sacking Rome in 390 BCE), Greece (sacking Delphi in 279 BCE), and Anatolia (the Galatians). This was not a unified conquest but a series of tribal migrations driven by population pressure, climate change, and the prestige of raiding. Roman conquest reversed the flow — Celtic elites migrated into Roman administrative culture while Celtic languages retreated westward to the Atlantic periphery where they survive today. Irish monastic migration (6th–8th centuries CE) then spread Celtic Christian culture back across a Romanised Europe, creating the paradox of Celtic missionaries re-evangelising the continent their ancestors had plundered.',
   }},
  {id:'indusvalley',fp:{mil:3,com:8,art:7,sci:7,reach:6,lon:5},music:{scale:'pentatonic',root:48,tempo:52,timbre:'drone',rhythm:[1,0,0,0,1,0,0,0],reverb:.6,artifact:'String instrument depiction on Mohenjo-daro terracotta figurine (c.2500 BCE); seven-holed bone flute evidence from Harappan sites; shell trumpets in ritual contexts'},lon:67,lat:27,nm:'Indus Valley Civilization',sb:'South Asia · 2600–1900 BCE',x:643,y:216,s:-2600,e:-1900,
   conns:['mesopotamia','india'],
   overview:'The Indus Valley Civilisation (2600–1900 BCE) was one of the ancient world\'s most sophisticated urban cultures — and one of its most mysterious. Its cities of Mohenjo-daro and Harappa had grid-planned streets, covered sewage drains, standardised brick dimensions, and multi-storey buildings with running water, infrastructure not matched in the region for another 3,000 years. It covered 1 million km² and housed 5 million people, yet left no palaces, no weapons hoards, and no monumental royal tombs — suggesting a form of governance radically unlike any contemporary. The Indus script remains undeciphered, the most significant unresolved mystery in ancient linguistics; if decoded, it could reveal the intellectual world of the largest Bronze Age civilisation. Its collapse around 1900 BCE, likely from monsoon weakening, was managed over 200 years rather than sudden — the most orderly civilisational exit in this dataset.',
   d:{
    economy:'Standardised weights and measures of extraordinary precision used across 1 million km² — more uniform than anywhere else in the ancient world; long-distance trade in carnelian beads, lapis lazuli, and cotton reaching Mesopotamia.',
    political:'A civilisation of 5 million people across 1,000+ settlements apparently without palaces, temples, or monumental royal tombs — suggesting a form of governance radically different from every contemporary civilisation, possibly merchant council or collective.',
    art:'Seal carving of miniaturist precision — the Pashupati seal, unicorn seals, and geometric patterns on thousands of stamp seals representing a graphic tradition of great aesthetic restraint; fired brick standardisation across vast distances.',
    literature:'The Indus script — 400+ signs on seals and tablets — remains undeciphered; one of the greatest unsolved puzzles of human intellectual history, potentially encoding the earliest South Asian language.',
    military:'A remarkable absence of weapons caches, fortification walls designed for warfare, or monumental military iconography — suggesting either exceptional internal peace or a military technology leaving no archaeological trace.',
    science:'Urban planning at Mohenjo-daro and Harappa featuring grid street layouts, covered sewage drains, and public water systems more sophisticated than anything in contemporary Egypt or Mesopotamia — and not seen again in South Asia for 3,000 years.',
    medicine:'The world\'s earliest documented dentistry — drilled molars at Mehrgarh (7000 BCE) predating any other dental work by 4,000 years; evidence of sophisticated understanding of human anatomy from surgical contexts.',
    religion:'The Pashupati seal possibly depicting a proto-Shiva figure — suggesting a direct thread from Indus Valley religion to Hinduism; sacred bathing tanks (the Great Bath at Mohenjo-daro) as possibly the origin of ritual purification in South Asian religion.',
    legacy:'Standardised weights and measures as a concept entering the Indian and global commercial tradition; proto-Shiva iconography threading into Hinduism; the undeciphered Indus script as one of the last great intellectual mysteries of the ancient world.',
    gender:'The archaeology of the Indus Valley reveals few clear gender hierarchies — no monumental male warrior imagery, no apparent male-dominated palace culture; the "Priest-King" figure (possibly female) at Mohenjo-daro ambiguous; the figurine traditions including many female forms possibly associated with fertility or domestic ritual; an egalitarian gender archaeology requiring careful interpretation.',
    slavery:'No archaeological evidence of institutionalised slavery at Harappan sites — no slave quarters, no weapons caches suggesting military conquest for slaves, no texts (as they remain undeciphered); the absence of the monumental royal and military iconography associated with slave economies in Egypt and Mesopotamia is striking.',
    collapse:'The Harappan collapse (c. 1900–1700 BCE) — one of the most studied in archaeology — now attributed primarily to climate change: monsoon weakening drying the Ghaggar-Hakra river system that supported 70% of Harappan settlements; a managed decline over 200 years rather than a sudden catastrophe.',
    trade:'Carnelian beads from Gujarat found in Mesopotamia; Harappan merchant colonies in Mesopotamian cities; the standardised weights and measures enabling trade with non-Indus partners; cotton textiles as possibly the first major Indian export; lapis lazuli from Afghanistan transiting through Harappan networks.',
    language:'The Indus script — 400+ signs, 4,000+ inscriptions, still undeciphered — the greatest unresolved mystery in ancient linguistics; attempts to link it to Dravidian, Proto-Sanskrit, or a language family now otherwise extinct; decipherment would potentially reveal the intellectual world of a 5-million-person civilisation.',
    technology:'Fired brick of standardised dimensions (1:2:4 ratio) used throughout the civilisation — the most consistent brick standardisation in the ancient world; the grid-planned city as an urban technology requiring centralised planning authority; the world\'s earliest known cotton textile production.',
    ecology:'The Ghaggar-Hakra river system (possibly the Vedic Saraswati) as the Harappan civilisation\'s ecological foundation — its drying through monsoon weakening the likely primary cause of collapse; the sophisticated urban drainage engineering suggesting sophisticated management of water in a monsoon-dependent environment.',
    food:'Wheat and barley cultivation; cattle, sheep, and pig husbandry; the earliest evidence of cotton cultivation; evidence of cumin and coriander as culinary spices; the tandoor (clay oven) possibly originating in Harappan cooking tradition — a culinary technology now global.',
    philosophy:'The Indus script\'s decipherment remaining the key to understanding Harappan philosophy; the great bath at Mohenjo-daro suggesting ritual purification as a central religious-philosophical practice; the possible continuity between Harappan religious symbolism (proto-Shiva, sacred trees) and Vedic and Hindu traditions.',
    inequality:'The remarkable equality of Harappan urban planning — no palace larger than the largest private house, no monumental royal tomb, no weapons hoards suggesting a military elite — suggesting either the least unequal complex society in ancient history, or a form of inequality not expressed in material remains.',
    diffusion:'The possible continuity of Harappan traditions into Vedic and Hindu civilisation — the proto-Shiva figure, the sacred tree, the ritual bathing tradition; cotton and its cultivation spreading westward; the Dravidian languages of South India possibly preserving a linguistic link to Harappan culture.',
    migration:'The Indus Valley Civilisation\'s decline (1900–1700 BCE) produced the most significant migration in South Asian prehistory. As monsoon weakening dried the Ghaggar-Hakra river system, Harappan populations migrated eastward toward the Ganges plain and southward toward Gujarat and the Deccan — a managed dispersal rather than a sudden collapse, spreading Harappan agricultural and craft traditions into new territories. Whether this eastward migration overlapped with, preceded, or followed the Indo-Aryan migration from the steppe remains one of archaeology\'s most contested questions. The genetic record suggests both movements contributed to the modern South Asian population — making contemporary Indians the demographic heirs of at least two great prehistoric migrations whose interaction shaped the subcontinent\'s civilisational foundation.',
   }},
  {id:'scythians',fp:{mil:8,com:6,art:7,sci:3,reach:7,lon:4},music:{scale:'pentatonic_minor',root:50,tempo:74,timbre:'pluck',rhythm:[1,0,1,0,0,1,0,1],reverb:.4,artifact:'Herodotus describes Scythian singing rituals; Greek colonies on Black Sea depict Scythian musicians; related Central Asian lute traditions documented'},lon:52,lat:47,nm:'Scythians & Eurasian Steppe',sb:'Central Eurasia · 700–200 BCE',x:640,y:128,s:-700,e:-200,
   conns:['persia','greece','china'],
   overview:'The Scythians were the ancient world\'s most feared and least conquerable people — horse archers of the Eurasian steppe who defeated Darius I\'s enormous invasion force simply by withdrawing into the interior and watching the Persians starve. Their world was the grass corridor stretching from the Black Sea to Mongolia, a 6,000km highway that they and their successors (Sarmatians, Huns, Turks, Mongols) would use for two millennia to periodically reorganise Eurasian history. Their gold — buried in kurgan mounds of extraordinary richness — represents one of the ancient world\'s most sophisticated artistic traditions: the Scythian animal style, all kinetic tension and interlocking predator-prey, spread from the Black Sea into Celtic metalwork and persists in the DNA of European decorative art. Greek accounts describe their women as warriors — and the skeletal evidence confirms it.',
   d:{
    economy:'Control of the Eurasian steppe corridor enabling trade between China, Persia, and Greece; gold objects of extraordinary craftsmanship exchanged for grain, wine, and manufactured goods; the kurgan burial mounds preserving a frozen record of steppe wealth.',
    political:'A confederacy of nomadic tribes under a paramount king — the first steppe empire model that would be replicated by the Huns, Turks, and ultimately the Mongols; governance through personal loyalty and martial prestige rather than fixed territory.',
    art:'Scythian animal style — contorted predator and prey figures in gold, perfectly expressing the kinetic violence of steppe ecology — one of the most distinctive and influential art styles of the ancient world, spreading from the Black Sea to China.',
    literature:'An entirely oral tradition; Herodotus\' Histories contain the most detailed ancient account of Scythian culture, describing their customs, cosmology, and warfare with a curiosity remarkable for its era.',
    military:'The composite bow fired from horseback — the definitive steppe weapon; the horse archer who could outrange, outmanoeuvre, and exhaust any infantry force; Darius I\'s disastrous Scythian campaign (513 BCE) demonstrating the impossibility of conquering mobile nomads.',
    science:'Veterinary knowledge of the highest practical order; astronomical observation encoded in kurgan orientation; metallurgical knowledge producing gold alloys and bronze weaponry across thousands of kilometres of resource networks.',
    medicine:'Evidence of sophisticated cranial surgery in skeletal remains; cannabis use (documented by Herodotus) in ritual and possibly medical contexts; the first documented use of felt clothing and portable structures for cold-climate survival.',
    religion:'Goddess Tabiti as supreme deity; elaborate royal burial (kurgan) rituals involving horse sacrifice, gold deposition, and the killing of servants and wives; shamanic practices connecting the human and animal worlds.',
    legacy:'The horse archer as a military concept reshaping every subsequent Eurasian military tradition; Scythian animal style art influencing Celtic, Persian, and ultimately European decorative traditions; the steppe political model inherited by the Huns, Avars, Turks, and Mongols.',
    gender:'Greek accounts of Scythian women warriors inspired the Amazon myth; skeletal analysis confirms that 25–37% of Scythian women buried with weapons actually used them — the Iron Age\'s most striking evidence of female military participation; women\'s graves containing the full range of male grave goods suggesting genuine gender flexibility on the steppe.',
    slavery:'Scythian raiding of sedentary populations for slaves sold to Greek Black Sea colonies; enslaved people used in kurgans as sacrificial burials for the Scythian elite; yet nomadic societies generally used slaves less intensively than sedentary ones, as herding required mobility incompatible with large slave workforces.',
    collapse:'Scythian power broken by the Sarmatian migration (c. 200 BCE) — their own eastern steppe neighbours displacing them westward; Darius I\'s failed invasion (513 BCE) demonstrating that nomadic people cannot be militarily defeated but only exhausted; the Iron Age steppe as a permanent zone of nomadic political succession.',
    trade:'The Black Sea grain trade — Scythian-controlled steppes as the breadbasket supplying Greek cities; Greek luxury goods (wine, oil, fine pottery) flowing into Scythian aristocratic burials; the Scythians as the commercial intermediaries between the Greek world and the deeper Eurasian interior.',
    language:'Old Scythian (an Eastern Iranian language) surviving only in personal names in Greek texts and Scythian glosses; the modern Ossetian language of the Caucasus as the only direct descendant; the absence of Scythian writing leaving their philosophical and literary tradition entirely oral and irretrievable.',
    technology:'The composite recurve bow as the definitive steppe technology — five layers of horn, sinew, and wood laminated under tension to store energy exceeding steel springs; the iron stirrup possibly a Scythian invention that, when transmitted westward, transformed European cavalry and ultimately created feudalism.',
    ecology:'The Pontic steppe as an ecological niche perfectly adapted for horse nomadism — vast grasslands supporting herds requiring minimal human management; the seasonal migration between summer and winter pastures as a sophisticated ecological management system; the steppe\'s ecological boundaries defining the limits of Scythian political power.',
    food:'A pastoral diet of horse milk (fermented as koumiss), dried meat, and blood — high-protein, portable, and requiring no cooking fuel; Greek wine and grain consumed as elite luxuries; the horse as both dietary resource and economic capital simultaneously — the steppe equivalent of cattle on the African plateau.',
    philosophy:'The Scythian Anacharsis (c. 590 BCE) visiting Athens and conversing with Solon — one of the few documented intellectual exchanges between nomadic and sedentary philosophy in antiquity; his alleged sayings (questioning Greek customs from an outsider perspective) making him a philosophical figure in the Greek tradition.',
    inequality:'The kurgan burial mounds as the most visible evidence of extreme elite inequality — royal burials containing gold objects weighing hundreds of kilograms, surrounded by sacrificed horses and wives; yet within the warrior class, a relative equality based on military skill.',
    diffusion:'The animal style art spreading from the Black Sea into Celtic, Persian, and ultimately European decorative traditions; the horse archer tactic that defined every subsequent Eurasian steppe military tradition; possibly the stirrup as a technological transfer that transformed European feudal military organisation.',
    migration:'The Scythians were themselves the product of steppe migration — Iranian-speaking nomads moving westward from Central Asia onto the Pontic steppe around 900 BCE, displacing the earlier Cimmerians who fled into Anatolia (recorded in Assyrian texts). Scythian seasonal migration between summer highland pastures and winter lowland camps was the fundamental economic activity, covering hundreds of kilometres annually with entire household wagons. Later Sarmatian migration from further east displaced the Scythians westward in turn (c. 200 BCE), continuing the steppe\'s perpetual westward migration pressure that would eventually produce the Hunnic migration of the 4th century CE. Scythian refugees integrating into Greek Black Sea colonies created the hybrid Scytho-Greek culture documented in their spectacular burial goods.',
   }},
  {id:'ottoman',fp:{mil:9,com:8,art:8,sci:7,reach:9,lon:7},music:{scale:'turkish',root:62,tempo:82,timbre:'flute',rhythm:[1,0,1,0,1,0,0,1],reverb:.45,artifact:'Ney (end-blown reed flute) — Mevlana Rumi\'s 13th-century verse opens with its cry; kanun (plucked zither); Hampartsum notation system (1813); mehter (military band) from 13th century'},lon:29,lat:40,nm:'Ottoman Empire',sb:'Anatolia & Near East · 1299–1922 CE',x:522,y:148,s:1299,e:1922,
   conns:['byzantine','islamicworld','medieval'],
   overview:'The Ottoman Empire lasted 600 years from 1299 to 1922, expanding from a small Anatolian principality to a state governing 30 million people across three continents — Europe, Asia, and Africa simultaneously. The 1453 conquest of Constantinople ended the Byzantine Empire and reshaped the Mediterranean world; the devshirme system of training enslaved Christian boys as the empire\'s elite administrators produced grand viziers and architects as well as soldiers. Istanbul\'s position at the crossroads of continents made it the medieval world\'s greatest commercial city, and the Ottoman trade monopoly on Asian goods inadvertently drove European explorers to find oceanic routes — making the Age of Discovery a reaction to Ottoman commercial success. The empire\'s collapse after WWI drew the borders of the modern Middle East, a legacy its successor states are still living with.',
   d:{
    economy:'Istanbul as the crossroads of intercontinental commerce — a 600-year customs and tolls monopoly on trade between Europe and Asia generating revenues sustaining the most complex administrative state between China and France.',
    political:'The devshirme system — recruiting Christian boys as slaves trained to the highest levels of government and military — producing a meritocratic administrative class theoretically owing loyalty only to the Sultan; the millet system giving religious minorities legal autonomy.',
    art:'Iznik ceramics of dazzling technical perfection; the Topkapi Palace complex as an architectural essay on imperial authority; calligraphy as the supreme art form; the Suleymaniye Mosque as Sinan\'s architectural masterpiece — possibly the greatest domed building since Hagia Sophia.',
    literature:'Ottoman divan poetry of extreme formal sophistication; the travel writing of Evliya Çelebi (1611–1682) covering 51 countries in 40 years — one of history\'s great travel narratives; historical chronicles preserving the administrative memory of a 600-year empire.',
    military:'Janissary infantry — the first standing professional army in Europe; the bombard cannon that breached Constantinople\'s walls in 1453 after they had resisted every assault for 1,000 years; naval supremacy in the eastern Mediterranean for two centuries.',
    science:'The Istanbul Observatory (1577) — among the world\'s most advanced astronomical institutions; Ottoman cartography producing the Piri Reis world map (1513) incorporating geographic knowledge from Columbus\' first voyage; extensive botanical and pharmaceutical knowledge.',
    medicine:'The first purpose-built mental hospitals treating psychiatric illness humanely — music, running water, and aromatherapy — three centuries before European asylums abandoned chains; Şerefeddin Sabuncuoğlu\'s illustrated surgical atlas (1465).',
    religion:'Sunni Islam as state religion managed through the Sheikh-ul-Islam; simultaneously tolerant of Jews, Christians, and other Muslims under the millet system; the Sufi orders as the primary conduit of popular religious life.',
    legacy:'The political geography of the modern Middle East drawn from Ottoman provincial borders; Istanbul as one of the world\'s great cities; the Armenian Genocide (1915–1923) as a foundational case in international law on crimes against humanity.',
    gender:'The Ottoman harem as both a patriarchal control institution and a genuine power base — the Sultanate of Women (1533–1683) when queen mothers (valide sultan) effectively governed the empire through their sons; Kösem Sultan ruling as regent twice, the most powerful Ottoman woman in history; the contradiction between Islamic gender law and practical female dynastic power.',
    slavery:'The devshirme system — enslaving Christian boys, converting them to Islam, and training them as the empire\'s administrative and military elite — an institutionalised slavery producing grand viziers and generals; the Ottoman slave trade continuing the medieval Islamic pattern; Circassian and Georgian women as the primary concubine supply for the imperial harem.',
    collapse:'The slow Ottoman collapse (1683–1922) from military overextension, institutional rigidity, and the industrial-military gap with European powers; the empire nicknamed "the Sick Man of Europe" from 1853; WWI triggering final collapse and the founding of the Turkish Republic — yet the Ottoman administrative geography structuring the modern Middle East to this day.',
    trade:'Istanbul as the medieval world\'s greatest market — the Grand Bazaar (c. 1455) with 4,000 shops; the Silk Road\'s terminus; Ottoman control of the land route to Asia driving European interest in oceanic routes (Columbus, da Gama), making the Ottoman trade monopoly inadvertently responsible for the Age of Discovery.',
    language:'Ottoman Turkish (Arabic script, Persian vocabulary, Turkish grammar) as the administrative language of a multilingual empire; Arabic for religion, Persian for poetry and high culture; Greek, Armenian, Ladino, and Arabic for commerce — a linguistic ecology of enormous complexity; modern Turkish (1928 script reform) as Atatürk\'s deliberate civilisational rupture.',
    technology:'The bombard cannon (the Basilica, 8 metres long, firing 600kg stone balls) breaching Constantinople\'s walls after they had resisted every assault for 1,000 years; the Ottoman navy as the Mediterranean\'s most powerful force for two centuries; the hamam (bath house) as a public health infrastructure of great sophistication.',
    ecology:'The Ottoman Empire\'s management of the diverse ecologies of Anatolia, the Levant, North Africa, and the Balkans through a sophisticated system of local administrative adaptation; the miri (state land) system managing agricultural resources; the Bosphorus as an ecological corridor between the Black Sea and Mediterranean whose management shaped regional climate and fisheries.',
    food:'The Ottoman imperial kitchen as the world\'s most sophisticated food institution — feeding 10,000 people daily with dishes from Anatolia, the Levant, the Balkans, North Africa, and the Caucasus; baklava, kebab, pilaf, meze, and yogurt as Ottoman culinary exports now globally ubiquitous; the coffee house (kahvehane) as a social institution.',
    philosophy:'The Ottoman synthesis of Islamic theology, Persian mysticism (Sufism), and Greek philosophy (via Islamic transmission); Rumi\'s Masnavi (composed in Ottoman Konya) as one of the world\'s most read mystical texts; the Ottoman religious tolerance — Jews, Christians, and Muslims coexisting under the millet system — as a pragmatic philosophical position.',
    inequality:'The millet system creating parallel legal universes for different religious communities; the devshirme-trained Janissary corps as an institution of enslaved people who became the most powerful men in the empire; the devsirme itself representing extreme inequality formalised as a system — non-Muslim subjects\' children as state property.',
    diffusion:'The political geography of the modern Middle East drawn directly from Ottoman provincial boundaries; coffee and coffee houses as Ottoman exports that transformed European intellectual life in the 17th century; baklava, kebab, and yogurt as global culinary exports; the Balkan and Arab states\' political cultures shaped by Ottoman administrative inheritance.',
    migration:'The Ottoman Empire was assembled through managed migration. The original Anatolian beys who coalesced around Osman were themselves Turkic migrants from Central Asia displaced by the Mongol expansion. The devshirme system was institutionalised migration — Christian boys from the Balkans transported to Istanbul, converted, educated, and redistributed as administrators and soldiers across the empire. The 1492 expulsion of Jews from Spain brought 100,000 Sephardic Jewish migrants to Ottoman cities — welcomed explicitly as an economic asset. Population transfers (sürgün) relocated entire communities to Istanbul and other strategic cities to stimulate commerce and demographics. The empire\'s collapse triggered the 20th century\'s defining migration tragedies: the Armenian Genocide deportations (1915), the Greek-Turkish population exchange (1923) displacing 1.5 million people, and the Palestinian displacement (1948).',
   }},
  {id:'medieval',fp:{mil:7,com:7,art:9,sci:8,reach:8,lon:7},music:{scale:'dorian',root:50,tempo:60,timbre:'flute',rhythm:[1,0,0,1,0,0,1,0],reverb:.6,artifact:'Gregorian antiphons codified by Pope Gregory I (590–604 CE); neume notation developed 9th century; Hildegard of Bingen\'s 77 liturgical compositions (12th century)'},lon:8,lat:48,nm:'Medieval & Renaissance Europe',sb:'Europe · 476–1600 CE',x:448,y:116,s:476,e:1600,
   conns:['byzantine','islamicworld','norse','ottoman'],
   overview:'Medieval Europe (476–1600 CE) is often remembered as a dark interlude between Rome and the Renaissance, but it was the period that invented virtually every institution that defines the modern West: the university, the hospital, the parliament, double-entry bookkeeping, the printing press, and the corporation. The Gothic cathedral was the era\'s supreme technological and aesthetic achievement — Chartres\' stained glass and structural engineering both products of the same precise mathematical knowledge. The Black Death (1347–1351) killed perhaps half of Europe\'s population and shattered the feudal system by raising wages and empowering survivors; the Reformation (1517) fractured the Church\'s monopoly on truth and produced the concept of individual conscience; the printing press turned both into mass movements. The Renaissance was not a break from the medieval period but its culmination.',
   d:{
    economy:'The wool trade and Italian banking — the Medici\'s double-entry bookkeeping, letters of credit, and the bill of exchange — inventing the financial instruments that capitalism still runs on; the Hanseatic League as a proto-common market across northern Europe.',
    political:'Magna Carta (1215), the Parlamentum, the Swiss Confederation, the Italian city-republics — a laboratory of governance innovation producing representative institutions, rule of law concepts, and republican theory that seeded modern democracy.',
    art:'Gothic cathedral architecture — Chartres, Notre-Dame, Cologne — as the supreme engineering and aesthetic achievement of medieval culture; Giotto\'s revolutionary naturalism; the Sistine Chapel; Leonardo, Michelangelo, Raphael — a civilizational flowering unmatched in its density.',
    literature:'Dante\'s Divine Comedy; Chaucer\'s Canterbury Tales; Cervantes\' Don Quixote; Shakespeare\'s complete works — the foundational canon of Western literature produced in a 300-year burst of extraordinary creative intensity.',
    military:'The longbow at Crécy and Agincourt; the Swiss pike square; the gunpowder revolution making feudal castles obsolete; the development of the first professional national armies replacing feudal levies.',
    science:'Roger Bacon\'s experimental method; the university system from Bologna to Oxford; the printing press (Gutenberg, 1440) as the greatest information technology revolution before the internet; Copernicus, Galileo, Vesalius — the Scientific Revolution.',
    medicine:'Andreas Vesalius\' De Humani Corporis Fabrica (1543) — the first accurate anatomical atlas, correcting Galen\'s 1,400-year-old errors; William Harvey\'s discovery of blood circulation (1628); the first hospitals as institutions separate from monasteries.',
    religion:'The Catholic Church as Europe\'s first supranational institution; the Protestant Reformation (1517) fracturing European religious unity and producing freedom of conscience as a political concept; the Crusades reshaping the entire Mediterranean world.',
    legacy:'The university, printing, double-entry bookkeeping, parliamentary governance, the scientific method, and the novel — every foundational institution of the modern world was invented or perfected in medieval and Renaissance Europe.',
    gender:'Medieval European women\'s status ranging from the legal non-personhood of common women to the extraordinary authority of abbesses like Hildegard of Bingen (composer, theologian, and doctor); the courtly love tradition creating a literary fiction of female power; the witch trials (1450–1750) as a systematic assault on female independent knowledge and social networks.',
    slavery:'European serfdom as the medieval form of coerced labour — technically distinct from slavery but practically similar in tied labour and hereditary status; the decline of ancient slavery replaced by serfdom across post-Roman Europe; the re-emergence of full chattel slavery through the Atlantic trade from the 15th century as the medieval period ended.',
    collapse:'The Black Death (1347–1351) killing 30–60% of Europe\'s population as the most catastrophic demographic event in European history — raising wages, empowering survivors, breaking feudal labour control, and accelerating the transition to capitalism; the collapse triggering a social revolution whose full effects included the Peasants\' Revolt and ultimately the Reformation.',
    trade:'The Hanseatic League as a proto-common market across northern Europe; Italian city-states (Venice, Genoa, Florence) as the financial intermediaries between East and West; the bill of exchange enabling trade without physical silver movement; the Champagne fairs as annual gatherings of European commercial life.',
    language:'Latin as the universal language of European intellectual and religious life — the last time a single language unified literate Europeans; vernacular literatures (Dante\'s Tuscan, Chaucer\'s English, the troubadours\' Occitan) emerging as the linguistic seeds of modern national identities; Gutenberg\'s press (1440) standardising vernacular languages and making Latin obsolete.',
    technology:'The heavy plough transforming northern European agriculture; the water mill and windmill as the first non-human, non-animal power sources in history; the mechanical clock (c. 1300) standardising time and enabling industrial coordination; the printing press as the most consequential single technological invention between fire and the steam engine.',
    ecology:'The Medieval Warm Period (c. 900–1200 CE) enabling agricultural expansion into marginal lands; the subsequent Little Ice Age (c. 1300–1850) cooling Europe, reducing harvests, and contributing to famine and plague vulnerability; the Black Death\'s demographic collapse allowing agricultural land to reforest, visibly cooling regional climate.',
    food:'The manorial economy\'s bread-and-pottage diet for peasants versus the aristocratic feast culture (spiced meats, elaborate pastries, exotic spices worth more than gold) documenting extreme dietary inequality; the spice trade as the economic engine driving European expansion; wine as the universal European beverage from Canterbury to Kiev.',
    philosophy:'Scholasticism as the supreme medieval intellectual achievement — Aquinas\' synthesis of Aristotelian philosophy and Christian theology in the Summa Theologica; Ockham\'s Razor as a methodological principle still used today; the university system (Bologna 1088, Oxford 1096, Paris 1160) as the institutional infrastructure of Western philosophy.',
    inequality:'The three-estates model (those who pray, those who fight, those who work) as feudalism\'s explicit ideological justification; serfs legally bound to land and lord; yet the Black Death\'s demographic shock producing the first sustained rise in common wages in European history — catastrophe as the driver of equality.',
    diffusion:'The European university system as medieval Europe\'s most consequential institutional export — now the global model for higher education; Gothic architecture spreading from the Île-de-France across Europe and later globally; Christian missionary activity transmitting European culture across the Americas, Africa, and Asia.',
    migration:'Medieval Europe was a continent in perpetual migration. The Carolingian period\'s stability was immediately followed by Viking, Magyar, and Saracen migrations that collectively reshaped the European demographic map between 800 and 1000 CE. The Crusades (1095–1291) produced the largest long-distance voluntary migration in medieval Christian Europe — hundreds of thousands of people travelling to the Levant, many never returning, creating Frankish settlements across the Eastern Mediterranean. The Black Death\'s aftermath (post-1351) generated labour migration on an unprecedented scale as survivors moved to fill depopulated regions. The expulsion of Jews from England (1290), France (1306), and Spain (1492) created forced Jewish migration waves that reshaped the demographic map of Eastern Europe and the Ottoman Empire.',
   }},
  {id:'japan',fp:{mil:7,com:7,art:10,sci:8,reach:4,lon:8},music:{scale:'japanese',root:62,tempo:58,timbre:'flute',rhythm:[1,0,0,0,1,0,1,0],reverb:.55,artifact:'Koto (13-string zither) documented from Nara period (710 CE); shakuhachi (bamboo flute) — Zen monks played honkyoku pieces from 13th century; gagaku court music codified 7th century CE'},lon:137,lat:36,nm:'Japanese Civilization',sb:'Japanese Archipelago · 300 BCE – 1868 CE',x:896,y:182,s:-300,e:1868,
   conns:['china','korea'],
   overview:'Japanese civilisation developed in deliberate dialogue with China and in deliberate isolation from everywhere else — selectively absorbing writing, Buddhism, Confucianism, and administrative models from the continent while developing a distinct aesthetic philosophy, political culture, and social structure that has no parallel. The Tale of Genji (c. 1008 CE), written by a woman of the Heian court, is the world\'s first novel; the Zen aesthetic tradition produced the tea ceremony, the stone garden, and the concept of wabi-sabi (the beauty of imperfection) as a philosophical position with global influence. The Meiji Restoration (1868) achieved the most rapid state-directed modernisation in history, transforming a feudal samurai society into an industrial power in under 50 years. Japan\'s 20th-century catastrophe (imperialism, total war, atomic bombing) was followed by the world\'s most rapid post-war economic recovery, and today Japanese culture — from manga to cuisine to management philosophy — is among the world\'s most pervasive civilisational exports.',
   d:{
    economy:'The rice paddy agricultural system enabling high population density; the Edo period (1603–1868) proto-capitalist economy with futures markets in rice (the Dojima Exchange, 1697 — the world\'s first commodity futures exchange), merchant banking, and national market integration.',
    political:'The emperor as divine symbolic authority; the shogunate as practical military government — a dual sovereignty model maintaining institutional stability across 1,500 years; the Meiji Restoration as the world\'s fastest state-directed modernisation.',
    art:'Zen aesthetics: the tea ceremony, noh theatre, ikebana, the raked stone garden — a civilizational commitment to the beauty of incompleteness (wabi-sabi) and impermanence (mono no aware) unique in world aesthetic philosophy.',
    literature:'The Tale of Genji (c. 1008 CE) — the world\'s first novel, written by a woman (Murasaki Shikibu) — a 1,000-page psychological portrait of aristocratic court life of unmatched sophistication for its era; haiku as the world\'s most concentrated literary form.',
    military:'The samurai code (bushido); the curved katana as both weapon and aesthetic object; castle architecture of great sophistication; the defeat of the Mongol invasions (1274 and 1281) by typhoon (kamikaze); the world\'s first purpose-built aircraft carriers in the 20th century.',
    science:'Edo-period mathematics (wasan) developing independently of Western mathematics to comparable levels; astronomical observation; the tōkyūgi (armillary sphere); and the extraordinary precision engineering of the sword-making tradition.',
    medicine:'Kampō medicine synthesising Chinese traditions with indigenous Japanese practice; the Edo-period anatomical investigations of Sugita Genpaku — dissecting a human corpse and discovering Dutch anatomical texts were accurate while Chinese ones were wrong, launching Japanese Western medicine.',
    religion:'Shinto — the indigenous animist tradition sanctifying every mountain, river, and forest as the dwelling of a kami spirit; Buddhism absorbed and transformed into uniquely Japanese forms (Zen, Pure Land, Nichiren); the two traditions coexisting in one of the world\'s most distinctive religious syntheses.',
    legacy:'Sony, Toyota, and Nintendo as civilizational exports; Japanese aesthetic philosophy (wabi-sabi, ikigai, ma) profoundly influencing global design culture; kaizen (continuous improvement) as a management philosophy reshaping global manufacturing; manga and anime as the 20th century\'s most globally influential popular art form.',
    gender:'Japanese women\'s status varying dramatically — the Heian court\'s educated aristocratic women (Murasaki Shikibu writing the world\'s first novel) versus the Tokugawa period\'s strict Neo-Confucian female subordination; the onna-bugeisha (female warriors) of the Sengoku period; the geisha as a complex female artistic and social institution neither simply oppressed nor simply empowered.',
    slavery:'The Yamato period\'s nuhi (enslaved people) system; Korean and Chinese enslaved people imported during the Sengoku wars; the indentured labour (nenki-boko) system of the Edo period; the burakumin (outcaste leather workers and executioners) as a hereditary stigmatised class whose discrimination persisted legally until 1871.',
    collapse:'The end of the Heian court culture (1185); the Warring States period (Sengoku, 1467–1615) — 150 years of near-continuous civil war; the Meiji Restoration (1868) as a self-directed modernisation demolishing the feudal system; the catastrophic defeat of WWII (1945) as the most traumatic rupture, yet producing the world\'s most rapid post-war economic recovery.',
    trade:'The Edo period\'s strictly controlled trade through Nagasaki as the single permitted port — Dutch merchants on the artificial island of Dejima as Japan\'s only Western commercial contact; yet this controlled opening enabling Japanese selective adoption of Dutch science (Rangaku) without cultural subordination.',
    language:'Japanese as a language isolate — unrelated to any other language family with certainty; the extraordinary complexity of the writing system (hiragana, katakana, and 2,000+ kanji in everyday use) as a civilisational statement about the value of literacy; Japanese as one of the world\'s most precise languages for expressing social hierarchy through grammatical register.',
    technology:'The katana as metallurgical art — folded steel lamination producing a blade both harder and more flexible than any European contemporary; the block-print woodblock tradition (ukiyo-e) as a mass media technology; the Toyota Production System (kaizen, just-in-time manufacturing) as 20th century Japan\'s supreme technological export.',
    ecology:'Japan\'s satoyama (village mountain) landscape as one of the world\'s most studied sustainable land management systems — the gradient from village to cultivated hillside to managed forest creating maximum biodiversity at each transition zone; the cherry blossom (hanami) tradition encoding a profound cultural relationship with seasonal ecological change.',
    food:'The Japanese culinary tradition as one of the world\'s most sophisticated — sushi, ramen, tempura, kaiseki — a cuisine based on umami (the fifth taste, identified by Kikunae Ikeda in 1908), dashi stock, fermentation (miso, soy sauce), and the aesthetics of seasonal ingredient sourcing; Japan with more Michelin-starred restaurants than any other country.',
    philosophy:'Zen Buddhism\'s influence on Japanese aesthetics and ethics — the concept of mushin (no-mind), the tea ceremony as philosophical practice, the kōan as a tool for breaking habitual thought; Bushido as a warrior ethics blending Confucian loyalty, Buddhist acceptance of death, and Shinto purity into a distinctively Japanese moral code.',
    inequality:'The Tokugawa period\'s rigid four-tier system (samurai, farmer, artisan, merchant) with merchants at the bottom despite controlling economic life — a structural contradiction producing the Meiji Restoration\'s social revolution; the burakumin outcaste system as Japan\'s most persistent inequality; post-WWII land reform creating the relatively equal society Japan remains today.',
